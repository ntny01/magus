<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

<script>

/* =========================================================
   TILE CONFIG
========================================================= */

const TILE_SIZE = 256;

const X_MAX = 25;
const Y_MAX = 39;

const MAP_WIDTH =
    (X_MAX + 1) * TILE_SIZE;

const MAP_HEIGHT =
    (Y_MAX + 1) * TILE_SIZE;

/* =========================================================
   MAP
========================================================= */

const map = L.map('map', {

    crs:L.CRS.Simple,

    minZoom:-2,
    maxZoom:4,

    zoomSnap:0.25,

    attributionControl:false,

});

const bounds = [

    [0,0],

    [MAP_HEIGHT, MAP_WIDTH]

];

/* =========================================================
   TILE GROUPS
========================================================= */

const topoGroup =
    L.layerGroup();

const politicalGroup =
    L.layerGroup();

const topo3715Group =
    L.layerGroup();

const political3715Group =
    L.layerGroup();

const topo3692Group =
    L.layerGroup();

const political3692Group =
    L.layerGroup();

/* =========================================================
   TILE BUILDER
========================================================= */

function buildTiles(basePath, group){

    for(let x=0; x<=X_MAX; x++){

        for(let y=0; y<=Y_MAX; y++){

            const flippedY =
                Y_MAX - y;

            const imageUrl =
`${basePath}/6/${x}/${flippedY}.png`;

            const left =
                x * TILE_SIZE;

            const top =
                y * TILE_SIZE;

            const bounds = [

                [top,left],

                [
                    top + TILE_SIZE,
                    left + TILE_SIZE
                ]

            ];

            const overlay =
                L.imageOverlay(
                    imageUrl,
                    bounds,
                    {
                        interactive:false,
                        opacity:1
                    }
                );

            overlay.on('error', ()=>{

                overlay.setOpacity(0);

            });

            overlay.addTo(group);

        }

    }

}

/* =========================================================
   BUILD MAPS
========================================================= */

buildTiles(
    './terkep_kulon/output/3724_domborzati',
    topoGroup
);

buildTiles(
    './terkep_kulon/output/3724_politikai',
    politicalGroup
);

buildTiles(
    './terkep_kulon/output/3715_domborzati',
    topo3715Group
);

buildTiles(
    './terkep_kulon/output/3715_politikai',
    political3715Group
);

buildTiles(
    './terkep_kulon/output/3692_domborzati',
    topo3692Group
);

buildTiles(
    './terkep_kulon/output/3692_politikai',
    political3692Group
);

topoGroup.addTo(map);

L.control.layers({

    "3724 Domborzati": topoGroup,
    "3724 Politikai":  politicalGroup,
    "3715 Domborzati": topo3715Group,
    "3715 Politikai":  political3715Group,
    "3692 Domborzati": topo3692Group,
    "3692 Politikai":  political3692Group,

}).addTo(map);

map.fitBounds(bounds);

/* =========================================================
   AKTÍV RÉTEG KÖVETÉS
========================================================= */

// Az aktív térkép csoport: '3724', '3715', vagy '3692'
// Azonos évszámú Domb+Poli ugyanazokat a rajzokat mutatja
let activeMapGroup = '3724';
let activeLayerName = '3724_domborzati';

// Réteg névből csoport kinyerése
function layerNameToGroup(name) {
    if (name.indexOf('3715') !== -1) return '3715';
    if (name.indexOf('3692') !== -1) return '3692';
    return '3724';
}

// Leaflet rétegváltás figyelése
map.on('baselayerchange', function(e) {
    const newGroup = layerNameToGroup(e.name);
    const newLayerName = e.name === '3724 Domborzati' ? '3724_domborzati'
        : e.name === '3724 Politikai'  ? '3724_politikai'
        : e.name === '3715 Domborzati' ? '3715_domborzati'
        : e.name === '3715 Politikai'  ? '3715_politikai'
        : e.name === '3692 Domborzati' ? '3692_domborzati'
        : '3692_politikai';

    if (newGroup !== activeMapGroup) {
        // Csoport váltás: mentjük a régi csoportot, betöltjük az újat
        saveGroupState(activeMapGroup);
        activeMapGroup = newGroup;
        activeLayerName = newLayerName;
        loadGroupState(newGroup);
    } else {
        // Csak Domb↔Poli váltás azonos csoporton belül
        activeLayerName = newLayerName;
        window.scheduleSave();
    }
});

/* =========================================================
   DRAW SYSTEM
========================================================= */

const drawnItems =
    new L.FeatureGroup();

map.addLayer(drawnItems);

let currentDrawer = null;
let editHandler = null;
let deleteHandler = null;

/* =========================================================
   HELPERS
========================================================= */

function clearActiveButtons(){

    document
    .querySelectorAll('.iconBtn')
    .forEach(btn=>{

        btn.classList.remove('active');

    });

}

function disableDrawing(){

    if(currentDrawer){

        currentDrawer.disable();
        currentDrawer = null;

    }

    if(editHandler){

        editHandler.disable();
        editHandler = null;

    }

    if(deleteHandler){

        deleteHandler.disable();
        deleteHandler = null;

    }

    clearActiveButtons();

}

function deactivateMarkerMode(){

    activeIcon = null;

    document
    .querySelectorAll('.markerBtn')
    .forEach(btn=>{

        btn.classList.remove('active');

    });

}

function getDrawStyle(){

    return {

        color:
            document.getElementById(
                'drawColor'
            ).value,

        weight:
            parseInt(
                document.getElementById(
                    'drawWeight'
                ).value
            ),

        dashArray:
            document.getElementById(
                'drawDash'
            ).value,

        smoothFactor:2

    };

}

/* =========================================================
   DRAW
========================================================= */

function startDraw(type, btn){

    deactivateMarkerMode();

    disableDrawing();

    btn.classList.add('active');

    const style =
        getDrawStyle();

    if(type === 'polyline'){

        currentDrawer =
            new L.Draw.Polyline(map, {

                shapeOptions:style,

                guidelineDistance:20,

                repeatMode:false

            });

    }

    if(type === 'polygon'){

        currentDrawer =
            new L.Draw.Polygon(map, {

                shapeOptions:style,

                showArea:true,

                repeatMode:false

            });

    }

    currentDrawer.enable();

}

function enableEdit(btn){

    deactivateMarkerMode();

    disableDrawing();

    btn.classList.add('active');

    editHandler =
        new L.EditToolbar.Edit(map, {

            featureGroup:
                drawnItems

        });

    editHandler.enable();

}

function deleteMode(btn){

    deactivateMarkerMode();

    disableDrawing();

    btn.classList.add('active');

    deleteHandler =
        new L.EditToolbar.Delete(map, {

            featureGroup:
                drawnItems

        });

    deleteHandler.enable();

}

/* =========================================================
   SAVE STYLE
========================================================= */

function saveLayerStyle(layer){

    if(!layer.feature){

        layer.feature = {

            type:"Feature",
            properties:{}

        };

    }

    layer.feature.properties.style = {

        color:
            layer.options.color || "#ff0000",

        weight:
            layer.options.weight || 4,

        dashArray:
            layer.options.dashArray || ""

    };

}

/* =========================================================
   DRAW EVENTS
========================================================= */

map.on(L.Draw.Event.CREATED, function(e){

    const layer = e.layer;

    saveLayerStyle(layer);

    drawnItems.addLayer(layer);

    disableDrawing();

    saveCampaign();

});

map.on(
    L.Draw.Event.EDITED,
    function(e){

        e.layers.eachLayer(layer=>{

            saveLayerStyle(layer);

        });

        saveCampaign();

    }
);

map.on(
    L.Draw.Event.DELETED,
    saveCampaign
);

/* =========================================================
   MENUS
========================================================= */

function toggleMenu(id){
    const all = ['markerDropdown','drawDropdown','effectDropdown'];
    all.forEach(otherId => {
        if (otherId !== id) document.getElementById(otherId)?.classList.remove('open');
    });
    document.getElementById(id)?.classList.toggle('open');
}

/* =========================================================
   MARKERS
========================================================= */

let activeIcon = null;

const markers = [];

/* =========================================================
   CSOPORT ALAPÚ RAJZ TÁROLÁS
========================================================= */

// Minden csoportnak saját rajzai és markerei vannak
const groupState = {
    '3724': { drawings: null, markers: [] },
    '3715': { drawings: null, markers: [] },
    '3692': { drawings: null, markers: [] },
};

function saveGroupState(groupKey) {
    drawnItems.eachLayer(layer => saveLayerStyle(layer));
    groupState[groupKey].drawings = drawnItems.toGeoJSON();
    groupState[groupKey].markers = markers.map(m => ({
        latlng: m.getLatLng(),
        data: m.data
    }));
}

function loadGroupState(groupKey) {
    // Töröljük a jelenlegi rajzokat és markereket
    drawnItems.clearLayers();
    markers.forEach(m => map.removeLayer(m));
    markers.length = 0;

    const state = groupState[groupKey];
    if (!state) return;

    // Rajzok visszatöltése
    if (state.drawings) {
        L.geoJSON(state.drawings, {
            style: feature => feature.properties?.style || { color:'#ff0000', weight:4, dashArray:'' },
            onEachFeature: (feature, layer) => {
                if (feature.properties?.style) layer.setStyle(feature.properties.style);
                drawnItems.addLayer(layer);
            }
        });
    }

    // Markerek visszatöltése
    state.markers.forEach(m => {
        const marker = L.marker(m.latlng, {
            icon: L.divIcon({
                className: '',
                html: buildMarkerHTML(m.data),
                iconSize: [120, 40],
                iconAnchor: [60, 40],
                popupAnchor: [0, -40]
            })
        });
        marker.data = m.data;
        marker.addTo(map);
        markers.push(marker);
        marker.on('click', () => openMarkerEditor(marker));
    });
}

document.querySelectorAll('.markerBtn')
.forEach(btn=>{

    btn.onclick = ()=>{

        disableDrawing();

        const alreadyActive =
            btn.classList.contains('active');

        deactivateMarkerMode();

        if(alreadyActive){

            return;

        }

        btn.classList.add('active');

        activeIcon =
            btn.dataset.icon;

    };

});

map.on('click', function(e){

    if(!activeIcon) return;
    if(!canEdit()) return;

    createRPGMarker(
        e.latlng,
        activeIcon
    );

});

/* =========================================================
   CREATE MARKER
========================================================= */

function buildMarkerHTML(data){
    const sz = data.size || 30;
    const outline = data.outline !== false;
    return `<div style="text-align:center;">
        <div class="customMarker" style="font-size:${sz}px;${outline?'-webkit-text-stroke:2px black;paint-order:stroke fill;':''}">
            ${data.icon}
        </div>
        <div class="markerLabel">${data.name || ''}</div>
    </div>`;
}

function createRPGMarker(latlng, icon){

    const marker =
        L.marker(latlng, {

            icon:L.divIcon({

                className:'',

                html:buildMarkerHTML({

                    icon,
                    name:''

                }),

                iconSize:[120,40],

iconAnchor:[60,40],
popupAnchor:[0,-40]

            })

        });

    marker.data = {

        icon,
        name:'',
        description:''

    };

    const iconH = (marker.data.size || 30) + 20;
    marker.setIcon(L.divIcon({
        className:'',
        html: buildMarkerHTML(marker.data),
        iconSize:[120, iconH],
        iconAnchor:[60, iconH],
        popupAnchor:[0, -iconH]
    }));
    marker.addTo(map);
    markers.push(marker);
    _justPlaced = true;
    setTimeout(() => { _justPlaced = false; }, 300);
    openMarkerEditor(marker);
    marker.on('click', function(ev) {
        L.DomEvent.stopPropagation(ev);
        if (_justPlaced) return;
        openMarkerEditor(marker);
    });

    // Auto-deselect: lerakás után ki kell kapcsolni az ikont
    deactivateMarkerMode();

    saveCampaign();
}

/* =========================================================
   MARKER EDITOR
========================================================= */

function openMarkerEditor(marker){
    const d = marker.data;

    if (!canEdit()) {
        // Readonly popup: csak név és leírás
        const roHtml = `<div class="popupForm" style="max-width:200px;">
            ${d.name ? `<div style="font-weight:700;color:#e2e8f0;font-size:.9rem;">${d.name}</div>` : ''}
            ${d.description ? `<div style="color:#94a3b8;font-size:.8rem;margin-top:4px;">${d.description}</div>` : ''}
            ${!d.name && !d.description ? `<div style="color:#64748b;font-size:.8rem;">Névtelen jelölő</div>` : ''}
        </div>`;
        marker.bindPopup(roHtml).openPopup();
        return;
    }

    const size = d.size || 30;
    const outline = d.outline !== undefined ? d.outline : true;

    const html = `
        <div class="popupForm">
            <input id="markerName" placeholder="Név" value="${d.name}"/>
            <textarea id="markerDesc" rows="3" placeholder="Leírás">${d.description}</textarea>
            <label style="color:#94a3b8;font-size:11px;display:flex;flex-direction:column;gap:3px;">
                Méret (${size}px)
                <input type="range" id="markerSize" min="14" max="60" value="${size}"
                    oninput="this.previousElementSibling.textContent='Méret ('+this.value+'px)'">
            </label>
            <label style="color:#94a3b8;font-size:11px;display:flex;align-items:center;gap:6px;">
                <input type="checkbox" id="markerOutline" ${outline?'checked':''}>
                Körvonal
            </label>
            <div class="popupButtons">
                <button class="saveBtn" onclick="saveMarkerPopup()">Mentés</button>
                <button class="deleteBtn" onclick="deleteMarkerPopup()">Törlés</button>
            </div>
        </div>
    `;

    marker.bindPopup(html).openPopup();
    window.currentEditingMarker = marker;
}

/* =========================================================
   SAVE MARKER
========================================================= */

window.saveMarkerPopup = function(){
    const marker = window.currentEditingMarker;
    marker.data.name = document.getElementById('markerName').value;
    marker.data.description = document.getElementById('markerDesc').value;
    marker.data.size = parseInt(document.getElementById('markerSize').value) || 30;
    marker.data.outline = document.getElementById('markerOutline').checked;

    const iconH = marker.data.size + 20;
    marker.setIcon(L.divIcon({
        className:'',
        html: buildMarkerHTML(marker.data),
        iconSize:[120, iconH],
        iconAnchor:[60, iconH],
        popupAnchor:[0, -iconH]
    }));
    marker.closePopup();
    saveCampaign();
};

/* =========================================================
   DELETE MARKER
========================================================= */

window.deleteMarkerPopup = function(){

    const marker =
        window.currentEditingMarker;

    map.removeLayer(marker);

    const index =
        markers.indexOf(marker);

    if(index > -1){

        markers.splice(index,1);

    }

    saveCampaign();

};

/* =========================================================
   SAVE CAMPAIGN
========================================================= */

function saveCampaign(){
    saveGroupState(activeMapGroup);
    const campaign = {
        version: 2,
        activeGroup: activeMapGroup,
        activeLayer: activeLayerName,
        groups: groupState,
        effects: effects.map(em => ({
            latlng: em.getLatLng(),
            efxData: em.efxData
        }))
    };
    localStorage.setItem('ynev_campaign', JSON.stringify(campaign));
    window.scheduleSave();
}

/* =========================================================
   LOAD CAMPAIGN
========================================================= */

function loadCampaign(data){
    // data lehet localStorage string vagy direkt objektum (Supabase-ből)
    let campaign;
    if (data) {
        campaign = (typeof data === 'string') ? JSON.parse(data) : data;
    } else {
        const raw = localStorage.getItem('ynev_campaign');
        if (!raw) return;
        campaign = JSON.parse(raw);
    }

    if (campaign.version === 2 && campaign.groups) {
        // Új formátum: csoportos
        Object.keys(groupState).forEach(grp => {
            if (campaign.groups[grp]) {
                groupState[grp].drawings = campaign.groups[grp].drawings || null;
                groupState[grp].markers  = campaign.groups[grp].markers  || [];
            }
        });
        activeMapGroup  = campaign.activeGroup  || '3724';
        activeLayerName = campaign.activeLayer  || '3724_domborzati';
    } else {
        // Régi formátum: drawings + markers közvetlenül → 3724 csoportba kerül
        groupState['3724'].drawings = campaign.drawings || null;
        groupState['3724'].markers  = campaign.markers  || [];
        activeMapGroup  = '3724';
        activeLayerName = '3724_domborzati';
    }

    // Aktív csoport megjelenítése
    loadGroupState(activeMapGroup);

    // Effektek betöltése
    if (campaign.effects && Array.isArray(campaign.effects)) {
        effects.forEach(em => map.removeLayer(em));
        effects.length = 0;
        campaign.effects.forEach(e => {
            const def = EFFECT_DEFS[e.efxData?.key];
            if (!def) return;
            const {key, color, size} = e.efxData;
            const sc = EFFECT_SIZE_MAP[size] || 1;
            const sz = Math.round(56 * sc);
            const em = L.marker(e.latlng, {
                icon: L.divIcon({
                    className:'',
                    html:`<div data-efx="${key}" data-color="${color}" data-size="${size}">${def.build(color,size)}</div>`,
                    iconSize:[sz,sz], iconAnchor:[sz/2,sz/2]
                })
            });
            em.efxData = {key, color, size};
            em.addTo(map);
            em.on('click', () => openEffectEditor(em));
            effects.push(em);
        });
    }
}

/* =========================================================
   EXPORT
========================================================= */

function exportCampaign(){
    saveCampaign();
    const raw = localStorage.getItem('ynev_campaign');
    const blob = new Blob([raw], { type:'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'ynev_campaign.json';
    a.click();
}

/* =========================================================
   IMPORT
========================================================= */

function importCampaign(){

    const input =
        document.createElement('input');

    input.type='file';

    input.accept='.json';

    input.onchange=e=>{

        const file =
            e.target.files[0];

        const reader =
            new FileReader();

        reader.onload=evt=>{
            try {
                const data = JSON.parse(evt.target.result);
                loadCampaign(data);
                saveCampaign(); // localStorage frissítése is
            } catch(e) {
                alert('Import hiba: ' + e.message);
            }
        };

        reader.readAsText(file);

    };

    input.click();

}

/* =========================================================
   CLEAR
========================================================= */

function clearEverything(){
    disableDrawing();
    deactivateMarkerMode();
    drawnItems.clearLayers();
    markers.forEach(m => map.removeLayer(m));
    markers.length = 0;
    effects.forEach(em => map.removeLayer(em));
    effects.length = 0;
    activeEffectKey = null;
    document.querySelectorAll('.effect-preview').forEach(b => b.classList.remove('active'));
    Object.keys(groupState).forEach(grp => {
        groupState[grp].drawings = null;
        groupState[grp].markers = [];
    });
    localStorage.removeItem('ynev_campaign');
    window.scheduleSave();
}

/* =========================================================
   GRID
========================================================= */

let gridLayer = null;

function toggleGrid(){

    if(gridLayer){

        map.removeLayer(gridLayer);

        gridLayer = null;

        return;

    }

    gridLayer =
        L.layerGroup();

    const step = 256;

    for(let x=0; x<=MAP_WIDTH; x+=step){

        L.polyline(

            [

                [0,x],

                [MAP_HEIGHT,x]

            ],

            {

                color:'#00000033',

                weight:1

            }

        ).addTo(gridLayer);

    }

    for(let y=0; y<=MAP_HEIGHT; y+=step){

        L.polyline(

            [

                [y,0],

                [y,MAP_WIDTH]

            ],

            {

                color:'#00000033',

                weight:1

            }

        ).addTo(gridLayer);

    }

    gridLayer.addTo(map);

}

function buildEffectMenu(){
    const list = document.getElementById('effectList');
    if (!list) return;
    list.innerHTML = '';
    list.style.cssText = 'display:flex;flex-direction:column;gap:6px;';
    Object.entries(EFFECT_DEFS).forEach(([key, def]) => {
        const btn = document.createElement('button');
        btn.className = 'effect-preview';
        btn.title = def.label;
        btn.dataset.key = key;
        const c = document.getElementById('effectColor')?.value || '#000000';
        const s = effectSize;
        btn.innerHTML = def.build(c, s);
        btn.onclick = () => setActiveEffect(key, btn);
        list.appendChild(btn);
    });
}

function setActiveEffect(key, btn) {
    activeEffectKey = (activeEffectKey === key) ? null : key;
    document.querySelectorAll('.effect-preview').forEach(b => b.classList.remove('active'));
    if (activeEffectKey) btn.classList.add('active');
    // Ikon kiválasztás megszüntetése
    if (activeEffectKey) deactivateMarkerMode();
}

function setEffectSize(size, btn) {
    effectSize = size;
    document.querySelectorAll('.effect-size-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    buildEffectMenu();
}

document.addEventListener('DOMContentLoaded', () => {
    buildEffectMenu();
    document.getElementById('effectColor')?.addEventListener('input', () => buildEffectMenu());

    // ?mode=admin ÉS admin role → effekt menü megjelenítése
    const urlParams = new URLSearchParams(window.location.search);
    const isAdminMode = urlParams.get('mode') === 'admin';
    // Várjuk meg amíg a profil betölt, aztán ellenőrizzük a role-t
    function checkAdminMode() {
        if (!window._userProfile) { setTimeout(checkAdminMode, 100); return; }
        if (isAdminMode && window._userProfile.role === 'admin') {
            const efxBlock = document.getElementById('effectMenuBlock');
            if (efxBlock) efxBlock.style.display = '';
        }
        // Kompakt mód: ha iframe-ben vagyunk (window !== window.top)
        if (window !== window.top || isAdminMode) {
            document.body.classList.add('compact-menu');
        }
    }
    checkAdminMode();

    // Save panel kívülre kattintásra bezár
    document.addEventListener('click', function(e) {
        const panel = document.getElementById('savePanel');
        if (!panel) return;
        if (!panel.contains(e.target) && !e.target.closest('[onclick*="toggleSavePanel"]')) {
            panel.classList.remove('open');
        }
    });
});

    const sz = Math.round(56 * sc);
    const effectMarker = L.marker(e.latlng, {
        icon: L.divIcon({
            className: '',
            html: `<div data-efx="${activeEffectKey}" data-color="${c}" data-size="${s}">${html}</div>`,
            iconSize: [sz, sz],
            iconAnchor: [sz/2, sz/2],
        })
    });
    effectMarker.efxData = { key: activeEffectKey, color: c, size: s };
    effectMarker.addTo(map);
    effects.push(effectMarker);
    _justPlaced = true;
    setTimeout(() => { _justPlaced = false; }, 300);
    // Kattintásra szerkesztés/törlés
    effectMarker.on('click', function(ev) {
        L.DomEvent.stopPropagation(ev);
        if (_justPlaced) return;
        openEffectEditor(effectMarker);
    });
    // Auto-deselect
    activeEffectKey = null;
    document.querySelectorAll('.effect-preview').forEach(b => b.classList.remove('active'));
    saveCampaign();
});

function openEffectEditor(em) {
    const d = em.efxData;
    const def = EFFECT_DEFS[d.key];

    if (!canEdit()) {
        // Readonly: csak a neve jelenik meg
        const roHtml = `<div class="popupForm" style="max-width:160px;">
            <div style="color:#c084fc;font-size:.85rem;font-weight:600;">${def.label}</div>
        </div>`;
        em.bindPopup(roHtml).openPopup();
        return;
    }

    const html = `<div class="popupForm">
        <div style="color:#c084fc;font-size:.85rem;font-weight:600;">${def.label}</div>
        <label style="color:#94a3b8;font-size:11px;display:flex;flex-direction:column;gap:3px;">
            Szín <input type="color" id="efxColorEdit" value="${d.color}">
        </label>
        <div style="display:flex;gap:4px;" id="efxSizeEdit">
            ${['S','M','L'].map(s=>`<button class="effect-size-btn${s===d.size?' active':''}" onclick="setEfxEditSize('${s}',this)">${s}</button>`).join('')}
        </div>
        <div class="popupButtons">
            <button class="saveBtn" onclick="saveEffectPopup()">Mentés</button>
            <button class="deleteBtn" onclick="deleteEffectPopup()">Törlés</button>
        </div>
    </div>`;
    em.bindPopup(html).openPopup();
    window.currentEditingEffect = em;
}

window.setEfxEditSize = function(s, btn) {
    document.querySelectorAll('#efxSizeEdit .effect-size-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    btn.dataset.selected = 'true';
}

window.saveEffectPopup = function() {
    const em = window.currentEditingEffect;
    const c = document.getElementById('efxColorEdit').value;
    const sBtn = document.querySelector('#efxSizeEdit .effect-size-btn.active');
    const s = sBtn ? sBtn.textContent : em.efxData.size;
    em.efxData.color = c;
    em.efxData.size = s;
    const def = EFFECT_DEFS[em.efxData.key];
    const sc = EFFECT_SIZE_MAP[s];
    const sz = Math.round(56 * sc);
    em.setIcon(L.divIcon({
        className: '',
        html: `<div data-efx="${em.efxData.key}" data-color="${c}" data-size="${s}">${def.build(c,s)}</div>`,
        iconSize:[sz,sz], iconAnchor:[sz/2,sz/2]
    }));
    em.closePopup();
    saveCampaign();
};

window.deleteEffectPopup = function() {
    const em = window.currentEditingEffect;
    map.removeLayer(em);
    const i = effects.indexOf(em);
    if (i > -1) effects.splice(i, 1);
    saveCampaign();
};

/* =========================================================
   AUTO LOAD
========================================================= */

loadCampaign();

</script>
<script>

/* =========================
   FLOATING RUNES
========================= */

(() => {

    const container =
        document.getElementById('magic-particles');

    if(!container) return;

    const runes =
        ['✦','☽','☼','ᚱ','ᛟ','✧'];

    function createRune(){

        const rune =
            document.createElement('div');

        rune.className = 'rune';

        rune.innerText =
            runes[
                Math.floor(Math.random()*runes.length)
            ];

        rune.style.left =
            Math.random()*100 + 'vw';

        rune.style.animationDuration =
            10 + Math.random()*15 + 's';

        rune.style.fontSize =
            10 + Math.random()*18 + 'px';

        container.appendChild(rune);

        setTimeout(() => {

            rune.remove();

        },25000);

    }

    setInterval(createRune,1400);

})();

/* =========================
   SUBTLE PARALLAX
========================= */

document.addEventListener('mousemove', e => {

    const x =
        (e.clientX / window.innerWidth - .5) * 10;

    const y =
        (e.clientY / window.innerHeight - .5) * 10;

    document.body.style.backgroundPosition =

</script>
<script>
  // ─── USERNAME ───────────────────────────────────────────────────
  function trySetUsername() {
    const el = document.getElementById('auth-username')
    if (!el) { setTimeout(trySetUsername, 50); return }
    if (window._userProfile) {
      el.textContent = window._userProfile.display_name
    } else {
      setTimeout(trySetUsername, 50)
    }
  }
  setTimeout(trySetUsername, 100)

  // ─── LOGOUT ─────────────────────────────────────────────────────
  async function doLogout() {
    try {
      await window._sb.auth.signOut()
      Object.keys(localStorage).filter(k => k.startsWith('sb-')).forEach(k => localStorage.removeItem(k))
    } catch(e) {}
    window.location.href = 'login.html'
  }

  // ─── AUTOSAVE ───────────────────────────────────────────────────
  let _saveTimer = null

  // ─── JOGOSULTSÁG HELPER ────────────────────────────────────
  function canEdit() {
    // Admin ?mode=admin URL-lel: mindent szerkeszthet
    const urlParams = new URLSearchParams(window.location.search)
    if (urlParams.get('mode') === 'admin' && window._userProfile?.role === 'admin') return true
    // Player: nem szerkeszthet
    return false
  }

  window.scheduleSave = function() {
    if (_saveTimer) clearTimeout(_saveTimer)
    _saveTimer = setTimeout(window.saveToSupabase, 1500)
  }

  window.saveToSupabase = async function() {
    if (!window._sb || !window._userProfile) return
    const { data: { user } } = await window._sb.auth.getUser()
    if (!user) return
    saveGroupState(activeMapGroup)
    const efxData = effects.map(em => ({ latlng: em.getLatLng(), efxData: em.efxData }))
    const { error } = await window._sb.from('map_states').upsert({
      user_id: user.id,
      drawings: { version:2, groups: groupState, effects: efxData },
      markers: {},
      active_layer: activeLayerName,
      updated_at: new Date().toISOString()
    }, { onConflict: 'user_id' })
    if (!error) window.showSaveIndicator()
    else console.error('Mentési hiba:', error)
  }

  window.loadFromSupabase = async function() {
    if (!window._sb) { setTimeout(window.loadFromSupabase, 100); return }
    const { data: { user } } = await window._sb.auth.getUser()
    if (!user) return
    const { data } = await window._sb.from('map_states')
      .select('*').eq('user_id', user.id).single()
    if (data) {
      if (data.drawings?.version === 2 && data.drawings?.groups) {
        Object.keys(groupState).forEach(grp => {
          if (data.drawings.groups[grp]) {
            groupState[grp].drawings = data.drawings.groups[grp].drawings || null
            groupState[grp].markers  = data.drawings.groups[grp].markers  || []
          }
        })
        activeMapGroup  = data.active_layer ? layerNameToGroup(data.active_layer) : '3724'
        activeLayerName = data.active_layer || '3724_domborzati'
        // Effektek visszatöltése
        if (data.drawings.effects) {
          effects.forEach(em => map.removeLayer(em))
          effects.length = 0
          data.drawings.effects.forEach(e => {
            const def = EFFECT_DEFS[e.efxData?.key]
            if (!def) return
            const {key,color,size} = e.efxData
            const sc = EFFECT_SIZE_MAP[size]||1
            const sz = Math.round(56*sc)
            const em = L.marker(e.latlng, { icon: L.divIcon({
              className:'', html:`<div data-efx="${key}">${def.build(color,size)}</div>`,
              iconSize:[sz,sz], iconAnchor:[sz/2,sz/2]
            })})
            em.efxData = {key,color,size}
            em.addTo(map)
            em.on('click', () => openEffectEditor(em))
            effects.push(em)
          })
        }
      } else if (data.drawings) {
        groupState['3724'].drawings = data.drawings
        groupState['3724'].markers  = data.markers || []
        activeMapGroup  = '3724'
        activeLayerName = '3724_domborzati'
      }
      loadGroupState(activeMapGroup)
    }
  }

  // ─── SUPABASE MENTÉS LISTA ──────────────────────────────────
  window.toggleSavePanel = function() {
    const p = document.getElementById('savePanel')
    if (!p) return
    p.classList.toggle('open')
    if (p.classList.contains('open')) window.loadSaveList()
  }

  window.loadSaveList = async function() {
    if (!window._sb) return
    const { data: { user } } = await window._sb.auth.getUser()
    if (!user) return
    const { data } = await window._sb.from('map_saves')
      .select('id,name,created_at').eq('user_id', user.id)
      .order('created_at', { ascending: false })
    const list = document.getElementById('saveList')
    if (!list) return
    if (!data || data.length === 0) {
      list.innerHTML = '<div style="color:#64748b;font-size:.78rem;">Nincs mentés</div>'
      return
    }
    list.innerHTML = data.map(s => `
      <div class="save-item">
        <span class="save-item-name" onclick="window.loadSaveItem('${s.id}')" title="${new Date(s.created_at).toLocaleString('hu-HU')}">
          ${s.name}
        </span>
        <button class="save-item-del" onclick="window.deleteSaveItem('${s.id}')" title="Törlés">✕</button>
      </div>`).join('')
  }

  window.saveToList = async function() {
    const name = document.getElementById('saveNameInput')?.value?.trim()
    if (!name) { alert('Adj nevet a mentésnek!'); return }
    if (!window._sb) return
    const { data: { user } } = await window._sb.auth.getUser()
    if (!user) return
    saveGroupState(activeMapGroup)
    const efxData = effects.map(em => ({ latlng: em.getLatLng(), efxData: em.efxData }))
    const { error } = await window._sb.from('map_saves').insert({
      user_id: user.id,
      name,
      drawings: { version:2, groups: groupState, effects: efxData },
      markers: {},
      active_layer: activeLayerName
    })
    if (!error) {
      document.getElementById('saveNameInput').value = ''
      window.loadSaveList()
      window.showSaveIndicator()
    } else console.error('Mentési hiba:', error)
  }

  window.loadSaveItem = async function(id) {
    if (!window._sb) return
    const { data } = await window._sb.from('map_saves').select('*').eq('id', id).single()
    if (!data) return
    effects.forEach(em => map.removeLayer(em)); effects.length = 0
    markers.forEach(m => map.removeLayer(m)); markers.length = 0
    drawnItems.clearLayers()
    if (data.drawings?.version === 2 && data.drawings?.groups) {
      Object.keys(groupState).forEach(grp => {
        groupState[grp].drawings = data.drawings.groups[grp]?.drawings || null
        groupState[grp].markers  = data.drawings.groups[grp]?.markers  || []
      })
      activeMapGroup  = data.active_layer ? layerNameToGroup(data.active_layer) : '3724'
      activeLayerName = data.active_layer || '3724_domborzati'
      if (data.drawings.effects) {
        data.drawings.effects.forEach(e => {
          const def = EFFECT_DEFS[e.efxData?.key]; if (!def) return
          const {key,color,size} = e.efxData
          const sc = EFFECT_SIZE_MAP[size]||1; const sz = Math.round(56*sc)
          const em = L.marker(e.latlng, { icon: L.divIcon({
            className:'', html:`<div data-efx="${key}">${def.build(color,size)}</div>`,
            iconSize:[sz,sz], iconAnchor:[sz/2,sz/2]
          })})
          em.efxData={key,color,size}; em.addTo(map)
          em.on('click', () => openEffectEditor(em)); effects.push(em)
        })
      }
    }
    loadGroupState(activeMapGroup)
    document.getElementById('savePanel')?.classList.remove('open')
  }

  window.deleteSaveItem = async function(id) {
    if (!confirm('Törlöd ezt a mentést?')) return
    if (!window._sb) return
    const { data: { user } } = await window._sb.auth.getUser()
    await window._sb.from('map_saves').delete().eq('id', id).eq('user_id', user.id)
    window.loadSaveList()
  }

  // ─── KAMPÁNY BETÖLTÉSE (admin publikált adatok) ──────────────
  window.loadCampaignFromAdmin = async function() {
    if (!window._sb) return
    const { data: { user } } = await window._sb.auth.getUser()
    if (!user) return
    // Lekérjük a publikált kampány térképet
    const { data, error } = await window._sb
      .from('campaign_maps')
      .select('*')
      .eq('published', true)
      .order('updated_at', { ascending: false })
      .limit(1)
      .maybeSingle()
    if (error) { console.error('Kampány betöltési hiba:', error); return }
    if (!data) { alert('Nincs publikált kampány térkép.'); return }
    // Töröljük a jelenlegi rajzokat
    effects.forEach(em => map.removeLayer(em)); effects.length = 0
    markers.forEach(m => map.removeLayer(m)); markers.length = 0
    drawnItems.clearLayers()
    // Betöltjük a kampány adatokat
    if (data.drawings?.version === 2 && data.drawings?.groups) {
      Object.keys(groupState).forEach(grp => {
        if (data.drawings.groups[grp]) {
          groupState[grp].drawings = data.drawings.groups[grp]?.drawings || null
          groupState[grp].markers  = data.drawings.groups[grp]?.markers  || []
        }
      })
      activeMapGroup  = data.active_layer ? layerNameToGroup(data.active_layer) : '3724'
      activeLayerName = data.active_layer || '3724_domborzati'
      // Effektek betöltése
      if (data.drawings.effects) {
        data.drawings.effects.forEach(e => {
          const def = EFFECT_DEFS[e.efxData?.key]; if (!def) return
          const {key, color, size} = e.efxData
          const sc = EFFECT_SIZE_MAP[size] || 1
          const sz = Math.round(56 * sc)
          const em = L.marker(e.latlng, { icon: L.divIcon({
            className: '', html: `<div data-efx="${key}">${def.build(color, size)}</div>`,
            iconSize: [sz, sz], iconAnchor: [sz/2, sz/2]
          })})
          em.efxData = {key, color, size}
          em.addTo(map)
          em.on('click', function(ev) { L.DomEvent.stopPropagation(ev); if(_justPlaced) return; openEffectEditor(em); })
          effects.push(em)
        })
      }
    }
    loadGroupState(activeMapGroup)
    window.showSaveIndicator()
  }

  window.showSaveIndicator = function() {
    let el = document.getElementById('save-indicator')
    if (!el) return
    el.style.opacity = '1'
    setTimeout(() => el.style.opacity = '0', 1500)
  }

  window.addEventListener('load', () => setTimeout(window.loadFromSupabase, 500))

  // ─── IFRAME postMessage KOMMUNIKÁCIÓ ────────────────────────
  window.addEventListener('message', function(e) {
    if (e.data?.type === 'LOAD_CAMPAIGN_MAP') {
      // Sabloneditor tölt be egy kampány térképet
      const data = e.data.payload;
      if (data.drawings?.version === 2 && data.drawings?.groups) {
        Object.keys(groupState).forEach(grp => {
          if (data.drawings.groups[grp]) {
            groupState[grp].drawings = data.drawings.groups[grp]?.drawings || null;
            groupState[grp].markers  = data.drawings.groups[grp]?.markers  || [];
          }
        });
        activeMapGroup  = data.active_layer ? layerNameToGroup(data.active_layer) : '3724';
        activeLayerName = data.active_layer || '3724_domborzati';
        effects.forEach(em => map.removeLayer(em)); effects.length = 0;
        if (data.drawings.effects) {
          data.drawings.effects.forEach(e => {
            const def = EFFECT_DEFS[e.efxData?.key]; if (!def) return;
            const {key,color,size} = e.efxData;
            const sc = EFFECT_SIZE_MAP[size]||1; const sz = Math.round(56*sc);
            const em = L.marker(e.latlng, { icon: L.divIcon({
              className:'', html:`<div data-efx="${key}">${def.build(color,size)}</div>`,
              iconSize:[sz,sz], iconAnchor:[sz/2,sz/2]
            })});
            em.efxData={key,color,size}; em.addTo(map);
            em.on('click', function(ev) { L.DomEvent.stopPropagation(ev); openEffectEditor(em); });
            effects.push(em);
          });
        }
        loadGroupState(activeMapGroup);
      }
    }

    if (e.data?.type === 'REQUEST_MAP_STATE') {
      // Sabloneditor kér állapotot mentéshez
      saveGroupState(activeMapGroup);
      const efxData = effects.map(em => ({ latlng: em.getLatLng(), efxData: em.efxData }));
      e.source.postMessage({
        type: 'MAP_STATE_RESPONSE',
        payload: {
          drawings: { version:2, groups: groupState, effects: efxData },
          activeLayer: activeLayerName
        }
      }, '*');
    }
  });

</script>

<div id="save-indicator" style="position:fixed;bottom:1rem;right:1rem;background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:#34d399;font-size:.75rem;padding:.4rem .8rem;border-radius:.5rem;opacity:0;transition:opacity .5s;pointer-events:none;z-index:999;">✓ Mentve</div>
</body>
