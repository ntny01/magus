<script>

/* =========================================================
   TILE CONFIG
========================================================= */

const TILE_SIZE = 256;

const X_MAX = 25;
const Y_MAX = 39;

const MAP_WIDTH =
    (X_MAX + 1) * TILE_SIZE;

const MAP_HEIGHT =
    (Y_MAX + 1) * TILE_SIZE;

/* =========================================================
   MAP
========================================================= */

const map = L.map('map', {

    crs:L.CRS.Simple,

    minZoom:-2,
    maxZoom:4,

    zoomSnap:0.25,

    attributionControl:false,

});

const bounds = [

    [0,0],

    [MAP_HEIGHT, MAP_WIDTH]

];

/* =========================================================
   TILE GROUPS
========================================================= */

const topoGroup =
    L.layerGroup();

const politicalGroup =
    L.layerGroup();

/* =========================================================
   TILE BUILDER
========================================================= */

function buildTiles(basePath, group){

    for(let x=0; x<=X_MAX; x++){

        for(let y=0; y<=Y_MAX; y++){

            const flippedY =
                Y_MAX - y;

            const imageUrl =
`${basePath}/6/${x}/${flippedY}.png`;

            const left =
                x * TILE_SIZE;

            const top =
                y * TILE_SIZE;

            const bounds = [

                [top,left],

                [
                    top + TILE_SIZE,
                    left + TILE_SIZE
                ]

            ];

            const overlay =
                L.imageOverlay(
                    imageUrl,
                    bounds,
                    {
                        interactive:false,
                        opacity:1
                    }
                );

            overlay.on('error', ()=>{

                overlay.setOpacity(0);

            });

            overlay.addTo(group);

        }

    }

}

/* =========================================================
   BUILD MAPS
========================================================= */

buildTiles(
    './terkep_kulon/output/3724_domborzati',
    topoGroup
);

buildTiles(
    './terkep_kulon/output/3724_politikai',
    politicalGroup
);

topoGroup.addTo(map);

L.control.layers({

    "3724 Domborzati":
        topoGroup,

    "3724 Politikai":
        politicalGroup,

}).addTo(map);

map.fitBounds(bounds);

/* =========================================================
   DRAW SYSTEM
========================================================= */

const drawnItems =
    new L.FeatureGroup();

map.addLayer(drawnItems);

let currentDrawer = null;
let editHandler = null;
let deleteHandler = null;

/* =========================================================
   HELPERS
========================================================= */

function clearActiveButtons(){

    document
    .querySelectorAll('.iconBtn')
    .forEach(btn=>{

        btn.classList.remove('active');

    });

}

function disableDrawing(){

    if(currentDrawer){

        currentDrawer.disable();
        currentDrawer = null;

    }

    if(editHandler){

        editHandler.disable();
        editHandler = null;

    }

    if(deleteHandler){

        deleteHandler.disable();
        deleteHandler = null;

    }

    clearActiveButtons();

}

function deactivateMarkerMode(){

    activeIcon = null;

    document
    .querySelectorAll('.markerBtn')
    .forEach(btn=>{

        btn.classList.remove('active');

    });

}

function getDrawStyle(){

    return {

        color:
            document.getElementById(
                'drawColor'
            ).value,

        weight:
            parseInt(
                document.getElementById(
                    'drawWeight'
                ).value
            ),

        dashArray:
            document.getElementById(
                'drawDash'
            ).value,

        smoothFactor:2

    };

}

/* =========================================================
   DRAW
========================================================= */

function startDraw(type, btn){

    deactivateMarkerMode();

    disableDrawing();

    btn.classList.add('active');

    const style =
        getDrawStyle();

    if(type === 'polyline'){

        currentDrawer =
            new L.Draw.Polyline(map, {

                shapeOptions:style,

                guidelineDistance:20,

                repeatMode:false

            });

    }

    if(type === 'polygon'){

        currentDrawer =
            new L.Draw.Polygon(map, {

                shapeOptions:style,

                showArea:true,

                repeatMode:false

            });

    }

    currentDrawer.enable();

}

function enableEdit(btn){

    deactivateMarkerMode();

    disableDrawing();

    btn.classList.add('active');

    editHandler =
        new L.EditToolbar.Edit(map, {

            featureGroup:
                drawnItems

        });

    editHandler.enable();

}

function deleteMode(btn){

    deactivateMarkerMode();

    disableDrawing();

    btn.classList.add('active');

    deleteHandler =
        new L.EditToolbar.Delete(map, {

            featureGroup:
                drawnItems

        });

    deleteHandler.enable();

}

/* =========================================================
   SAVE STYLE
========================================================= */

function saveLayerStyle(layer){

    if(!layer.feature){

        layer.feature = {

            type:"Feature",
            properties:{}

        };

    }

    layer.feature.properties.style = {

        color:
            layer.options.color || "#ff0000",

        weight:
            layer.options.weight || 4,

        dashArray:
            layer.options.dashArray || ""

    };

}

/* =========================================================
   DRAW EVENTS
========================================================= */

map.on(L.Draw.Event.CREATED, function(e){

    const layer = e.layer;

    saveLayerStyle(layer);

    drawnItems.addLayer(layer);

    disableDrawing();

    saveCampaign();

});

map.on(
    L.Draw.Event.EDITED,
    function(e){

        e.layers.eachLayer(layer=>{

            saveLayerStyle(layer);

        });

        saveCampaign();

    }
);

map.on(
    L.Draw.Event.DELETED,
    saveCampaign
);

/* =========================================================
   MENUS
========================================================= */

function toggleMenu(id){

    document
    .getElementById(id)
    .classList.toggle('open');

}

/* =========================================================
   MARKERS
========================================================= */

let activeIcon = null;

const markers = [];

document.querySelectorAll('.markerBtn')
.forEach(btn=>{

    btn.onclick = ()=>{

        disableDrawing();

        const alreadyActive =
            btn.classList.contains('active');

        deactivateMarkerMode();

        if(alreadyActive){

            return;

        }

        btn.classList.add('active');

        activeIcon =
            btn.dataset.icon;

    };

});

map.on('click', function(e){

    if(!activeIcon) return;

    createRPGMarker(
        e.latlng,
        activeIcon
    );

});

/* =========================================================
   CREATE MARKER
========================================================= */

function buildMarkerHTML(data){

    return `

        <div style="text-align:center;">

            <div class="customMarker">
                ${data.icon}
            </div>

            <div class="markerLabel">
                ${data.name || ""}
            </div>

        </div>

    `;

}

function createRPGMarker(latlng, icon){

    const marker =
        L.marker(latlng, {

            icon:L.divIcon({

                className:'',

                html:buildMarkerHTML({

                    icon,
                    name:''

                }),

                iconSize:[120,40],

iconAnchor:[60,40],
popupAnchor:[0,-40]

            })

        });

    marker.data = {

        icon,
        name:'',
        description:''

    };

    marker.addTo(map);

    markers.push(marker);

    openMarkerEditor(marker);

    marker.on('click', ()=>{

        openMarkerEditor(marker);

    });

    saveCampaign();

}

/* =========================================================
   MARKER EDITOR
========================================================= */

function openMarkerEditor(marker){

    const d =
        marker.data;

    const html = `

        <div class="popupForm">

            <input
                id="markerName"
                placeholder="Név"
                value="${d.name}"
            />

            <textarea
                id="markerDesc"
                rows="4"
                placeholder="Leírás"
            >${d.description}</textarea>

            <div class="popupButtons">

                <button
                    class="saveBtn"
                    onclick="saveMarkerPopup()"
                >
                    Mentés
                </button>

                <button
                    class="deleteBtn"
                    onclick="deleteMarkerPopup()"
                >
                    Törlés
                </button>

            </div>

        </div>

    `;

    marker.bindPopup(html)
    .openPopup();

    window.currentEditingMarker =
        marker;

}

/* =========================================================
   SAVE MARKER
========================================================= */

window.saveMarkerPopup = function(){

    const marker =
        window.currentEditingMarker;

    marker.data.name =
        document.getElementById(
            'markerName'
        ).value;

    marker.data.description =
        document.getElementById(
            'markerDesc'
        ).value;

    marker.setIcon(

        L.divIcon({

            className:'',

            html:buildMarkerHTML(
                marker.data
            ),

            iconSize:[120,40],

  iconAnchor:[60,40],
popupAnchor:[0,-40]

        })

    );

    marker.closePopup();

    saveCampaign();

};

/* =========================================================
   DELETE MARKER
========================================================= */

window.deleteMarkerPopup = function(){

    const marker =
        window.currentEditingMarker;

    map.removeLayer(marker);

    const index =
        markers.indexOf(marker);

    if(index > -1){

        markers.splice(index,1);

    }

    saveCampaign();

};

/* =========================================================
   SAVE CAMPAIGN
========================================================= */

function saveCampaign(){

    drawnItems.eachLayer(layer=>{

        saveLayerStyle(layer);

    });

    const drawData =
        drawnItems.toGeoJSON();

    const markerData =
        markers.map(m=>({

            latlng:m.getLatLng(),

            data:m.data

        }));

    const campaign = {

        drawings:drawData,

        markers:markerData

    };

    localStorage.setItem(
        'ynev_campaign',
        JSON.stringify(campaign)
    );

}

/* =========================================================
   LOAD CAMPAIGN
========================================================= */

function loadCampaign(){

    const raw =
        localStorage.getItem(
            'ynev_campaign'
        );

    if(!raw) return;

    const campaign =
        JSON.parse(raw);

    drawnItems.clearLayers();

    markers.forEach(m=>{

        map.removeLayer(m);

    });

    markers.length = 0;

    L.geoJSON(campaign.drawings, {

        style:feature=>{

            return feature.properties?.style || {

                color:"#ff0000",
                weight:4,
                dashArray:""

            };

        },

        onEachFeature:
            (feature, layer)=>{

                if(feature.properties?.style){

                    layer.setStyle(
                        feature.properties.style
                    );

                }

                drawnItems.addLayer(layer);

            }

    });

    campaign.markers.forEach(m=>{

        const marker =
            L.marker(m.latlng, {

                icon:L.divIcon({

                    className:'',

                    html:buildMarkerHTML(
                        m.data
                    ),

                    iconSize:[120,40],

                   iconAnchor:[60,40],
popupAnchor:[0,-40]

                })

            });

        marker.data =
            m.data;

        marker.addTo(map);

        markers.push(marker);

        marker.on('click', ()=>{

            openMarkerEditor(marker);

        });

    });

}

/* =========================================================
   EXPORT
========================================================= */

function exportCampaign(){

    saveCampaign();

    const raw =
        localStorage.getItem(
            'ynev_campaign'
        );

    const blob =
        new Blob(

            [raw],

            {

                type:'application/json'

            }

        );

    const a =
        document.createElement('a');

    a.href =
        URL.createObjectURL(blob);

    a.download =
        'ynev_campaign.json';

    a.click();

}

/* =========================================================
   IMPORT
========================================================= */

function importCampaign(){

    const input =
        document.createElement('input');

    input.type='file';

    input.accept='.json';

    input.onchange=e=>{

        const file =
            e.target.files[0];

        const reader =
            new FileReader();

        reader.onload=evt=>{

            localStorage.setItem(

                'ynev_campaign',

                evt.target.result

            );

            loadCampaign();

        };

        reader.readAsText(file);

    };

    input.click();

}

/* =========================================================
   CLEAR
========================================================= */

function clearEverything(){

    disableDrawing();

    deactivateMarkerMode();

    drawnItems.clearLayers();

    markers.forEach(m=>{

        map.removeLayer(m);

    });

    markers.length = 0;

    localStorage.removeItem(
        'ynev_campaign'
    );

}

/* =========================================================
   GRID
========================================================= */

let gridLayer = null;

function toggleGrid(){

    if(gridLayer){

        map.removeLayer(gridLayer);

        gridLayer = null;

        return;

    }

    gridLayer =
        L.layerGroup();

    const step = 256;

    for(let x=0; x<=MAP_WIDTH; x+=step){

        L.polyline(

            [

                [0,x],

                [MAP_HEIGHT,x]

            ],

            {

                color:'#00000033',

                weight:1

            }

        ).addTo(gridLayer);

    }

    for(let y=0; y<=MAP_HEIGHT; y+=step){

        L.polyline(

            [

                [y,0],

                [y,MAP_WIDTH]

            ],

            {

                color:'#00000033',

                weight:1

            }

        ).addTo(gridLayer);

    }

    gridLayer.addTo(map);

}

/* =========================================================
   COORDS
========================================================= */

const coordControl =
    L.control({

        position:'bottomleft'

    });

coordControl.onAdd =
function(){

    this._div =
        L.DomUtil.create(

            'div',

            'coordPanel'

        );

    this.update();

    return this._div;

};

coordControl.update =
function(latlng){

    this._div.innerHTML = latlng

        ? `
            X:
            ${Math.round(latlng.lng)}
            <br>
            Y:
            ${Math.round(latlng.lat)}
          `

        : 'Koordináták';

};

coordControl.addTo(map);

map.on('mousemove', function(e){

    coordControl.update(
        e.latlng
    );

});

/* =========================================================
   AUTO LOAD
========================================================= */

loadCampaign();

</script>
