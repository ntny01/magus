const MAP_WIDTH =
    (X_MAX + 1) * TILE_SIZE;

const MAP_HEIGHT =
    (Y_MAX + 1) * TILE_SIZE;

/* =========================================================
   MAP
========================================================= */

const map = L.map('map', {

    crs:L.CRS.Simple,

    minZoom:-2,
    maxZoom:4,

    zoomSnap:0.25,

    attributionControl:false,

});

const bounds = [

    [0,0],

    [MAP_HEIGHT, MAP_WIDTH]

];

/* =========================================================
   RÉTEG KONFIGURÁCIÓ
========================================================= */

// Réteg csoport: azonos évszámú Domb+Poli ugyanazokat a rajzokat mutatja
const LAYER_CONFIG = {
    '3724_domborzati': { path:'./terkep_kulon/output/3724_domborzati', group:'3724', label:'3724 Domborzati' },
    '3724_politikai':  { path:'./terkep_kulon/output/3724_politikai',  group:'3724', label:'3724 Politikai'  },
    '3715_domborzati': { path:'./terkep_kulon/output/3715_domborzati', group:'3715', label:'3715 Domborzati' },
    '3715_politikai':  { path:'./terkep_kulon/output/3715_politikai',  group:'3715', label:'3715 Politikai'  },
    '3692_domborzati': { path:'./terkep_kulon/output/3692_domborzati', group:'3692', label:'3692 Domborzati' },
    '3692_politikai':  { path:'./terkep_kulon/output/3692_politikai',  group:'3692', label:'3692 Politikai'  },
};

// Aktív réteg neve
let activeLayerKey = '3724_domborzati';

// Jelenlegi tile layerGroup
let currentTileLayer = null;

/* =========================================================
   LAZY TILE LOADER
========================================================= */

function buildTiles(basePath) {
    const group = L.layerGroup();
    for (let x = 0; x <= X_MAX; x++) {
        for (let y = 0; y <= Y_MAX; y++) {
            const flippedY = Y_MAX - y;
            const imageUrl = `${basePath}/6/${x}/${flippedY}.png`;
            const left = x * TILE_SIZE;
            const top  = y * TILE_SIZE;
            const bounds = [[top, left], [top + TILE_SIZE, left + TILE_SIZE]];
            const overlay = L.imageOverlay(imageUrl, bounds, { interactive:false, opacity:1 });
            overlay.on('error', () => overlay.setOpacity(0));
            overlay.addTo(group);
        }
    }
    return group;
}

function switchLayer(layerKey) {
    if (!LAYER_CONFIG[layerKey]) return;

    // Régi tile layer eltávolítása
    if (currentTileLayer) {
        map.removeLayer(currentTileLayer);
        currentTileLayer = null;
    }

    // Rajzok/markerek mentése a régi csoport alá
    const oldGroup = LAYER_CONFIG[activeLayerKey].group;
    const newGroup = LAYER_CONFIG[layerKey].group;

    // Régi csoport rajzait elmentjük
    saveGroupDrawings(oldGroup);

    activeLayerKey = layerKey;

    // Új tile layer betöltése
    currentTileLayer = buildTiles(LAYER_CONFIG[layerKey].path);
    currentTileLayer.addTo(map);

    // Ha csoport váltás történt, rajzok/markerek újratöltése
    if (oldGroup !== newGroup) {
        loadGroupDrawings(newGroup);
    }

    // Aktív réteg gomb kiemelése
    document.querySelectorAll('.layer-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.layer === layerKey);
    });

    window.scheduleSave();
}

/* =========================================================
   LAYER CONTROL (custom gombok)
========================================================= */

function buildLayerControl() {
    const ctrl = L.control({ position: 'topright' });
    ctrl.onAdd = function() {
        const div = L.DomUtil.create('div', 'leaflet-control leaflet-bar layer-control-custom');
        div.style.cssText = 'background:#1a1a2e;border:1px solid rgba(168,85,247,.3);border-radius:.5rem;padding:.4rem;display:flex;flex-direction:column;gap:.25rem;';
        Object.entries(LAYER_CONFIG).forEach(([key, cfg]) => {
            const btn = L.DomUtil.create('button', 'layer-btn', div);
            btn.dataset.layer = key;
            btn.textContent = cfg.label;
            btn.style.cssText = 'background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:#e2e8f0;font-size:.75rem;padding:.25rem .6rem;border-radius:.35rem;cursor:pointer;text-align:left;white-space:nowrap;transition:all .15s;';
            btn.classList.toggle('active', key === activeLayerKey);
            L.DomEvent.on(btn, 'click', () => switchLayer(key));
            L.DomEvent.disableClickPropagation(btn);
        });
        return div;
    };
    ctrl.addTo(map);
}

buildLayerControl();

// Inicális betöltés
currentTileLayer = buildTiles(LAYER_CONFIG[activeLayerKey].path);
currentTileLayer.addTo(map);

map.fitBounds(bounds);

/* =========================================================
   DRAW SYSTEM – CSOPORT ALAPÚ
========================================================= */

// Rajzok és markerek csoportonként (3724, 3715, 3692)
const groupDrawings = { '3724': null, '3715': null, '3692': null };
const groupMarkers  = { '3724': [],   '3715': [],   '3692': []   };

// Aktív drawn items és markers (mindig az aktív csoport)
const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

let markers = [];  // az aktív csoport markerei

let currentDrawer = null;
let editHandler = null;
let deleteHandler = null;

// Aktív csoport rajzainak mentése és másik csoport betöltése
function saveGroupDrawings(groupKey) {
    drawnItems.eachLayer(layer => saveLayerStyle(layer));
    groupDrawings[groupKey] = drawnItems.toGeoJSON();
    groupMarkers[groupKey] = markers.map(m => ({ latlng: m.getLatLng(), data: m.data }));
}

function loadGroupDrawings(groupKey) {
    // Régi rajzok/markerek eltávolítása
    drawnItems.clearLayers();
    markers.forEach(m => map.removeLayer(m));
    markers.length = 0;

    // Új csoport betöltése ha van
    const drawings = groupDrawings[groupKey];
    const savedMarkers = groupMarkers[groupKey] || [];

    if (drawings) {
        L.geoJSON(drawings, {
            style: f => f.properties || {},
            onEachFeature: (f, layer) => {
                restoreLayerStyle(layer, f.properties);
                drawnItems.addLayer(layer);
            }
        });
    }

    savedMarkers.forEach(m => {
        const marker = createMarker(m.latlng, m.data);
        markers.push(marker);
    });
}

/* =========================================================
   HELPERS
========================================================= */

function clearActiveButtons(){

    document
    .querySelectorAll('.iconBtn')
    .forEach(btn=>{

        btn.classList.remove('active');

    });

}

function disableDrawing(){

    if(currentDrawer){

        currentDrawer.disable();
        currentDrawer = null;

    }

    if(editHandler){

        editHandler.disable();
        editHandler = null;

    }

    if(deleteHandler){

        deleteHandler.disable();
        deleteHandler = null;

    }

    clearActiveButtons();

}

function deactivateMarkerMode(){

    activeIcon = null;

    document
    .querySelectorAll('.markerBtn')
    .forEach(btn=>{

        btn.classList.remove('active');

    });

}

function getDrawStyle(){

    return {

        color:
            document.getElementById(
                'drawColor'
            ).value,

        weight:
            parseInt(
                document.getElementById(
                    'drawWeight'
                ).value
            ),

        dashArray:
            document.getElementById(
                'drawDash'
            ).value,

        smoothFactor:2

    };

}

/* =========================================================
   DRAW
========================================================= */

function startDraw(type, btn){

    deactivateMarkerMode();

    disableDrawing();

    btn.classList.add('active');

    const style =
        getDrawStyle();

    if(type === 'polyline'){

        currentDrawer =
            new L.Draw.Polyline(map, {

                shapeOptions:style,

                guidelineDistance:20,

                repeatMode:false

            });

    }

    if(type === 'polygon'){

        currentDrawer =
            new L.Draw.Polygon(map, {

                shapeOptions:style,

                showArea:true,

                repeatMode:false

            });

    }

    currentDrawer.enable();

}

function enableEdit(btn){

    deactivateMarkerMode();

    disableDrawing();

    btn.classList.add('active');

    editHandler =
        new L.EditToolbar.Edit(map, {

            featureGroup:
                drawnItems

        });

    editHandler.enable();

}

function deleteMode(btn){

    deactivateMarkerMode();

    disableDrawing();

    btn.classList.add('active');

    deleteHandler =
        new L.EditToolbar.Delete(map, {

            featureGroup:
                drawnItems

        });

    deleteHandler.enable();

}

/* =========================================================
   SAVE STYLE
========================================================= */

function saveLayerStyle(layer){

    if(!layer.feature){

        layer.feature = {

            type:"Feature",
            properties:{}

        };

    }

    layer.feature.properties.style = {

        color:
            layer.options.color || "#ff0000",

        weight:
            layer.options.weight || 4,

        dashArray:
            layer.options.dashArray || ""

    };

}

/* =========================================================
   DRAW EVENTS
========================================================= */

map.on(L.Draw.Event.CREATED, function(e){

    const layer = e.layer;

    saveLayerStyle(layer);

    drawnItems.addLayer(layer);

    disableDrawing();

    saveCampaign();

});

map.on(
    L.Draw.Event.EDITED,
    function(e){

        e.layers.eachLayer(layer=>{

            saveLayerStyle(layer);

        });

        saveCampaign();

    }
);

map.on(
    L.Draw.Event.DELETED,
    saveCampaign
);

/* =========================================================
   MENUS
========================================================= */

function toggleMenu(id){

    document
    .getElementById(id)
    .classList.toggle('open');

}

/* =========================================================
   MARKERS
========================================================= */

let activeIcon = null;

const markers = [];

document.querySelectorAll('.markerBtn')
.forEach(btn=>{

    btn.onclick = ()=>{

        disableDrawing();

        const alreadyActive =
            btn.classList.contains('active');

        deactivateMarkerMode();

        if(alreadyActive){

            return;

        }

        btn.classList.add('active');

        activeIcon =
            btn.dataset.icon;

    };

});

map.on('click', function(e){

    if(!activeIcon) return;

    createRPGMarker(
        e.latlng,
        activeIcon
    );

});

/* =========================================================
   CREATE MARKER
========================================================= */

function buildMarkerHTML(data){

    return `

        <div style="text-align:center;">

            <div class="customMarker">
                ${data.icon}
            </div>

            <div class="markerLabel">
                ${data.name || ""}
            </div>

        </div>

    `;

}

// Helper: marker objektum létrehozása adatokból (betöltéshez)
function createMarker(latlng, data) {
    const marker = L.marker(latlng, {
        icon: L.divIcon({
            className: '',
            html: buildMarkerHTML(data),
            iconSize: [120, 40],
            iconAnchor: [60, 40],
            popupAnchor: [0, -40]
        })
    });
    marker.data = data;
    marker.addTo(map);
    marker.on('click', () => openMarkerEditor(marker));
    return marker;
}

function createRPGMarker(latlng, icon){

    const marker =
        L.marker(latlng, {

            icon:L.divIcon({

                className:'',

                html:buildMarkerHTML({

                    icon,
                    name:''

                }),

                iconSize:[120,40],

iconAnchor:[60,40],
popupAnchor:[0,-40]

            })

        });

    marker.data = {

        icon,
        name:'',
        description:''

    };

    marker.addTo(map);

    markers.push(marker);

    openMarkerEditor(marker);

    marker.on('click', ()=>{

        openMarkerEditor(marker);

    });

    saveCampaign();

}

/* =========================================================
   MARKER EDITOR
========================================================= */

function openMarkerEditor(marker){

    const d =
        marker.data;

    const html = `

        <div class="popupForm">

            <input
                id="markerName"
                placeholder="Név"
                value="${d.name}"
            />

            <textarea
                id="markerDesc"
                rows="4"
                placeholder="Leírás"
            >${d.description}</textarea>

            <div class="popupButtons">

                <button
                    class="saveBtn"
                    onclick="saveMarkerPopup()"
                >
                    Mentés
                </button>

                <button
                    class="deleteBtn"
                    onclick="deleteMarkerPopup()"
                >
                    Törlés
                </button>

            </div>

        </div>

    `;

    marker.bindPopup(html)
    .openPopup();

    window.currentEditingMarker =
        marker;

}

/* =========================================================
   SAVE MARKER
========================================================= */

window.saveMarkerPopup = function(){

    const marker =
        window.currentEditingMarker;

    marker.data.name =
        document.getElementById(
            'markerName'
        ).value;

    marker.data.description =
        document.getElementById(
            'markerDesc'
        ).value;

    marker.setIcon(

        L.divIcon({

            className:'',

            html:buildMarkerHTML(
                marker.data
            ),

            iconSize:[120,40],

  iconAnchor:[60,40],
popupAnchor:[0,-40]

        })

    );

    marker.closePopup();

    saveCampaign();

};

/* =========================================================
   DELETE MARKER
========================================================= */

window.deleteMarkerPopup = function(){

    const marker =
        window.currentEditingMarker;

    map.removeLayer(marker);

    const index =
        markers.indexOf(marker);

    if(index > -1){

        markers.splice(index,1);

    }

    saveCampaign();

};

/* =========================================================
   SAVE CAMPAIGN
========================================================= */

function saveCampaign(){
    // Aktív csoport frissítése
    const activeGroup = LAYER_CONFIG[activeLayerKey].group;
    saveGroupDrawings(activeGroup);

    window.scheduleSave();
}

/* =========================================================
   LOAD CAMPAIGN
========================================================= */

function loadCampaign(campaign){

    if(!campaign) return;

    drawnItems.clearLayers();

    markers.forEach(m=>{

        map.removeLayer(m);

    });

    markers.length = 0;

    L.geoJSON(campaign.drawings, {

        style:feature=>{

            return feature.properties?.style || {

                color:"#ff0000",
                weight:4,
                dashArray:""

            };

        },

        onEachFeature:
            (feature, layer)=>{

                if(feature.properties?.style){

                    layer.setStyle(
                        feature.properties.style
                    );

                }

                drawnItems.addLayer(layer);

            }

    });

    campaign.markers.forEach(m=>{
        const marker = createMarker(m.latlng, m.data);
        markers.push(marker);
    });

}

/* =========================================================
   EXPORT
========================================================= */

function exportCampaign(){
    saveCampaign();

    const exportData = {
        version: 2,
        activeLayer: activeLayerKey,
        groups: {}
    };

    Object.keys(groupDrawings).forEach(grp => {
        exportData.groups[grp] = {
            drawings: groupDrawings[grp] || { type:'FeatureCollection', features:[] },
            markers: groupMarkers[grp] || []
        };
    });

    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type:'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'ynev_campaign.json';
    a.click();
}

/* =========================================================
   IMPORT
========================================================= */

function importCampaign(){
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = evt => {
            try {
                const data = JSON.parse(evt.target.result);
                if (data.version === 2 && data.groups) {
                    // Új formátum: csoportonként
                    Object.keys(groupDrawings).forEach(grp => {
                        groupDrawings[grp] = data.groups[grp]?.drawings || null;
                        groupMarkers[grp] = data.groups[grp]?.markers || [];
                    });
                    const targetLayer = data.activeLayer || '3724_domborzati';
                    switchLayer(targetLayer);
                    loadGroupDrawings(LAYER_CONFIG[activeLayerKey].group);
                } else {
                    // Régi formátum: drawings + markers (mind a 3724 csoportba kerül)
                    groupDrawings['3724'] = data.drawings || null;
                    groupMarkers['3724'] = data.markers || [];
                    loadGroupDrawings('3724');
                }
            } catch(err) {
                alert('Import hiba: ' + err.message);
            }
        };
        reader.readAsText(file);
    };
    input.click();
}

/* =========================================================
   CLEAR
========================================================= */

function clearEverything(){
    disableDrawing();
    deactivateMarkerMode();
    drawnItems.clearLayers();
    markers.forEach(m => map.removeLayer(m));
    markers.length = 0;
    // Minden csoport törlése
    Object.keys(groupDrawings).forEach(grp => {
        groupDrawings[grp] = null;
        groupMarkers[grp] = [];
    });
    saveCampaign();
}

/* =========================================================
   GRID
========================================================= */

let gridLayer = null;

function toggleGrid(){

    if(gridLayer){

        map.removeLayer(gridLayer);

        gridLayer = null;

        return;

    }

    gridLayer =
        L.layerGroup();

    const step = 256;

    for(let x=0; x<=MAP_WIDTH; x+=step){

        L.polyline(

            [

                [0,x],

                [MAP_HEIGHT,x]

            ],

            {

                color:'#00000033',

                weight:1

            }

        ).addTo(gridLayer);

    }

    for(let y=0; y<=MAP_HEIGHT; y+=step){

        L.polyline(

            [

                [y,0],

                [y,MAP_WIDTH]

            ],

            {

                color:'#00000033',

                weight:1

            }

        ).addTo(gridLayer);

    }

    gridLayer.addTo(map);

}

/* =========================================================
   COORDS
========================================================= */

const coordControl =
    L.control({

        position:'bottomleft'

    });

coordControl.onAdd =
function(){

    this._div =
        L.DomUtil.create(

            'div',

            'coordPanel'

        );

    this.update();

    return this._div;

};

coordControl.update =
function(latlng){

    this._div.innerHTML = latlng

        ? `
            X:
            ${Math.round(latlng.lng)}
            <br>
            Y:
            ${Math.round(latlng.lat)}
          `

        : 'Koordináták';

};

coordControl.addTo(map);

map.on('mousemove', function(e){

    coordControl.update(
        e.latlng
    );

});

/* =========================================================
   AUTO LOAD
========================================================= */

loadCampaign();

</script>

<script>
  // ─── USERNAME ───────────────────────────────────────────────────
  function trySetUsername() {
    const el = document.getElementById('auth-username')
    if (!el) { setTimeout(trySetUsername, 50); return }
    if (window._userProfile) {
      el.textContent = window._userProfile.display_name
    } else {
      setTimeout(trySetUsername, 50)
    }
  }
  setTimeout(trySetUsername, 100)

  // ─── LOGOUT ─────────────────────────────────────────────────────
  async function doLogout() {
    try {
      await window._sb.auth.signOut()
      Object.keys(localStorage).filter(k => k.startsWith('sb-')).forEach(k => localStorage.removeItem(k))
    } catch(e) {}
    window.location.href = 'login.html'
  }

  // ─── AUTOSAVE ───────────────────────────────────────────────────
  let _saveTimer = null

  window.scheduleSave = function() {
    if (_saveTimer) clearTimeout(_saveTimer)
    _saveTimer = setTimeout(window.saveToSupabase, 1500)
  }

  window.saveToSupabase = async function() {
    if (!window._sb || !window._userProfile) return
    const { data: { user } } = await window._sb.auth.getUser()
    if (!user) return
    // Aktív csoport frissítése mentés előtt
    const activeGroup = LAYER_CONFIG[activeLayerKey].group
    saveGroupDrawings(activeGroup)
    const { error } = await window._sb.from('map_states').upsert({
      user_id: user.id,
      drawings: groupDrawings,   // teljes csoport objektum {3724:..., 3715:..., 3692:...}
      markers: groupMarkers,     // teljes csoport objektum
      active_layer: activeLayerKey,
      updated_at: new Date().toISOString()
    }, { onConflict: 'user_id' })
    if (!error) window.showSaveIndicator()
    else console.error('Mentési hiba:', error)
  }

  window.loadFromSupabase = async function() {
    if (!window._sb) { setTimeout(window.loadFromSupabase, 100); return }
    const { data: { user } } = await window._sb.auth.getUser()
    if (!user) return
    const { data } = await window._sb.from('map_states')
      .select('*').eq('user_id', user.id).single()
    if (data) {
      // Új formátum: drawings = {3724:..., 3715:..., 3692:...}
      if (data.drawings && data.drawings['3724'] !== undefined) {
        Object.keys(groupDrawings).forEach(grp => {
          groupDrawings[grp] = data.drawings[grp] || null
          groupMarkers[grp] = data.markers?.[grp] || []
        })
      } else if (data.drawings) {
        // Régi formátum: drawings közvetlenül GeoJSON – 3724 csoportba kerül
        groupDrawings['3724'] = data.drawings
        groupMarkers['3724'] = data.markers || []
      }
      // Aktív réteg visszaállítása
      const targetLayer = data.active_layer || '3724_domborzati'
      activeLayerKey = targetLayer
      if (currentTileLayer) map.removeLayer(currentTileLayer)
      currentTileLayer = buildTiles(LAYER_CONFIG[targetLayer].path)
      currentTileLayer.addTo(map)
      // Aktív csoport rajzainak betöltése
      loadGroupDrawings(LAYER_CONFIG[targetLayer].group)
      // Gombok frissítése
      document.querySelectorAll('.layer-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.layer === targetLayer)
      })
    }
  }

  window.showSaveIndicator = function() {
    let el = document.getElementById('save-indicator')
    if (!el) return
    el.style.opacity = '1'
    setTimeout(() => el.style.opacity = '0', 1500)
  }

  window.addEventListener('load', () => setTimeout(window.loadFromSupabase, 500))
</script>
