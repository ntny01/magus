async function saveAsImage() {
  if (typeof html2canvas === 'undefined') {
    alert('A html2canvas könyvtár nem töltődött be. Ellenőrizd az internet kapcsolatot!');
    return;
  }
  const btn = document.getElementById('imgBtn');
  btn.innerHTML = '⏳...'; btn.disabled = true;
  
  // 1. Mentsük el a jelenlegi görgetést és pozíciót
  const originalScrollY = window.scrollY;
  window.scrollTo(0, 0);

  // 2. A fejlécet elrejtjük, hogy ne zavarjon be
  const header = document.querySelector('header');
  const originalHeaderDisplay = header.style.display;
  header.style.display = 'none';

  // 3. --- TRÜKK A "KARAKTER" FELIRAT ELCSÚSZÁSA ELLEN ---
  // Megkeressük a problémás input mezőt
  const titleInput = document.getElementById('vampireTitle');
  const titleWrapper = titleInput.parentElement;
  
  // Létrehozunk helyette egy sima DIV-et a fotózáshoz, pontosan ugyanazokkal a stílusokkal
  const textDiv = document.createElement('div');
  textDiv.className = 'vtitle-input';
  textDiv.innerText = titleInput.value || 'KARAKTER';
  // Biztosítjuk, hogy a DIV-en belül a szöveg középen és stabilan álljon
  textDiv.style.lineHeight = '1.2';
  textDiv.style.display = 'block';
  textDiv.style.width = '100%';

  // Elrejtjük az inputot, és betesszük a helyére a stabil DIV-et
  titleInput.style.display = 'none';
  titleWrapper.insertBefore(textDiv, titleInput);
  // -----------------------------------------------------

  // Várunk egy picit, hogy a böngésző biztosan lekövesse a cserét
  await new Promise(r => setTimeout(r, 150));

  try {
    const canvas = await html2canvas(document.getElementById('sheet-wrapper'), {
      backgroundColor: '#020617', 
      scale: 2, 
      useCORS: true,
      scrollY: 0, 
      windowY: 0,
      ignoreElements: el => el.id === 'magic-particles'
    });
    
    const a = document.createElement('a');
    a.download = `karakter_${(getInfoVal('name') || 'ismeretlen').replace(/\s+/g, '_')}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  } catch(err) { 
    alert('Hiba a kép mentésekor: ' + err.message); 
  }
  
  // 4. HELYREÁLLÍTÁS: Kitöröljük az ideiglenes DIV-et, visszahozzuk az eredeti inputot
  textDiv.remove();
  titleInput.style.display = '';
  
  header.style.display = originalHeaderDisplay;
  window.scrollTo(0, originalScrollY);
  btn.innerHTML = '🖼️ Kép'; btn.disabled = false;
}

/* ==============================
   RESET
   ============================== */
function resetSheet() {
  if(!confirm('Biztosan törölsz mindent? Ez nem visszavonható!')) return;
  sheetData = {
    vampireTitle:'KARAKTER',
    infoFields: JSON.parse(JSON.stringify(DEFAULT_INFO_FIELDS)),
    sections:JSON.parse(JSON.stringify(DEFAULT_SECTIONS)),
    viewMode:0
  };
  document.getElementById('vampireTitle').value='KARAKTER';
  setViewMode(1);
  renderAll();
  applyCharTheme();
  window.scheduleSave()
}

/* ==============================
   RUNES
   ============================== */
(() => {
  const cont = document.getElementById('magic-particles');
  const runes=['✦','ᚱ','ᛟ','✧','☽','☼','᛫','ᚷ','ᛁ','✴','᚛','ᚔ'];
  setInterval(()=>{
    const r=document.createElement('div'); r.className='rune';
    r.innerText=runes[Math.random()*runes.length|0];
    r.style.left=Math.random()*100+'vw';
    r.style.animationDuration=(10+Math.random()*15)+'s';
    r.style.fontSize=(11+Math.random()*16)+'px';
    cont.appendChild(r); setTimeout(()=>r.remove(),26000);
  },1800);
})();

/* ==============================
   PARALLAX
   ============================== */
document.addEventListener('mousemove',e=>{
  const x=(e.clientX/window.innerWidth-.5)*12;
  const y=(e.clientY/window.innerHeight-.5)*8;
  document.body.style.backgroundPosition=`${x}px ${y}px`;
});

/* ==============================
   INIT
   ============================== */
renderAll();
</script>
<script>
  // ─── USERNAME ───────────────────────────────────────────────────
  function trySetUsername() {
    const el = document.getElementById('auth-username')
    if (!el) { setTimeout(trySetUsername, 50); return }
    if (window._userProfile) {
      el.textContent = window._userProfile.display_name
    } else {
      setTimeout(trySetUsername, 50)
    }
  }
  setTimeout(trySetUsername, 100)

  // ─── LOGOUT ─────────────────────────────────────────────────────
  async function doLogout() {
    try {
      await window._sb.auth.signOut()
      Object.keys(localStorage).filter(k => k.startsWith('sb-')).forEach(k => localStorage.removeItem(k))
    } catch(e) {}
    window.location.href = 'login.html'
  }

  // ─── DROPDOWN KEZELÉS ───────────────────────────────────────────
  function toggleDD(id) {
    document.querySelectorAll('.dd-menu').forEach(m => { if(m.id !== id) m.classList.remove('open') })
    document.getElementById(id).classList.toggle('open')
  }
  function closeAllDD() {
    document.querySelectorAll('.dd-menu, .export-menu').forEach(m => m.classList.remove('open'))
  }
  document.addEventListener('click', e => {
    if (!e.target.closest('.dd-wrap') && !e.target.closest('.export-wrap')) closeAllDD()
  })

  // ─── AUTOSAVE (háttér) ──────────────────────────────────────────
  let _saveTimer = null
  window.scheduleSave = function() {
    if (_saveTimer) clearTimeout(_saveTimer)
    _saveTimer = setTimeout(window._bgSave, 1500)
  }

  window._bgSave = async function() {
    if (!window._sb || !window._userProfile) return
    const { data: { user } } = await window._sb.auth.getUser()
    if (!user || !window._currentSheetId) return
    const { error } = await window._sb.from('character_sheets').update({
      name: getInfoVal('name') || 'Névtelen',
      faj: getInfoVal('faj') || '',
      kaszt: getInfoVal('kaszt') || '',
      data: sheetData,
      updated_at: new Date().toISOString()
    }).eq('id', window._currentSheetId)
    if (!error) window.showSaveIndicator()
    else console.error('Mentési hiba:', error)
  }

  // ─── ÚJ KARAKTER ────────────────────────────────────────────────
  window.newChar = function() {
    closeAllDD()
    if (!confirm('Új karaktert kezdesz? A jelenlegi mentetlen változtatások elvesznek.')) return
    window._currentSheetId = null
    resetSheet()
  }

  // ─── KARAKTER MENTÉS ────────────────────────────────────────────
  window.saveCurrentChar = async function() {
    closeAllDD()
    if (!window._sb || !window._userProfile) return
    const { data: { user } } = await window._sb.auth.getUser()
    if (!user) return
    const charName = getInfoVal('name') || 'Névtelen karakter'
    if (window._currentSheetId) {
      // Meglévő frissítése
      const { error } = await window._sb.from('character_sheets').update({
        name: charName,
        faj: getInfoVal('faj') || '',
        kaszt: getInfoVal('kaszt') || '',
        data: sheetData,
        updated_at: new Date().toISOString()
      }).eq('id', window._currentSheetId).eq('user_id', user.id)
      if (!error) window.showSaveIndicator()
      else console.error('Mentési hiba:', error)
    } else {
      // Új karakter létrehozása
      const { data, error } = await window._sb.from('character_sheets').insert({
        user_id: user.id,
        name: charName,
        faj: getInfoVal('faj') || '',
        kaszt: getInfoVal('kaszt') || '',
        data: sheetData,
        is_template: false,
        template_visible: false
      }).select().single()
      if (!error && data) {
        window._currentSheetId = data.id
        window.showSaveIndicator()
      } else console.error('Mentési hiba:', error)
    }
    await window.loadCharList()
  }

  // ─── KARAKTER BETÖLTÉS ──────────────────────────────────────────
  window.loadChar = async function(id, isTemplate) {
    closeAllDD()
    const { data, error } = await window._sb.from('character_sheets').select('*').eq('id', id).single()
    if (error) { console.error('Betöltési hiba:', error); return }
    if (data && data.data) {
      sheetData = data.data
      if (isTemplate) {
        window._currentSheetId = null
        sheetData.template_id = data.id
        sheetData.template_name = data.name
      } else {
        window._currentSheetId = data.id
      }
      migrateInfoToFields()
      syncInfoFieldOptions()
      sheetData.viewMode = 1
      document.getElementById('vampireTitle').value = sheetData.vampireTitle || 'KARAKTER'
      // viewMode alkalmazása manuálisan (nem toggleViewMode, hogy ne hívjon felesleges renderAll-t)
      document.body.classList.remove('sheet-locked', 'sheet-photo')
      document.body.classList.add('sheet-locked')
      const btn = document.getElementById('viewBtn')
      if (btn) { btn.innerHTML = '🔒 Lezárva (Szerkesztés)'; btn.style.cssText='border-color:rgba(239,68,68,.4)!important;color:#f87171!important;'; }
      renderAll()
      applyCharTheme()
    } else {
      console.error('Karakter adat nem található:', id)
    }
  }

  // ─── KARAKTER TÖRLÉS ────────────────────────────────────────────
  window.deleteChar = async function(id, e) {
    e.stopPropagation()
    if (!confirm('Biztosan törlöd ezt a karaktert?')) return
    await window._sb.from('character_sheets').delete().eq('id', id)
    if (window._currentSheetId === id) {
      window._currentSheetId = null
      resetSheet()
    }
    await window.loadCharList()
  }

  // ─── KARAKTER LISTA ─────────────────────────────────────────────
  window.loadCharList = async function() {
    if (!window._sb) return
    const { data: { user } } = await window._sb.auth.getUser()
    if (!user) return
    const { data } = await window._sb.from('character_sheets')
      .select('id, name, faj, kaszt, updated_at, data')
      .eq('user_id', user.id)
      .eq('is_template', false)
      .order('updated_at', { ascending: false })
    const el = document.getElementById('charList')
    if (!data || data.length === 0) {
      el.innerHTML = '<div class="dd-item" style="color:var(--muted);cursor:default;font-size:.78rem;">Még nincs mentett karakter</div>'
      return
    }
    const templateBased = data.filter(c => c.data && c.data.template_id)
    const freeChars = data.filter(c => !c.data || !c.data.template_id)
    const makeItem = (c, isFree) => {
      const isActive = window._currentSheetId === c.id
      const activeBg = isActive ? (isFree ? 'background:rgba(74,222,128,.07);' : 'background:rgba(212,175,55,.07);') : ''
      const nameColor = isFree ? 'color:#4ade80;' : ''
      return `<div class="dd-item" onclick="window.loadChar('${c.id}', false)" style="${activeBg}">
        <span style="flex:1;">
          <span style="font-weight:600;${nameColor}">${c.name || 'Névtelen'}${isActive?' ✦':''}</span>
          ${c.faj||c.kaszt?`<span style="font-size:.72rem;color:var(--muted);display:block;">${[c.faj,c.kaszt].filter(Boolean).join(' · ')}</span>`:''}
        </span>
        <span class="dd-item-del" onclick="window.deleteChar('${c.id}', event)" title="Törlés">✕</span>
      </div>`
    }
    let html = ''
    if (templateBased.length > 0) {
      html += '<div class="dd-section">⚔ Sablon alapú</div>'
      html += templateBased.map(c => makeItem(c, false)).join('')
    }
    if (freeChars.length > 0) {
      html += '<div class="dd-section">✦ Szabad karakterek</div>'
      html += freeChars.map(c => makeItem(c, true)).join('')
    }
    el.innerHTML = html
  }

  // ─── SABLON LISTA ───────────────────────────────────────────────
  window.loadTemplateList = async function() {
    if (!window._sb) return
    const { data } = await window._sb.from('character_sheets')
      .select('id, name, faj, kaszt')
      .eq('is_template', true)
      .eq('template_visible', true)
      .order('name', { ascending: true })
    const el = document.getElementById('templateList')
    if (!data || data.length === 0) {
      el.innerHTML = '<div class="dd-item" style="color:var(--muted);cursor:default;font-size:.78rem;">Még nincs sablon</div>'
      return
    }
    el.innerHTML = data.map(t => `
      <div class="dd-item" onclick="window.loadChar('${t.id}', true)">
        <span style="flex:1;">
          <span style="font-weight:600;">${t.name}</span>
          ${t.faj||t.kaszt?`<span style="font-size:.72rem;color:var(--muted);display:block;">${[t.faj,t.kaszt].filter(Boolean).join(' · ')}</span>`:''}
        </span>
      </div>
    `).join('')
  }

  // ─── INIT ───────────────────────────────────────────────────────
  window.loadFromSupabase = async function() {
    if (!window._sb) { setTimeout(window.loadFromSupabase, 100); return }
    const { data: { user } } = await window._sb.auth.getUser()
    if (!user) return
    await window.loadFieldDescriptions()
    await window.loadCharList()
    await window.loadTemplateList()
    // Legutóbbi saját karakter betöltése
    const { data } = await window._sb.from('character_sheets')
      .select('*')
      .eq('user_id', user.id)
      .eq('is_template', false)
      .order('updated_at', { ascending: false })
      .limit(1)
      .maybeSingle()
    if (data && data.data) {
      sheetData = data.data
      window._currentSheetId = data.id
      // Migráció: régi info objektum → infoFields tömb
      migrateInfoToFields()
      // infoFields opcióit frissítjük a field_descriptions cache-ből
      syncInfoFieldOptions()
      document.getElementById('vampireTitle').value = sheetData.vampireTitle || 'KARAKTER'
      renderAll()
      applyCharTheme()
    } else {
      // Első betöltés: üres lap, de opciók szinkronizálása
      syncInfoFieldOptions()
      renderAll()
      applyCharTheme()
    }
  }

  // ─── TÉMA ALKALMAZÁS ───────────────────────────────────────────
  function applyCharTheme() {
    const isTemplateBased = !!sheetData.template_id
    const wrapper = document.getElementById('sheet-wrapper')
    const titleInp = document.getElementById('vampireTitle')

    if (isTemplateBased) {
      // Sablon alapú: arany/standard téma, cím nem szerkeszthető
      wrapper.classList.remove('free-char')
      titleInp.readOnly = true
      titleInp.classList.add('template-locked-title')
      // Vízjel eltávolítása ha volt
      const wm = document.getElementById('free-char-watermark')
      if (wm) wm.remove()
      // Info label-ek: nem szerkeszthetők (span-ok, nem inputok – már lock)
    } else {
      // Szabad karakter: zöld téma + vízjel
      wrapper.classList.add('free-char')
      titleInp.readOnly = false
      titleInp.classList.remove('template-locked-title')
      // Vízjel a cím alá
      if (!document.getElementById('free-char-watermark')) {
        const wm = document.createElement('div')
        wm.id = 'free-char-watermark'
        wm.className = 'free-char-watermark'
        wm.textContent = '✦ szabad karakter ✦'
        const vtitleWrap = document.querySelector('.vtitle-wrap')
        if (vtitleWrap) vtitleWrap.appendChild(wm)
      }
    }
  }

  function migrateInfoToFields() {
    // Ha már van infoFields, csak szinkronizáljuk az opciókat
    if (sheetData.infoFields && sheetData.infoFields.length > 0) return
    // Régi info objektum migrálása
    const legacyMap = {name:'inf_nev',faj:'inf_faj',kaszt:'inf_kaszt',isten:'inf_isten',kronika:'inf_kronika',xp:'inf_xp'}
    sheetData.infoFields = JSON.parse(JSON.stringify(DEFAULT_INFO_FIELDS))
    if (sheetData.info) {
      Object.entries(legacyMap).forEach(([oldKey, newId]) => {
        const f = sheetData.infoFields.find(f => f.id === newId)
        if (f && sheetData.info[oldKey]) f.value = sheetData.info[oldKey]
      })
    }
  }

  function syncInfoFieldOptions() {
    if (!sheetData.infoFields) return
    const cache = window._fieldDescCache || {}
    sheetData.infoFields.forEach(field => {
      if (field.type === 'select') {
        const c = cache[field.id]
        field.options = c ? [...c.options] : (field.options || [])
      }
    })
  }

  /* ==============================
     LEÍRÁS RENDSZER (field_descriptions)
     ============================== */
  const SINGLE_DESC_KEY = '_self'
  // _fieldDescCache[field_key] = { isSingle: bool, byOption: {opt: desc}, options: [opt,...], singleDesc: '' }
  window._fieldDescCache = {}

  window.loadFieldDescriptions = async function() {
    if (!window._sb) return
    const { data } = await window._sb.from('field_descriptions').select('*')
    const cache = {}
    ;(data || []).forEach(row => {
      if (!cache[row.field_key]) cache[row.field_key] = { byOption:{}, options:[], singleDesc:'' }
      if (row.option_value === SINGLE_DESC_KEY) {
        cache[row.field_key].singleDesc = row.description || ''
      } else {
        cache[row.field_key].byOption[row.option_value] = row.description || ''
        cache[row.field_key].options.push(row.option_value)
      }
    })
    Object.values(cache).forEach(c => c.options.sort((a,b)=>a.localeCompare(b,'hu')))
    window._fieldDescCache = cache
    // infoFields opcióinak szinkronizálása
    if (sheetData && sheetData.infoFields) {
      sheetData.infoFields.forEach(field => {
        if (field.type === 'select') {
          const c = cache[field.id]
          field.options = c ? [...c.options] : (field.options || [])
        }
      })
    }
    // select sorok opcióinak szinkronizálása a szekciókon belül
    if (sheetData && sheetData.sections) {
      sheetData.sections.forEach(sec => sec.boxes.forEach(box => box.rows.forEach(row => {
        if (row.type === 'select') {
          const c = cache[row.id]
          row.options = c ? c.options : []
        }
      })))
    }
  }

  // Visszaadja az aktuális leírást egy mezőhöz
  window.getFieldDescription = function(fieldKey) {
    const c = window._fieldDescCache[fieldKey]
    if (!c) return ''
    // info mezők (inf_faj, inf_kaszt, stb.): az aktuális infoField value alapján
    const infoField = getInfoFieldById(fieldKey)
    if (infoField) {
      const val = infoField.value || ''
      return c.byOption[val] || ''
    }
    // dot sor: egyetlen leírás
    if (c.singleDesc) return c.singleDesc
    // select sor: az aktuális érték alapján
    const row = findRowById(fieldKey)
    if (row && row.value) return c.byOption[row.value] || ''
    return ''
  }

  function findRowById(rowId) {
    for (const sec of sheetData.sections) {
      for (const box of sec.boxes) {
        const row = box.rows.find(r => r.id === rowId)
        if (row) return row
      }
    }
    return null
  }
  window.findRowById = findRowById

  // ⓘ ikon megjelenítés/elrejtés annak alapján, hogy van-e leírás
  window.updateFieldDescIcon = function(fieldKey) {
    const icon = document.getElementById('desc_' + fieldKey)
    if (!icon) return
    const desc = window.getFieldDescription(fieldKey)
    icon.style.display = desc ? 'inline-flex' : 'none'
    // Ha a popover épp nyitva van, frissítsük a tartalmát is
    const pop = document.getElementById('pop_' + fieldKey)
    if (pop && pop.classList.contains('open')) {
      pop.innerHTML = window._buildPopoverContent(fieldKey, desc)
    }
  }

  window._buildPopoverContent = function(fieldKey, desc) {
    const infoField = getInfoFieldById(fieldKey)
    const row = findRowById(fieldKey)
    let title = ''
    if (infoField) title = infoField.value || infoField.label
    else if (row) title = row.type === 'select' ? (row.value || row.label) : row.label
    return `<div class="field-desc-popover-title">${title}</div>${(desc||'').replace(/\n/g,'<br>')}`
  }

  // Popover megjelenítés/elrejtés
  function getOrCreatePopover(fieldKey, anchorEl) {
    let pop = document.getElementById('pop_' + fieldKey)
    if (!pop) {
      pop = document.createElement('div')
      pop.id = 'pop_' + fieldKey
      pop.className = 'field-desc-popover'
      anchorEl.style.position = 'relative'
      anchorEl.appendChild(pop)
    }
    return pop
  }

  window.showDescPopover = function(fieldKey) {
    const icon = document.getElementById('desc_' + fieldKey)
    if (!icon) return
    const desc = window.getFieldDescription(fieldKey)
    if (!desc) return
    const pop = getOrCreatePopover(fieldKey, icon)
    pop.innerHTML = window._buildPopoverContent(fieldKey, desc)
    pop.classList.add('open')
  }

  window.hideDescPopover = function(fieldKey) {
    const pop = document.getElementById('pop_' + fieldKey)
    if (pop) pop.classList.remove('open')
  }

  window.toggleDescPopover = function(e, fieldKey) {
    e.stopPropagation()
    const pop = document.getElementById('pop_' + fieldKey)
    if (pop && pop.classList.contains('open')) {
      window.hideDescPopover(fieldKey)
    } else {
      window.showDescPopover(fieldKey)
    }
  }

  // Bárhova kattintva zárjuk a nyitott popovereket (mobil tap UX)
  document.addEventListener('click', e => {
    if (e.target.closest('.field-desc-icon')) return
    document.querySelectorAll('.field-desc-popover.open').forEach(p => p.classList.remove('open'))
  })

  // ─── GÖRGŐ — select típusú info mezők ───────────────────────────
  window.wheelCycleOption = function(e, fieldKey) {
    const field = getInfoFieldById(fieldKey)
    if (!field) return
    const opts = field.options || []
    if (opts.length === 0) return
    e.preventDefault()
    const el = document.getElementById('inpf_' + fieldKey)
    if (!el) return
    const current = el.value.trim()
    let idx = opts.indexOf(current)
    if (e.deltaY > 0) idx = (idx + 1) % opts.length
    else idx = (idx - 1 + opts.length) % opts.length
    field.value = opts[idx]
    el.value = field.value
    window.scheduleSave()
    window.updateFieldDescIcon(fieldKey)
    if (document.getElementById('pop_'+fieldKey)?.classList.contains('open')) {
      window.showDescPopover(fieldKey)
    }
  }

  // ─── GÖRGŐ — select típusú sorok ────────────────────────────────
  window.wheelCycleSelectRow = function(e, row, selectEl) {
    const opts = row.options || []
    if (opts.length === 0) return
    e.preventDefault()
    let idx = opts.indexOf(row.value)
    if (e.deltaY > 0) idx = (idx + 1) % opts.length
    else idx = (idx - 1 + opts.length) % opts.length
    row.value = opts[idx]
    selectEl.value = row.value
    window.scheduleSave()
    window.updateFieldDescIcon(row.id)
    if (document.getElementById('pop_'+row.id)?.classList.contains('open')) {
      window.showDescPopover(row.id)
    }
  }

  window.showSaveIndicator = function() {
    let el = document.getElementById('save-indicator')
    if (!el) return
    el.style.opacity = '1'
    setTimeout(() => el.style.opacity = '0', 1500)
  }

  window.addEventListener('load', () => setTimeout(window.loadFromSupabase, 300))
</script>
