  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M.A.G.U.S. – Karakterlap</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

    :root {
      --bg-main:#020617; --bg-card:#0f172a; --bg-sheet:rgba(12,20,40,0.88);
      --border:rgba(212,175,55,0.18); --border-soft:rgba(255,255,255,0.06);
      --text:#e2e8f0; --muted:#94a3b8; --gold:#d4af37;
      --gold-glow:rgba(212,175,55,0.3); --accent:#10b981; --accent-h:#34d399; --red:#f87171;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

    body {
      font-family:'Inter',sans-serif;
      background:
        radial-gradient(ellipse at 20% 10%,rgba(212,175,55,.07) 0%,transparent 40%),
        radial-gradient(ellipse at 80% 80%,rgba(16,185,129,.06) 0%,transparent 40%),
        radial-gradient(ellipse at 50% 50%,rgba(30,10,60,.4) 0%,transparent 70%),
        linear-gradient(160deg,#020617 0%,#050e1f 50%,#020a14 100%);
      color:var(--text); min-height:100vh; overflow-x:hidden;
    }

    /* ===== PARTICLES ===== */
    #magic-particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
    .rune{position:absolute;color:rgba(212,175,55,0.1);animation:floatRune linear infinite;pointer-events:none;}
    @keyframes floatRune{
      from{transform:translateY(100vh) rotate(0deg);opacity:0;}
      8%{opacity:1;} 90%{opacity:.8;}
      to{transform:translateY(-120px) rotate(360deg);opacity:0;}
    }

    /* ===== HEADER ===== */
    header{
      position:sticky;top:0;z-index:50;
      background:rgba(2,6,23,0.96);backdrop-filter:blur(24px);
      border-bottom:1px solid var(--border);
      padding:.5rem 1rem;
      display:flex;align-items:center;justify-content:space-between;gap:.5rem;
    }
    .header-left{display:flex;align-items:center;gap:.4rem;flex-shrink:0;}
    .header-center{display:flex;align-items:center;gap:.35rem;flex-wrap:wrap;justify-content:center;flex:1;}
    .header-right{display:flex;align-items:center;gap:.4rem;flex-shrink:0;}
    .page-title{
      font-family:'Cinzel',serif;color:var(--gold);font-size:1.1rem;
      letter-spacing:.12em;text-shadow:0 0 20px var(--gold-glow);
      white-space:nowrap;
    }
    .header-sep{width:1px;height:24px;background:rgba(255,255,255,0.08);flex-shrink:0;margin:0 .15rem;}

    /* ===== BUTTONS ===== */
    .btn{
      background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);
      color:var(--text);padding:.35rem .75rem;font-size:.78rem;font-weight:600;
      border-radius:.5rem;cursor:pointer;transition:all .18s;
      display:inline-flex;align-items:center;gap:.3rem;
      white-space:nowrap;min-height:32px;font-family:inherit;
    }
    .btn:hover{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.35);color:var(--accent-h);}
    .btn-gold{border-color:rgba(212,175,55,.4)!important;color:var(--gold)!important;}
    .btn-gold:hover{background:rgba(212,175,55,.08)!important;color:#f0cc60!important;}
    .btn-red{border-color:rgba(239,68,68,.35)!important;color:var(--red)!important;}
    .btn-red:hover{background:rgba(239,68,68,.08)!important;}
    .btn-sm{padding:.28rem .55rem;font-size:.73rem;min-height:28px;}

    /* Dropdown alap */
    .dd-wrap{position:relative;}
    .dd-menu{
      display:none;position:absolute;top:110%;left:0;
      background:var(--bg-card);border:1px solid var(--border);
      border-radius:.6rem;overflow:hidden;min-width:220px;
      box-shadow:0 12px 40px rgba(0,0,0,.5);z-index:200;
    }
    .dd-menu.open{display:block;}
    .dd-item{
      display:flex;align-items:center;gap:.6rem;padding:.6rem 1rem;
      font-size:.82rem;cursor:pointer;transition:background .15s;color:var(--text);
      border-bottom:1px solid var(--border-soft);
    }
    .dd-item:last-child{border:none;}
    .dd-item:hover{background:rgba(212,175,55,.07);color:var(--gold);}
    .dd-item.danger:hover{background:rgba(239,68,68,.07);color:var(--red);}
    .dd-section{
      padding:.4rem 1rem .25rem;
      font-size:.68rem;font-weight:700;letter-spacing:.1em;
      color:var(--muted);text-transform:uppercase;
      border-bottom:1px solid var(--border-soft);
    }
    .dd-item-del{margin-left:auto;opacity:.5;font-size:.75rem;padding:.1rem .3rem;border-radius:.3rem;transition:all .15s;}
    .dd-item-del:hover{opacity:1;color:var(--red);}

    /* Export dropdown */
    .export-wrap{position:relative;}
    .export-menu{
      display:none;position:absolute;top:110%;right:0;
      background:var(--bg-card);border:1px solid var(--border);
      border-radius:.6rem;overflow:hidden;min-width:200px;
      box-shadow:0 12px 40px rgba(0,0,0,.5);z-index:200;
    }
    .export-menu.open{display:block;}
    .export-item{
      display:flex;align-items:center;gap:.6rem;padding:.65rem 1rem;
      font-size:.82rem;cursor:pointer;transition:background .15s;color:var(--text);
      border-bottom:1px solid var(--border-soft);
    }
    .export-item:last-child{border:none;}
    .export-item:hover{background:rgba(212,175,55,.07);color:var(--gold);}

    /* ===== OUTER WRAPPER ===== */
    .sheet-outer{
      max-width:1300px;margin:0 auto;
      padding:1.75rem 1.5rem 5rem;
      position:relative;z-index:1;
      display:flex;flex-direction:column;gap:1.75rem;
    }

    /* ===== VAMPIRE TITLE ===== */
    .vtitle-wrap{text-align:center;padding:.25rem 0;}
    .vtitle-input{
      font-family:'Cinzel',serif;
      font-size:clamp(1.8rem,5vw,3.2rem);
      font-weight:700;letter-spacing:.22em;text-transform:uppercase;
      color:var(--text);background:transparent;border:none;outline:none;
      text-align:center;width:100%;
      text-shadow:0 0 40px rgba(212,175,55,.25),0 2px 6px rgba(0,0,0,.6);
    }
    .vtitle-input::placeholder{color:rgba(255,255,255,.18);}
    .ornament{height:2px;background:linear-gradient(90deg,transparent 0%,rgba(212,175,55,.6) 20%,rgba(212,175,55,.6) 80%,transparent 100%);border-radius:2px;margin:.4rem 0;}
    .ornament-sm{height:1px;background:linear-gradient(90deg,transparent,rgba(212,175,55,.25),transparent);border-radius:1px;margin:.2rem 0;}
    .ornament-deco{
      text-align:center;font-size:.75rem;color:rgba(212,175,55,.35);
      letter-spacing:.5em;user-select:none;
    }

    /* ===== INFO CARD ===== */
    .info-card{
      background:var(--bg-sheet);border:1px solid var(--border);
      border-radius:18px;padding:1.4rem 1.75rem;
      backdrop-filter:blur(14px);
      box-shadow:0 8px 40px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.025),
                 0 0 0 1px rgba(212,175,55,.04);
    }
    .info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.1rem 2rem;}
    .info-field{display:flex;align-items:flex-end;gap:.45rem;}
    .info-label{font-family:'Cinzel',serif;color:var(--gold);font-size:.79rem;white-space:nowrap;font-weight:600;}
    .info-input{
      flex:1;background:transparent;border:none;border-bottom:1px dashed rgba(255,255,255,.18);
      color:#fff;padding:.18rem .25rem;font-size:.92rem;outline:none;transition:border-color .2s;
      font-family:inherit;
    }
    .info-input:focus{border-bottom-color:var(--accent);}
    .combo-wrap{flex:1;}
    .combo-input{
      width:100%;background:transparent;border:none;border-bottom:1px dashed rgba(255,255,255,.18);
      color:#fff;padding:.18rem .25rem;font-size:.92rem;outline:none;
      transition:border-color .2s;font-family:inherit;
    }
    .combo-input:focus{border-bottom-color:var(--gold);}

    /* ===== SHEET CARD ===== */
    .sheet-card{
      background:var(--bg-sheet);border:1px solid var(--border);
      border-radius:22px;padding:2rem 2rem 2.5rem;
      backdrop-filter:blur(14px);
      box-shadow:0 20px 70px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.025),
                 0 0 0 1px rgba(212,175,55,.03);
      position:relative;
    }
    .sheet-card::before{
      content:'';position:absolute;inset:0;pointer-events:none;
      background:linear-gradient(135deg,rgba(212,175,55,.03) 0%,transparent 50%,rgba(16,185,129,.015) 100%);
      border-radius:22px;
    }

    /* ===== SECTIONS ===== */
    #sections-container{display:flex;flex-direction:column;gap:2.25rem;}

    .section-header{display:flex;align-items:center;gap:.65rem;margin-bottom:.9rem;}
    .section-title-input{
      font-family:'Cinzel',serif;color:var(--gold);font-size:1.25rem;font-weight:600;
      letter-spacing:.08em;background:transparent;border:none;outline:none;flex:1;
      text-shadow:0 0 15px rgba(212,175,55,.15);
      border-bottom:1px solid transparent;transition:border-color .2s;
    }
    .section-title-input:focus{border-bottom-color:rgba(212,175,55,.4);}
    .section-edit-ctrls{display:flex;gap:.35rem;}

    .boxes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:1.1rem;}

    /* ===== BOX ===== */
    .box-wrap{
      background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.06);
      border-radius:14px;padding:1rem 1.1rem 1.1rem;
      display:flex;flex-direction:column;gap:.5rem;position:relative;
      transition:border-color .2s,box-shadow .2s;
    }
    .box-wrap:hover{border-color:rgba(212,175,55,.1);box-shadow:0 4px 20px rgba(0,0,0,.2);}
    .box-header{display:flex;align-items:center;gap:.4rem;margin-bottom:.2rem;}
    .box-title-input{
      flex:1;background:transparent;border:none;outline:none;
      color:var(--text);font-size:.84rem;font-weight:600;
      text-transform:uppercase;letter-spacing:.06em;font-family:inherit;
      border-bottom:1px solid transparent;transition:border-color .2s;
    }
    .box-title-input:focus{border-bottom-color:rgba(255,255,255,.18);}
    .btn-del-box{
      background:none;border:none;color:rgba(239,68,68,.35);cursor:pointer;
      font-size:.82rem;padding:.12rem .28rem;border-radius:4px;transition:all .15s;line-height:1;
    }
    .btn-del-box:hover{color:var(--red);background:rgba(239,68,68,.1);}

    /* ===== ROW ===== */
    .row-wrap{display:flex;align-items:center;gap:.38rem;font-size:.85rem;}

    .row-label-input{
      background:transparent;border:none;
      border-bottom:1px dotted rgba(255,255,255,.12);
      color:var(--text);font-size:.85rem;font-family:inherit;outline:none;
      flex:1;min-width:0;transition:border-color .2s;
    }
    .row-label-input:focus{border-bottom-color:var(--accent);}

    /* Dots */
    .dots-wrap{display:flex;gap:3px;user-select:none;flex-shrink:0;}
    .dot{cursor:pointer;color:var(--muted);font-size:1.05rem;transition:color .1s,transform .12s;line-height:1;}
    .dot:hover{transform:scale(1.28);color:var(--gold);}
    .dot.filled{color:var(--gold);text-shadow:0 0 6px rgba(212,175,55,.5);}

    /* Text row */
    .row-text-input{
      flex:1;background:transparent;border:none;
      border-bottom:1px dashed rgba(255,255,255,.12);
      color:#fff;font-size:.85rem;font-family:inherit;outline:none;
      transition:border-color .2s;min-width:0;
    }
    .row-text-input:focus{border-bottom-color:var(--accent);}

    /* Textarea row */
    .row-textarea{
      width:100%;background:rgba(0,0,0,.28);border:1px solid var(--border-soft);
      border-radius:8px;color:var(--text);font-size:.84rem;font-family:inherit;
      outline:none;resize:vertical;padding:.55rem .7rem;min-height:80px;
      transition:border-color .2s;
    }
    .row-textarea:focus{border-color:rgba(16,185,129,.3);}

    /* Header row (big dot bar) */
    .header-row-wrap{
      display:flex;flex-direction:column;align-items:center;gap:.45rem;
      padding:.6rem .25rem;
      background:linear-gradient(135deg,rgba(212,175,55,.04),transparent,rgba(212,175,55,.04));
      border-top:1px solid rgba(212,175,55,.15);
      border-bottom:1px solid rgba(212,175,55,.15);
      border-radius:8px;margin:.2rem 0;position:relative;
    }
    .header-row-input{
      background:transparent;border:none;outline:none;
      font-family:'Cinzel',serif;color:var(--gold);font-size:.88rem;font-weight:600;
      text-align:center;width:100%;letter-spacing:.07em;
      border-bottom:1px solid transparent;transition:border-color .2s;
    }
    .header-row-input:focus{border-bottom-color:rgba(212,175,55,.4);}
    .header-dots-wrap{display:flex;gap:5px;justify-content:center;}
    .header-dot{
      cursor:pointer;font-size:1.35rem;color:var(--muted);
      transition:color .1s,transform .12s;user-select:none;line-height:1;
    }
    .header-dot:hover{transform:scale(1.2);color:var(--gold);}
    .header-dot.filled{color:var(--gold);text-shadow:0 0 10px var(--gold-glow);}

    /* Delete row btn */
    .btn-del-row{
      background:none;border:none;color:rgba(239,68,68,.3);cursor:pointer;
      font-size:.75rem;padding:.1rem .22rem;border-radius:3px;
      transition:color .15s;flex-shrink:0;line-height:1;
    }
    .btn-del-row:hover{color:var(--red);}

    /* Add row picker */
    .add-row-area{margin-top:.4rem;}
    .add-row-picker{display:flex;gap:.3rem;flex-wrap:wrap;}
    .add-row-btn{
      background:rgba(255,255,255,.025);border:1px dashed rgba(255,255,255,.1);
      color:var(--muted);cursor:pointer;padding:.28rem .55rem;
      font-size:.71rem;border-radius:6px;transition:all .15s;font-family:inherit;
    }
    .add-row-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(212,175,55,.06);}

    /* Add box / section */
    .add-box-placeholder{
      border:1px dashed rgba(255,255,255,.07);border-radius:14px;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;padding:1.5rem;color:var(--muted);font-size:.82rem;gap:.4rem;
      transition:all .2s;background:rgba(255,255,255,.01);
    }
    .add-box-placeholder:hover{border-color:var(--accent);color:var(--accent-h);background:rgba(16,185,129,.03);}

    #add-section-btn{
      background:rgba(255,255,255,.02);border:1px dashed rgba(212,175,55,.22);
      color:rgba(212,175,55,.55);cursor:pointer;padding:.7rem 1.5rem;
      font-size:.83rem;font-weight:600;border-radius:12px;transition:all .2s;
      display:flex;align-items:center;gap:.5rem;width:100%;justify-content:center;
      font-family:inherit;margin-top:.5rem;
    }
    #add-section-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(212,175,55,.06);}

    /* ===== SZABAD KARAKTER ZÖLD TÉMA ===== */
    .free-char .vtitle-input{
      color:#86efac;
      text-shadow:0 0 40px rgba(74,222,128,.3),0 2px 6px rgba(0,0,0,.6);
    }
    .free-char .ornament{
      background:linear-gradient(90deg,transparent 0%,rgba(74,222,128,.5) 20%,rgba(74,222,128,.5) 80%,transparent 100%);
    }
    .free-char .ornament-deco{color:rgba(74,222,128,.35);}
    .free-char .info-card{
      border-color:rgba(74,222,128,.18);
      box-shadow:0 8px 40px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.025),0 0 0 1px rgba(74,222,128,.04);
    }
    .free-char .info-label{color:#4ade80;}
    .free-char .info-input:focus,.free-char .combo-input:focus{border-bottom-color:#4ade80;}
    .free-char .sheet-card::before{
      background:linear-gradient(135deg,rgba(74,222,128,.03) 0%,transparent 50%,rgba(74,222,128,.015) 100%);
    }
    .free-char .sheet-card{border-color:rgba(74,222,128,.13);}
    .free-char .section-title-input{color:#4ade80;text-shadow:0 0 15px rgba(74,222,128,.15);}
    .free-char .section-title-input:focus{border-bottom-color:rgba(74,222,128,.4);}
    .free-char .box-wrap:hover{border-color:rgba(74,222,128,.12);box-shadow:0 4px 20px rgba(0,0,0,.2);}
    .free-char .dot:hover{color:#4ade80;}
    .free-char .dot.filled{color:#4ade80;text-shadow:0 0 6px rgba(74,222,128,.5);}
    .free-char .header-dot:hover,.free-char .header-dot.filled{color:#4ade80;text-shadow:0 0 10px rgba(74,222,128,.4);}
    .free-char .row-label-input:focus{border-bottom-color:#4ade80;}
    .free-char .row-text-input:focus{border-bottom-color:#4ade80;}
    .free-char .row-textarea:focus{border-color:rgba(74,222,128,.3);}
    .free-char .header-row-wrap{
      background:linear-gradient(135deg,rgba(74,222,128,.04),transparent,rgba(74,222,128,.04));
      border-top-color:rgba(74,222,128,.15);border-bottom-color:rgba(74,222,128,.15);
    }
    .free-char .header-row-input{color:#4ade80;}
    .free-char .header-row-input:focus{border-bottom-color:rgba(74,222,128,.4);}
    .free-char .add-row-btn:hover{border-color:#4ade80;color:#4ade80;background:rgba(74,222,128,.06);}
    .free-char .add-box-placeholder:hover{border-color:#4ade80;color:#86efac;background:rgba(74,222,128,.03);}
    .free-char #add-section-btn{border-color:rgba(74,222,128,.22);color:rgba(74,222,128,.55);}
    .free-char #add-section-btn:hover{border-color:#4ade80;color:#4ade80;background:rgba(74,222,128,.06);}
    .free-char .combo-input:focus{border-bottom-color:#4ade80;}
    .free-char .box-title-input:focus{border-bottom-color:rgba(74,222,128,.3);color:#86efac;}
    /* Vízjel szabad karakternél – kis felirat a cím alá */
    .free-char-watermark{
      display:block;text-align:center;
      font-family:'Cinzel',serif;font-size:.72rem;font-weight:600;
      letter-spacing:.35em;text-transform:uppercase;
      color:rgba(74,222,128,.45);
      margin-top:-.15rem;margin-bottom:.2rem;
      pointer-events:none;user-select:none;
    }

    /* ===== SABLON LOCK ===== */
    .template-locked-title{pointer-events:none!important;}
    .template-locked-label{pointer-events:none!important;cursor:default!important;}

    /* ===== STATE CLASSES: LOCKED & PHOTO ===== */
    .sheet-locked .edit-only{display:none!important;}
    .sheet-locked .box-title-input,
    .sheet-locked .section-title-input,
    .sheet-locked .row-label-input,
    .sheet-locked .header-row-input {
      pointer-events:none; border-bottom-color:transparent!important;
    }

    /* ===== SZIMBÓLUM SOR ===== */
    .symbol-wrap{display:flex;flex-wrap:wrap;gap:3px;user-select:none;flex-shrink:0;max-width:100%;}
    .sym{cursor:pointer;font-size:1.05rem;transition:color .1s,transform .12s;line-height:1;flex-shrink:0;}
    .sym:hover{transform:scale(1.28);}
    .sym.filled{text-shadow:0 0 6px currentColor;}
    .sheet-photo .sym,.sheet-locked .sym{pointer-events:none;}

    /* Kifejezetten FOTÓ MÓD (minden input mező rejtve/letiltva) */
    .sheet-photo .info-input,
    .sheet-photo .combo-input,
    .sheet-photo .vtitle-input,
    .sheet-photo .row-text-input {
      pointer-events:none; border-bottom-color:transparent!important;
    }
    .sheet-photo .row-textarea {
      pointer-events:none; border-color:transparent!important;
      background:transparent!important; resize:none;
      padding-left:0; padding-right:0;
    }
    .sheet-photo .dot, .sheet-photo .header-dot {
      pointer-events:none; /* Ne lehessen kattintgatni a pontokat */
    }
    .sheet-photo .field-desc-icon { display:none!important; }
    .free-char .field-desc-icon { display:none!important; }

    /* ===== LEÍRÁS IKON (ⓘ) ÉS POPOVER ===== */
    .field-desc-icon{
      display:inline-flex;align-items:center;justify-content:center;
      width:16px;height:16px;border-radius:50%;
      border:1px solid rgba(212,175,55,.35);color:var(--gold);
      font-size:.65rem;font-weight:700;cursor:pointer;flex-shrink:0;
      background:rgba(212,175,55,.06);transition:all .15s;line-height:1;
      user-select:none;position:relative;
    }
    .field-desc-icon:hover{background:rgba(212,175,55,.18);border-color:var(--gold);}
    .field-desc-popover{
      position:absolute;z-index:300;
      background:#0f172a;border:1px solid rgba(212,175,55,.3);
      border-radius:.6rem;padding:.6rem .8rem;
      font-size:.78rem;line-height:1.5;color:var(--text);
      max-width:260px;min-width:140px;
      box-shadow:0 12px 40px rgba(0,0,0,.55);
      bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
      display:none;
    }
    .field-desc-popover.open{display:block;}
    .field-desc-popover::after{
      content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
      border:6px solid transparent;border-top-color:rgba(212,175,55,.3);
    }
    .field-desc-popover-title{
      font-family:'Cinzel',serif;color:var(--gold);font-size:.72rem;
      letter-spacing:.06em;margin-bottom:.25rem;text-transform:uppercase;
    }

    /* ===== CUSTOM INFO DROPDOWN ===== */
    .info-cd{position:relative;flex:1;}
    .info-cd-btn{
      width:100%;display:flex;align-items:center;justify-content:space-between;
      background:transparent;border:none;border-bottom:1px dashed rgba(255,255,255,.18);
      color:#fff;padding:.18rem .25rem;font-size:.92rem;outline:none;
      cursor:pointer;font-family:inherit;text-align:left;transition:border-color .2s;
    }
    .info-cd-btn:focus{border-bottom-color:var(--gold);}
    .free-char .info-cd-btn:focus{border-bottom-color:#4ade80;}
    .info-cd-btn .cd-arrow{font-size:.6rem;opacity:.4;flex-shrink:0;margin-left:.3rem;}
    .info-cd-drop{
      position:fixed;z-index:9999;
      background:#0f172a;border:1px solid rgba(212,175,55,.25);
      border-radius:.55rem;padding:.3rem;min-width:160px;max-height:220px;overflow-y:auto;
      box-shadow:0 8px 32px rgba(0,0,0,.55);
      display:none;flex-direction:column;gap:2px;
    }
    .info-cd-drop.open{display:flex;}
    .info-cd-opt{
      padding:.32rem .6rem;border-radius:.35rem;cursor:pointer;
      font-size:.88rem;color:var(--text);white-space:nowrap;
      transition:background .12s;
    }
    .info-cd-opt:hover{background:rgba(212,175,55,.12);}
    .info-cd-opt.selected{background:rgba(212,175,55,.18);color:var(--gold);}
    .free-char .info-cd-opt:hover{background:rgba(74,222,128,.1);}
    .free-char .info-cd-opt.selected{background:rgba(74,222,128,.15);color:#4ade80;}

    /* ===== SELECT SOR (legördülő blokk-mező) ===== */
    .row-select-input{
      flex:1;background:transparent;border:none;
      border-bottom:1px dashed rgba(255,255,255,.12);
      color:#fff;font-size:.85rem;font-family:inherit;outline:none;
      transition:border-color .2s;min-width:0;cursor:pointer;
    }
    .row-select-input:focus{border-bottom-color:var(--accent);}
    .row-select-input option{background:#0f172a;color:#fff;}
    /* Custom blokk-sor dropdown */
    .row-cd{position:relative;flex:1;min-width:0;}
    .row-cd-btn{
      width:100%;display:flex;align-items:center;justify-content:space-between;
      background:transparent;border:none;border-bottom:1px dashed rgba(255,255,255,.12);
      color:#fff;padding:.1rem .25rem;font-size:.85rem;outline:none;
      cursor:pointer;font-family:inherit;text-align:left;transition:border-color .2s;
    }
    .row-cd-btn:hover{border-bottom-color:var(--accent);}
    .free-char .row-cd-btn:hover{border-bottom-color:#4ade80;}
    .row-cd-btn .cd-arrow{font-size:.55rem;opacity:.35;flex-shrink:0;margin-left:.2rem;}
    .row-cd-drop{
      position:fixed;z-index:9999;
      background:#0f172a;border:1px solid rgba(212,175,55,.22);
      border-radius:.5rem;padding:.25rem;min-width:130px;max-height:200px;overflow-y:auto;
      box-shadow:0 8px 28px rgba(0,0,0,.55);
      display:none;flex-direction:column;gap:2px;
    }
    .row-cd-drop.open{display:flex;}
    .row-cd-opt{
      padding:.28rem .55rem;border-radius:.3rem;cursor:pointer;
      font-size:.83rem;color:var(--text);white-space:nowrap;transition:background .12s;
    }
    .row-cd-opt:hover{background:rgba(212,175,55,.1);}
    .row-cd-opt.selected{background:rgba(212,175,55,.16);color:var(--gold);}
    .free-char .row-cd-opt:hover{background:rgba(74,222,128,.08);}
    .free-char .row-cd-opt.selected{background:rgba(74,222,128,.14);color:#4ade80;}
    @media print{ .row-cd-btn .cd-arrow{display:none!important;} .row-cd-drop{display:none!important;} }

    /* ===== PRINT ===== */
    @media print{
      @page {
        margin: 10mm;
      }
      html, body {
        background: #ffffff !important;
        color: #000000 !important;
      }
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
      }
      body {
        background: #ffffff !important;

      header, #magic-particles, .edit-only, #add-section-btn, .field-desc-icon { display:none!important; }
      .sheet-outer { padding: 0!important; margin: 0 auto !important; }
      .info-card, .sheet-card, .box-wrap {
        break-inside: avoid;
        background: #ffffff !important;
        border: 1.5px solid #999999 !important;
        box-shadow: none !important;
      }
      .box-wrap {
        border: 1px solid #bbbbbb !important;
      }
      .vtitle-input {
        color: #000000 !important;
        background: transparent !important;
        border: none !important;
      }
      .info-input, .info-label {
        color: #000000 !important;
        background: transparent !important;
        border-bottom: 1px solid #aaaaaa !important;
      }
      .combo-input, .info-cd-btn {
        color: #000000 !important;
        background: transparent !important;
        border-bottom: 1px solid #aaaaaa !important;
      }
      .row-label-input, .row-text-input {
        color: #000000 !important;
        background: transparent !important;
        border-bottom: 1px solid #aaaaaa !important;
      }
      .info-cd-btn .cd-arrow { display:none !important; }
      .info-cd-drop { display:none !important; }
      .section-title-input {
        color: #000000 !important;
        background: transparent !important;
        border-bottom: 1.5px solid #888888 !important;
      }
      .box-title-input {
        color: #000000 !important;
        background: transparent !important;
        border-bottom: 1px solid #aaaaaa !important;
      }
      textarea, input[type="text"] {
        color: #000000 !important;
        background: transparent !important;
      }
      .row-label {
        color: #222222 !important;
      }
      /* ── Pontok: valódi CSS körök nyomtatáshoz ── */
      .dot {
        display: inline-block !important;
        width: 11px !important;
        height: 11px !important;
        border-radius: 50% !important;
        border: 1.5px solid #333333 !important;
        background: transparent !important;
        font-size: 0 !important;
        vertical-align: middle !important;
        margin: 0 1px !important;
        color: transparent !important;
        text-shadow: none !important;
      }
      .dot.filled {
        background: #333333 !important;
        border-color: #333333 !important;
      }
      .header-dot {
        display: inline-block !important;
        width: 13px !important;
        height: 13px !important;
        border-radius: 50% !important;
        border: 1.5px solid #333333 !important;
        background: transparent !important;
        font-size: 0 !important;
        vertical-align: middle !important;
        margin: 0 1px !important;
        color: transparent !important;
        text-shadow: none !important;
      }
      .header-dot.filled {
        background: #333333 !important;
        border-color: #333333 !important;
      }
      .ornament, .ornament-sm {
        background: #cccccc !important;
      }
    }

    /* ===== RESPONSIVE ===== */
@media (max-width:767px){
  .sheet-outer{padding:1rem .75rem 5rem;gap:1rem;}
  header{flex-wrap:wrap;padding:.4rem .5rem;gap:.3rem;}
  .header-left{order:1;}
  .header-center{order:3;width:100%;justify-content:flex-start;overflow-x:auto;padding-bottom:.2rem;}
  .header-right{order:2;margin-left:auto;}

  .info-card{padding:1rem;}
  .info-grid{grid-template-columns: 1fr !important; gap: .7rem;}

  .info-label { font-size: 0.7rem; }
  .sheet-card{padding:1.1rem .9rem 1.5rem;}

  input, select, textarea { font-size: 16px !important; }
  .section-header {flex-wrap: wrap;gap: 0.5rem;}
  .section-edit-ctrls {width: 100%;justify-content: flex-end;}
}
    @media (min-width:768px) and (max-width:1023px){
      .sheet-outer{padding:1.5rem 1.25rem 4rem;}

    }

  </style>

<body>
<div id="magic-particles"></div>

<header>
  <!-- BAL: Navigáció -->
  <div class="header-left">
    <a href="index.html" class="btn">📖</a>
    <span class="page-title">Karakterlap</span>
  </div>

  <!-- KÖZÉP: Karakter eszközök -->
  <div class="header-center">

    <!-- Karakterek legördülő -->
    <div class="dd-wrap">
      <button class="btn btn-gold" onclick="toggleDD('charDD')">📁 Karakterek ▾</button>
      <div class="dd-menu" id="charDD">
        <div class="dd-section">Mentett karakterek</div>
        <div id="charList"><div class="dd-item" style="color:var(--muted);cursor:default;">Betöltés...</div></div>
        <div class="dd-section" style="margin-top:.25rem;">Aktuális</div>
        <div class="dd-item" onclick="saveCurrentChar()">💾 Mentés</div>
        <div class="dd-item" onclick="newChar()">✨ Új karakter</div>
        <div class="dd-item danger" onclick="resetSheet();closeAllDD()">↺ Alaphelyzet</div>
      </div>
    </div>

    <!-- Sablonok legördülő -->
    <div class="dd-wrap">
      <button class="btn" onclick="toggleDD('templateDD')">📋 Sablonok ▾</button>
      <div class="dd-menu" id="templateDD">
        <div class="dd-section">Elérhető sablonok</div>
        <div id="templateList"><div class="dd-item" style="color:var(--muted);cursor:default;">Betöltés...</div></div>
      </div>
    </div>

    <div class="header-sep"></div>

    <!-- Nézet -->
    <button class="btn btn-gold" id="viewBtn" onclick="toggleViewMode()">🔓 Szerkeszthető</button>

    <!-- Export -->
    <div class="export-wrap">
      <button class="btn" onclick="toggleExportMenu()">💾 Export ▾</button>
      <div class="export-menu" id="exportMenu">
        <div class="export-item" onclick="exportFull()">📄 Teljes karakterlap</div>
        <div class="export-item" onclick="exportTemplate()">📋 Sablon (üres értékek)</div>
        <div class="export-item" onclick="exportCard()">🃏 Karakter kártya (KM)</div>
      </div>
    </div>

    <!-- Import / Nyomtatás / Kép -->
    <button class="btn" onclick="document.getElementById('importFile').click()">📂 Import</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    <button class="btn" onclick="printSheet()">🖨️</button>
    <button class="btn" id="imgBtn" onclick="saveAsImage()">🖼️</button>

  </div>

  <!-- JOBB: User -->
  <div class="header-right">
    <span id="auth-username" style="font-size:.75rem;color:#d4af37;font-family:'Cinzel',serif;letter-spacing:.06em;white-space:nowrap;"></span>
    <button onclick="doLogout()" style="background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);color:#f87171;font-size:.75rem;padding:.3rem .7rem;border-radius:.4rem;cursor:pointer;white-space:nowrap;">Kilépés</button>
  </div>
</header>

<div class="sheet-outer" id="sheet-wrapper">

  <div class="vtitle-wrap">
    <div class="ornament-deco">✦ &nbsp; ✦ &nbsp; ✦</div>
    <div class="ornament" style="margin:.3rem 0;"></div>
    <input type="text" class="vtitle-input" id="vampireTitle" placeholder="KARAKTER NEVE"
      value="KARAKTER" oninput="sheetData.vampireTitle=this.value; window.scheduleSave()">
    <div class="ornament" style="margin:.3rem 0;"></div>
    <div class="ornament-deco">✦ &nbsp; ✦ &nbsp; ✦</div>
  </div>

  <div class="info-card">
    <div class="info-grid" id="info-grid-container">
    </div>
  </div>

  <div class="sheet-card">
    <div id="sections-container"></div>
    <button id="add-section-btn" class="edit-only" onclick="addSection()">
      ✦ &nbsp; Új szekció hozzáadása &nbsp; ✦
    </button>
  </div>

</div>

<script>
/* ==============================
   DEFAULT DATA
   ============================== */
const DEFAULT_SECTIONS = [
  { id:'sec_attr', title:'Tulajdonságok', boxes:[
    { id:'box_fiz', title:'Fizikai', rows:[
      {id:'r_ero',type:'dot',label:'Erő',value:0,max:5},
      {id:'r_ugy',type:'dot',label:'Ügyesség',value:0,max:5},
      {id:'r_all',type:'dot',label:'Állóképesség',value:0,max:5},
    ]},
    { id:'box_tars', title:'Társadalmi', rows:[
      {id:'r_kar',type:'dot',label:'Karizma',value:0,max:5},
      {id:'r_man',type:'dot',label:'Manipuláció',value:0,max:5},
      {id:'r_meg',type:'dot',label:'Megjelenés',value:0,max:5},
    ]},
    { id:'box_ment', title:'Mentális', rows:[
      {id:'r_erz',type:'dot',label:'Érzékelés',value:0,max:5},
      {id:'r_int',type:'dot',label:'Intelligencia',value:0,max:5},
      {id:'r_esz',type:'dot',label:'Észjárás',value:0,max:5},
    ]},
  ]},
  { id:'sec_abil', title:'Képességek', boxes:[
    { id:'box_teh', title:'Tehetségek', rows:[
      {id:'r_atl',type:'dot',label:'Atlétika',value:0,max:5},
      {id:'r_emp',type:'dot',label:'Empátia',value:0,max:5},
      {id:'r_ebe',type:'dot',label:'Éberség',value:0,max:5},
      {id:'r_hel',type:'dot',label:'Helyismeret',value:0,max:5},
      {id:'r_ira',type:'dot',label:'Irányítás',value:0,max:5},
      {id:'r_kez',type:'dot',label:'Kézitusa',value:0,max:5},
      {id:'r_kif',type:'dot',label:'Kifejezőkészség',value:0,max:5},
      {id:'r_kit',type:'dot',label:'Kitérés',value:0,max:5},
      {id:'r_fmeg',type:'dot',label:'Megfélemlítés',value:0,max:5},
      {id:'r_ras',type:'dot',label:'Rászedés',value:0,max:5},
    ]},
    { id:'box_jar', title:'Jártasságok', rows:[
      {id:'r_allt',type:'dot',label:'Állatszelídítés',value:0,max:5},
      {id:'r_biz',type:'dot',label:'Biztonsági rendszerek',value:0,max:5},
      {id:'r_ill',type:'dot',label:'Illemtan',value:0,max:5},
      {id:'r_koz',type:'dot',label:'Közelharc',value:0,max:5},
      {id:'r_lop',type:'dot',label:'Lopakodás',value:0,max:5},
      {id:'r_lof',type:'dot',label:'Lőfegyverek',value:0,max:5},
      {id:'r_mes',type:'dot',label:'Mesterség',value:0,max:5},
      {id:'r_szr',type:'dot',label:'Szereplés',value:0,max:5},
      {id:'r_tul',type:'dot',label:'Túlélés',value:0,max:5},
      {id:'r_vez',type:'dot',label:'Vezetés',value:0,max:5},
    ]},
    { id:'box_ism', title:'Ismeretek', rows:[
      {id:'r_hum',type:'dot',label:'Humán tudományok',value:0,max:5},
      {id:'r_jog',type:'dot',label:'Jog',value:0,max:5},
      {id:'r_nye',type:'dot',label:'Nyelvismeret',value:0,max:5},
      {id:'r_nyo',type:'dot',label:'Nyomozás',value:0,max:5},
      {id:'r_okk',type:'dot',label:'Okkultizmus',value:0,max:5},
      {id:'r_orv',type:'dot',label:'Orvostudomány',value:0,max:5},
      {id:'r_pen',type:'dot',label:'Pénzügy',value:0,max:5},
      {id:'r_pol',type:'dot',label:'Politika',value:0,max:5},
      {id:'r_ter',type:'dot',label:'Természettudomány',value:0,max:5},
    ]},
  ]},
  { id:'sec_adv', title:'Hátterek és Erények', boxes:[
    { id:'box_hat', title:'Hátterek / Előnyök', rows:[
      {id:'r_h1',type:'dot',label:'Háttér 1',value:0,max:5},
      {id:'r_h2',type:'dot',label:'Háttér 2',value:0,max:5},
      {id:'r_h3',type:'dot',label:'Háttér 3',value:0,max:5},
      {id:'r_h4',type:'dot',label:'Háttér 4',value:0,max:5},
      {id:'r_h5',type:'dot',label:'Háttér 5',value:0,max:5},
    ]},
    { id:'box_ereny', title:'Erények', rows:[
      {id:'r_lel',type:'dot',label:'Lelkiismeret',value:0,max:5},
      {id:'r_onur',type:'dot',label:'Önuralom',value:0,max:5},
      {id:'r_bat',type:'dot',label:'Bátorság',value:0,max:5},
    ]},
  ]},
  { id:'sec_notes', title:'Felszerelés és Megjegyzések', boxes:[
    { id:'box_fsz', title:'Fegyverek / Felszerelés', rows:[
      {id:'r_fsz',type:'textarea',label:'',value:''}
    ]},
    { id:'box_mj', title:'Egyéb Megjegyzések', rows:[
      {id:'r_mj',type:'textarea',label:'',value:''}
    ]},
  ]},
];

/* ==============================
   DEFAULT INFO FIELDS
   ============================== */
const DEFAULT_INFO_FIELDS = [
  {id:'inf_nev',    type:'text',   label:'Név',              value:''},
  {id:'inf_faj',    type:'select', label:'Faj / Származás',  value:'', options:[]},
  {id:'inf_kaszt',  type:'select', label:'Kaszt / Iskola',   value:'', options:[]},
  {id:'inf_isten',  type:'select', label:'Isten / Hit',      value:'', options:[]},
  {id:'inf_kronika',type:'text',   label:'Krónika',          value:''},
  {id:'inf_xp',     type:'number', label:'Tapasztalat',      value:''},
];

/* ==============================
   STATE
   ============================== */
let sheetData = {
  vampireTitle:'KARAKTER',
  infoFields: JSON.parse(JSON.stringify(DEFAULT_INFO_FIELDS)),
  sections: JSON.parse(JSON.stringify(DEFAULT_SECTIONS)),
  viewMode: 0
};

let _uid = 2000;
const uid = () => 'u' + (++_uid) + '_' + (Math.random()*999|0);

// Kompatibilitási helperek az infoFields tömbhöz
function getInfoVal(key) {
  const fields = sheetData.infoFields || [];
  // key lehet 'name','faj','kaszt'... (régi) vagy 'inf_nev','inf_faj'... (új)
  const legacyMap = {name:'inf_nev',faj:'inf_faj',kaszt:'inf_kaszt',isten:'inf_isten',kronika:'inf_kronika',xp:'inf_xp'};
  const id = legacyMap[key] || key;
  const f = fields.find(f => f.id === id);
  return f ? (f.value || '') : '';
}

function setInfoVal(key, val) {
  const fields = sheetData.infoFields || [];
  const legacyMap = {name:'inf_nev',faj:'inf_faj',kaszt:'inf_kaszt',isten:'inf_isten',kronika:'inf_kronika',xp:'inf_xp'};
  const id = legacyMap[key] || key;
  const f = fields.find(f => f.id === id);
  if (f) f.value = val;
}

function getInfoFieldById(id) {
  return (sheetData.infoFields || []).find(f => f.id === id) || null;
}

/* ==============================
   HELPERS
   ============================== */
function isRowHasValue(row) {
  if (row.type === 'dot' || row.type === 'header') return row.value > 0;
  return (row.value || '').trim().length > 0;
}

/* ==============================
   RENDER
   ============================== */
function renderAll() {
  const cont = document.getElementById('sections-container');
  cont.innerHTML = '';
  sheetData.sections.forEach(sec => renderSection(sec, cont));
  renderInfoFields();
}

function renderInfoFields() {
  const grid = document.getElementById('info-grid-container');
  if (!grid) return;
  grid.innerHTML = '';
  const fields = sheetData.infoFields || DEFAULT_INFO_FIELDS;
  const isPhoto = sheetData.viewMode === 2;
  fields.forEach(field => {
    const div = document.createElement('div');
    div.className = 'info-field';
    div.id = 'info-field-wrap-' + field.id;
    const label = document.createElement('span');
    label.className = 'info-label';
    label.textContent = field.label + ':';
    div.appendChild(label);

    if (field.type === 'select') {
      const isFree = !sheetData.template_id;
      if (isFree) {
        // Szabad karakternél: sima szöveges input, nincs dropdown/leírás
        const inp = document.createElement('input');
        inp.type='text'; inp.className='combo-input';
        inp.id='inpf_'+field.id; inp.value=field.value||''; inp.placeholder='...';
        inp.oninput = e => { field.value=e.target.value; window.scheduleSave(); };
        div.appendChild(inp);
      } else {
        const cdWrap = makeInfoCustomDrop(field);
        div.appendChild(cdWrap);
        // ⓘ icon – görgő átmegy a dropdown gombra
        const icon = makeFieldDescIcon(field.id, field.label);
        icon.onwheel = e => { if (cdWrap._btn) cdWrap._btn.onwheel(e) };
        div.appendChild(icon);
      }
    } else if (field.type === 'number') {
      const inp = document.createElement('input');
      inp.type = 'text'; inp.className = 'info-input';
      inp.id = 'inpf_' + field.id;
      inp.value = field.value || '';
      inp.placeholder = '0';
      inp.oninput = e => { field.value = e.target.value; window.scheduleSave(); };
      div.appendChild(inp);
    } else if (field.type === 'dot') {
      const dw = document.createElement('div'); dw.className = 'dots-wrap';
      renderDots(dw, field, false);
      div.appendChild(dw);
    } else if (field.type === 'symbol') {
      const sw = document.createElement('div'); sw.className = 'symbol-wrap';
      renderSymbols(sw, field);
      div.appendChild(sw);
    } else {
      // text default
      const inp = document.createElement('input');
      inp.type = 'text'; inp.className = 'info-input';
      inp.id = 'inpf_' + field.id;
      inp.value = field.value || '';
      inp.placeholder = '...';
      inp.oninput = e => { field.value = e.target.value; window.scheduleSave(); };
      div.appendChild(inp);
    }

    // Photo mode: hide if empty
    if (isPhoto && !(field.value && field.value !== '0' && field.value !== 0)) {
      div.style.display = 'none';
    }
    grid.appendChild(div);
  });
  // Update desc icons for select fields
  fields.filter(f => f.type === 'select').forEach(f => window.updateFieldDescIcon && window.updateFieldDescIcon(f.id));
}

function updateInfoVisibility() {
  const isPhoto = (sheetData.viewMode === 2);
  const fields = sheetData.infoFields || [];
  fields.forEach(field => {
    const wrap = document.getElementById('info-field-wrap-' + field.id);
    if (!wrap) return;
    if (!isPhoto) {
      wrap.style.display = 'flex';
    } else {
      const val = field.value;
      if (!val || val === '' || val === '0' || val === 0) {
        wrap.style.display = 'none';
      } else {
        wrap.style.display = 'flex';
      }
    }
  });
}

function renderSection(sec, cont) {
  // Fotó módban ha a szekció üres, elrejtjük
  if (sheetData.viewMode === 2) {
    const hasContent = sec.boxes.some(b => b.rows.some(r => isRowHasValue(r)));
    if (!hasContent) return;
  }

  const wrap = document.createElement('div');
  wrap.className = 'section-wrap';

  // Ornament + header
  const ornSm = document.createElement('div'); ornSm.className='ornament-sm';

  const hdr = document.createElement('div'); hdr.className='section-header';
  const ti = document.createElement('input');
  ti.type='text'; ti.className='section-title-input'; ti.value=sec.title;
  ti.oninput = e => { sec.title = e.target.value; window.scheduleSave(); };

  const ctrls = document.createElement('div'); ctrls.className='section-edit-ctrls edit-only';

  const addBoxBtn = document.createElement('button');
  addBoxBtn.className='btn btn-sm'; addBoxBtn.innerHTML='+ Blokk';
  addBoxBtn.onclick = () => {
    sec.boxes.push({id:uid(),title:'Új blokk',rows:[]});
    renderAll();
  };

  const delSecBtn = document.createElement('button');

  delSecBtn.onclick = () => {

      sheetData.sections = sheetData.sections.filter(s=>s.id!==sec.id);
      renderAll();
    }
  };
  ctrls.append(addBoxBtn, delSecBtn);

  addBoxPh.onclick = () => {
    sec.boxes.push({id:uid(),title:'Új blokk',rows:[]});

  wrap.append(ornSm, hdr, grid);

function renderBox(box, grid, sec) {
  // Fotó módban ha a blokk üres, elrejtjük
  if (sheetData.viewMode === 2) {
    const hasContent = box.rows.some(r => isRowHasValue(r));
    if (!hasContent) return;
  }

  const div = document.createElement('div'); div.className='box-wrap';

  // Header
  const bHdr = document.createElement('div'); bHdr.className='box-header';
  const bTi = document.createElement('input');
  bTi.type='text'; bTi.className='box-title-input'; bTi.value=box.title;
  bTi.oninput = e => { box.title = e.target.value; window.scheduleSave(); };

  const delBoxBtn = document.createElement('button');
  delBoxBtn.className='btn-del-box edit-only'; delBoxBtn.innerHTML='✕';
  delBoxBtn.title='Blokk törlése';
  delBoxBtn.onclick = () => {
    if(confirm(`"${box.title}" blokk törlése?`)) {
      sec.boxes = sec.boxes.filter(b=>b.id!==box.id);
      renderAll();
    }
  };
  bHdr.append(bTi, delBoxBtn);
  div.appendChild(bHdr);

  // Rows (Csak azokat jelenítjük meg, amik nem üresek fotó módban)
  box.rows.forEach(row => {
    if (sheetData.viewMode === 2 && !isRowHasValue(row)) return;
    div.appendChild(buildRow(row, box));
  });

  // Add row picker
  const addArea = document.createElement('div'); addArea.className='add-row-area edit-only';
  const picker = document.createElement('div'); picker.className='add-row-picker';
  [
    {t:'dot',   l:'●●● Pont-sor'},
    {t:'text',  l:'___ Szöveges sor'},
    {t:'textarea',l:'≡ Szövegmező'},
    {t:'header',l:'◉ Fejléc sáv'},
  ].forEach(({t,l}) => {
    const b = document.createElement('button');
    b.className='add-row-btn'; b.innerText=l;
    b.onclick = () => {
      box.rows.push({
        id:uid(), type:t,
        label: t==='dot'?'Új képesség': t==='header'?'Fejléc':'',
        value: (t==='dot'||t==='header') ? 0 : '',
        max:   t==='header' ? 10 : 5
      });
      renderAll();
    };
    picker.appendChild(b);
  });
  addArea.appendChild(picker);
  div.appendChild(addArea);
  grid.appendChild(div);
}

function buildRow(row, box) {
  const wrap = document.createElement('div');

  if (row.type === 'dot') {
    wrap.className='row-wrap';
    const li = makeRowLabelInput(row);
    const dw = document.createElement('div'); dw.className='dots-wrap';
    renderDots(dw, row, false);
    const icon = makeFieldDescIcon(row.id, row.label);
    wrap.append(li, dw, icon, makeDelRowBtn(row,box));

  } else if (row.type === 'text') {
    wrap.className='row-wrap';
    const li = makeRowLabelInput(row);
    li.style.maxWidth='100px'; li.placeholder='Felirat...';
    const ti = document.createElement('input');
    ti.type='text'; ti.className='row-text-input'; ti.value=row.value; ti.placeholder='...';
    ti.oninput = e => { row.value=e.target.value; window.scheduleSave(); };
    wrap.append(li, ti, makeDelRowBtn(row,box));

  } else if (row.type === 'select') {
    wrap.className='row-wrap';
    const li = makeRowLabelInput(row);
    li.style.maxWidth='100px';
    const cd = makeRowCustomDrop(row);
    const icon = makeFieldDescIcon(row.id, row.label);
    // Görgő az ⓘ ikonon átmegy a dropdown gombra
    icon.onwheel = e => { if (cd._btn) cd._btn.onwheel(e) };
    wrap.append(li, cd, icon, makeDelRowBtn(row,box));

  } else if (row.type === 'textarea') {
    wrap.style.cssText='flex-direction:column;align-items:stretch;display:flex;gap:.3rem;';
    const ta = document.createElement('textarea');
    ta.className='row-textarea'; ta.value=row.value; ta.placeholder='Ide írj...';
    ta.oninput = e => { row.value=e.target.value; window.scheduleSave(); };
    const del = makeDelRowBtn(row,box); del.style.alignSelf='flex-end';
    wrap.append(ta, del);

  } else if (row.type === 'header') {
    const hw = document.createElement('div'); hw.className='header-row-wrap';
    const hi = document.createElement('input');
    hi.type='text'; hi.className='header-row-input'; hi.value=row.label; hi.placeholder='Fejléc neve...';
    hi.oninput = e => { row.label=e.target.value; window.scheduleSave(); };
    const hdw = document.createElement('div'); hdw.className='header-dots-wrap';
    renderDots(hdw, row, true);
    const del = makeDelRowBtn(row,box);
    hw.append(hi, hdw, del);
    wrap.appendChild(hw);
  } else if (row.type === 'symbol') {
    wrap.className='row-wrap';
    const li = makeRowLabelInput(row);
    li.style.pointerEvents = 'none';
    li.style.borderBottomColor = 'transparent';
    const sw = document.createElement('div'); sw.className='symbol-wrap';
    renderSymbols(sw, row);
    const icon = makeFieldDescIcon(row.id, row.label);
    wrap.append(li, sw, icon, makeDelRowBtn(row,box));
  }
  return wrap;
}

function makeFieldDescIcon(fieldKey, fieldLabel) {
  const icon = document.createElement('span');
  icon.className = 'field-desc-icon';
  icon.id = 'desc_' + fieldKey;
  icon.textContent = 'i';
  icon.style.display = 'none';
  icon.onclick = e => window.toggleDescPopover(e, fieldKey);
  icon.onmouseenter = () => window.showDescPopover(fieldKey);
  icon.onmouseleave = () => window.hideDescPopover(fieldKey);
  // Görgetés az ⓘ ikonon átmegy a szülőre (combo-wrap → wheelCycleOption)
  icon.onwheel = e => {
    const parent = icon.closest('.info-field')
    if (!parent) return
    const inp = parent.querySelector('.combo-input')
    if (inp && inp.onwheel) inp.onwheel(e)
    else if (inp) { const ev = new WheelEvent('wheel', e); inp.dispatchEvent(ev); }
  }
  // Késleltetett megjelenítés/elrejtés, amint betöltődik a leírás-cache
  setTimeout(() => window.updateFieldDescIcon(fieldKey), 0);
  return icon;
}

function makeRowLabelInput(row) {
  const li = document.createElement('input');
  li.type='text'; li.className='row-label-input'; li.value=row.label;
  li.oninput = e => { row.label=e.target.value; window.scheduleSave(); };
  return li;
}

function makeDelRowBtn(row, box) {
  const b = document.createElement('button');
  b.className='btn-del-row edit-only'; b.innerHTML='✕'; b.title='Sor törlése';
  b.onclick = () => { box.rows=box.rows.filter(r=>r.id!==row.id); renderAll(); };
  return b;
}

function makeRowCustomDrop(row) {
  const wrap = document.createElement('div'); wrap.className = 'row-cd'
  const opts = row.options || []

  const btn = document.createElement('button'); btn.type='button'; btn.className='row-cd-btn'
  const span = document.createElement('span'); span.textContent = row.value || '—'
  const arrow = document.createElement('span'); arrow.className='cd-arrow'; arrow.textContent='▼'
  btn.append(span, arrow)

  if (opts.length === 0) {
    span.textContent = '(nincs opció)'
    span.style.color = 'var(--muted)'
    btn.disabled = true
    wrap.appendChild(btn)
    return wrap
  }

  const drop = document.createElement('div'); drop.className='row-cd-drop'
  document.body.appendChild(drop)

  opts.forEach(o => {
    const opt = document.createElement('div')
    opt.className = 'row-cd-opt' + (row.value===o?' selected':'')
    opt.textContent = o
    opt.onclick = e => {
      e.stopPropagation()
      row.value = o
      span.textContent = o
      drop.querySelectorAll('.row-cd-opt').forEach(el => el.classList.remove('selected'))
      opt.classList.add('selected')
      drop.classList.remove('open')
      window.scheduleSave()
      window.updateFieldDescIcon(row.id)
      if (document.getElementById('pop_'+row.id)?.classList.contains('open')) {
        window.showDescPopover(row.id)
      }
    }
    drop.appendChild(opt)
  })

  btn.onclick = e => {
    e.stopPropagation()
    const isOpen = drop.classList.contains('open')
    document.querySelectorAll('.row-cd-drop.open,.info-cd-drop.open').forEach(d => d.classList.remove('open'))
    if (!isOpen) {
      const r = btn.getBoundingClientRect()
      drop.style.top = (r.bottom+3)+'px'
      drop.style.left = r.left+'px'
      drop.style.minWidth = r.width+'px'
      drop.classList.add('open')
    }
  }

  btn.onwheel = e => {
    e.preventDefault()
    const idx = opts.indexOf(row.value)
    const next = e.deltaY>0 ? (idx+1)%opts.length : (idx-1+opts.length)%opts.length
    row.value = opts[next]
    span.textContent = row.value
    drop.querySelectorAll('.row-cd-opt').forEach((el,i) => el.classList.toggle('selected', i===next))
    window.scheduleSave()
    window.updateFieldDescIcon(row.id)
    if (document.getElementById('pop_'+row.id)?.classList.contains('open')) {
      window.showDescPopover(row.id)
    }
  }

  document.addEventListener('click', () => drop.classList.remove('open'), {capture:false})

  wrap._btn = btn
  wrap.appendChild(btn)
  return wrap
}

function makeInfoCustomDrop(field) {
  const wrap = document.createElement('div'); wrap.className = 'info-cd'
  const cache = window._fieldDescCache && window._fieldDescCache[field.id]
  const opts = (cache && cache.options.length > 0) ? cache.options : (field.options || [])

  const btn = document.createElement('button'); btn.type='button'; btn.className='info-cd-btn'
  const span = document.createElement('span'); span.textContent = field.value || '...'
  const arrow = document.createElement('span'); arrow.className='cd-arrow'; arrow.textContent='▼'
  btn.append(span, arrow)

  // Ha nincs opció: sima input legyen
  if (opts.length === 0) {
    const inp = document.createElement('input')
    inp.type='text'; inp.className='combo-input'
    inp.id='inpf_'+field.id; inp.value=field.value||''; inp.placeholder='...'
    inp.oninput = e => { field.value=e.target.value; window.scheduleSave(); window.updateFieldDescIcon(field.id) }
    inp.onwheel = e => window.wheelCycleOption(e, field.id)
    wrap.appendChild(inp)
    return wrap
  }

  const drop = document.createElement('div'); drop.className='info-cd-drop'
  document.body.appendChild(drop)

  opts.forEach(o => {
    const opt = document.createElement('div')
    opt.className = 'info-cd-opt' + (field.value===o?' selected':'')
    opt.textContent = o
    opt.onclick = e => {
      e.stopPropagation()
      field.value = o
      span.textContent = o || '...'
      drop.querySelectorAll('.info-cd-opt').forEach(el => el.classList.remove('selected'))
      opt.classList.add('selected')
      drop.classList.remove('open')
      window.scheduleSave()
      window.updateFieldDescIcon(field.id)
      if (document.getElementById('pop_'+field.id)?.classList.contains('open')) {
        window.showDescPopover(field.id)
      }
    }
    drop.appendChild(opt)
  })

  btn.onclick = e => {
    e.stopPropagation()
    const isOpen = drop.classList.contains('open')
    document.querySelectorAll('.info-cd-drop.open').forEach(d => d.classList.remove('open'))
    if (!isOpen) {
      const r = btn.getBoundingClientRect()
      drop.style.top = (r.bottom+4)+'px'
      drop.style.left = r.left+'px'
      drop.style.minWidth = r.width+'px'
      drop.classList.add('open')
    }
  }

  // Görgővel váltás
  btn.onwheel = e => {
    e.preventDefault()
    const idx = opts.indexOf(field.value)
    const next = e.deltaY>0 ? (idx+1)%opts.length : (idx-1+opts.length)%opts.length
    field.value = opts[next]
    span.textContent = field.value
    drop.querySelectorAll('.info-cd-opt').forEach((el,i) => el.classList.toggle('selected', i===next))
    window.scheduleSave()
    window.updateFieldDescIcon(field.id)
    if (document.getElementById('pop_'+field.id)?.classList.contains('open')) {
      window.showDescPopover(field.id)
    }
  }

  document.addEventListener('click', () => drop.classList.remove('open'), {capture:false})

  // Görgő az ⓘ ikonon is átmegy a btn-re
  wrap._btn = btn
  wrap.appendChild(btn)
  return wrap
}

function renderSymbols(container, row) {
  container.innerHTML = '';
  const max = Math.min(row.max || 5, 20);
  const SYM_EMPTY = {'★':'☆','♥':'♡','♦':'♢','♣':'♧','●':'○','■':'□','▲':'△','⬟':'⬠','✦':'✧'};
  const sym = row.symbol || '★';
  const empty = SYM_EMPTY[sym] || sym;
  const color = row.color || 'var(--gold)';
  for (let i = 1; i <= max; i++) {
    const d = document.createElement('span'); d.className = 'sym';
    const filled = i <= row.value;
    d.innerText = filled ? sym : empty;
    d.style.color = color;
    d.style.opacity = filled ? '1' : '0.28';
    if (filled) d.classList.add('filled');
    d.onclick = () => { row.value = (row.value === i) ? i-1 : i; renderSymbols(container, row); window.scheduleSave(); };
    container.appendChild(d);
  }
}

function renderDots(container, row, isHeader) {
  container.innerHTML = '';
  const max = row.max || 5;
  for (let i=1;i<=max;i++) {
    const d = document.createElement('span');
    const cls = isHeader ? 'header-dot' : 'dot';
    d.className = cls + (i<=row.value ? ' filled' : '');
    d.innerText = i<=row.value ? '●' : '○';
    d.onclick = () => {
      if(sheetData.viewMode === 2) return; 
      row.value = (row.value===i) ? i-1 : i;
      renderDots(container, row, isHeader);
      window.scheduleSave();
    };
    container.appendChild(d);
  }
}

function exportTemplate() {
  const tmpl = JSON.parse(JSON.stringify(sheetData));
  tmpl._type = 'magus_char_template';
  tmpl.vampireTitle = 'KARAKTER';
  tmpl.viewMode = 0;
  delete tmpl.template_id;
  delete tmpl.template_name;
  // infoFields értékeinek nullázása
  if (tmpl.infoFields) {
    tmpl.infoFields.forEach(f => {
      f.value = (f.type==='dot'||f.type==='header'||f.type==='symbol') ? 0 : '';
    });
  }
  // Szekció értékek nullázása
  tmpl.sections.forEach(sec =>
    sec.boxes.forEach(box =>
      box.rows.forEach(row => {
        row.value = (row.type==='dot'||row.type==='header'||row.type==='symbol') ? 0 : '';
      })
    )
  );
  dlJson(tmpl, 'karakter_sablon.json');
  document.getElementById('exportMenu').classList.remove('open');
}

function exportCard() {
  const card = {
    _type: 'magus_character_card', _version: 3,
    name: getInfoVal('name'), faj: getInfoVal('faj'),
    kaszt: getInfoVal('kaszt'), isten: getInfoVal('isten'),
    kronika: getInfoVal('kronika'), xp: getInfoVal('xp'),
    title: sheetData.vampireTitle,
    template_id: sheetData.template_id || null,
    template_name: sheetData.template_name || null,
    infoFields: (sheetData.infoFields || []).map(f => ({
      id:f.id, label:f.label, type:f.type, value:f.value,
      max:f.max, symbol:f.symbol, color:f.color
    })),
    stats: []
  };
  sheetData.sections.forEach(sec =>
    sec.boxes.forEach(box =>
      box.rows.forEach(row => {
        if (isRowHasValue(row)) card.stats.push({
          section: sec.title, box: box.title,
          type: row.type, label: row.label,
          value: row.value, max: row.max||5,
          ...(row.type==='symbol' ? {symbol:row.symbol, color:row.color} : {})
        });
      })
    )
  );
  const n = getInfoVal('name') || 'Nevtelen';
  dlJson(card, `kartya_${n.replace(/\s+/g,'_').toLowerCase()}.json`);
  document.getElementById('exportMenu').classList.remove('open');
}

function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const data = JSON.parse(evt.target.result);
      if (data._type === 'magus_character_card') {
        alert('Ez egy karakter kártya fájl – közvetlenül nem tölthető be a karakterlapra.');
        return;
      }
      const isTemplateFile = data._type === 'magus_char_template';
      sheetData = data;
      sheetData.viewMode = 1;
      // Sablon fájl importnál: template_id törlése (szabad karakterként kezeljük)
      // Teljes karakter importnál: template_id megmarad (sablon alapú marad ha volt)
      if (isTemplateFile) {
        delete sheetData.template_id;
        delete sheetData.template_name;
        sheetData.vampireTitle = 'KARAKTER';
        // infoFields értékeinek nullázása
        if (sheetData.infoFields) {
          sheetData.infoFields.forEach(f => {
            f.value = (f.type==='dot'||f.type==='header'||f.type==='symbol') ? 0 : '';
          });
        }
      }
      window._currentSheetId = null; // import = mindig új karakter (mentésig)
      migrateInfoToFields();
      syncInfoFieldOptions();
      document.getElementById('vampireTitle').value = sheetData.vampireTitle || 'KARAKTER';
      document.body.classList.remove('sheet-locked', 'sheet-photo');
      document.body.classList.add('sheet-locked');
      const btn = document.getElementById('viewBtn');
      if (btn) { btn.innerHTML = '🔒 Lezárva (Szerkesztés)'; btn.style.cssText='border-color:rgba(239,68,68,.4)!important;color:#f87171!important;'; }
      renderAll();
      applyCharTheme();
      window.scheduleSave();
      alert(isTemplateFile ? 'Sablon betöltve – szabad karakterként szerkesztheted!' : (sheetData.template_id ? 'Sablon alapú karakter betöltve!' : 'Szabad karakter betöltve!'));
    } catch(err) { alert('Hiba: ' + err.message); }
  };
  reader.readAsText(file); e.target.value = '';
}
