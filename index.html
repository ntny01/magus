<script>
  (async () => {
    const sb = supabase.createClient(
      'https://nmzdvsnoomusukkczuav.supabase.co',
      'sb_publishable_JCRzD-ElN1os72wkfX_DKw_PoOTgnYR'
    )
    const { data: { session } } = await sb.auth.getSession()
    if (!session) { window.location.href = 'login.html'; return }
    const { data: profile } = await sb.from('user_profiles')
      .select('status').eq('id', session.user.id).single()
    if (!profile || profile.status !== 'active') {
      await sb.auth.signOut()
      window.location.href = 'login.html'
    }
  })()

        );

    pointer-events:none;
}

article::after{

    content:'';

    position:absolute;

    inset:0;

    background:
        radial-gradient(
            circle at top,
            rgba(212,175,55,.05),
            transparent 35%
        );

    pointer-events:none;
}

/* ===== PARAGRAPH READABILITY ===== */

p{

    max-width:78ch;

    letter-spacing:.01em;
}

/* ===== SECTION TITLES ===== */

h2{

    position:relative;

    padding-bottom:14px;

    margin-bottom:24px;
}

h2::after{

    content:'';

    position:absolute;

    left:0;
    bottom:0;

    width:120px;
    height:2px;

    background:
        linear-gradient(
            90deg,
            #d4af37,
            transparent
        );
}
/* ===== NAV MAGIC ===== */

.nav-link{

    position:relative;

    overflow:hidden;
}

.nav-link::before{

    content:'';

    position:absolute;

    inset:0;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,.06),
            transparent
        );

    transform:translateX(-100%);

    transition:.45s;
}

.nav-link:hover::before{

    transform:translateX(100%);
}
/* ===== PARTICLES ===== */

#magic-particles{

    position:fixed;

    inset:0;

    overflow:hidden;

    pointer-events:none;

    z-index:-1;
}

.rune{

    position:absolute;

    color:rgba(212,175,55,.12);

    font-size:14px;

    animation:floatRune linear infinite;
}

@keyframes floatRune{

    from{

        transform:
            translateY(100vh)
            rotate(0deg);

        opacity:0;
    }

    10%{

        opacity:1;
    }

    90%{

        opacity:1;
    }

    to{

        transform:
            translateY(-120px)
            rotate(360deg);

        opacity:0;
    }
}
/* ===== TABLE UPGRADE ===== */

table{

    background:
        rgba(255,255,255,.02);

    overflow:hidden;

    border-radius:18px;
}

tr{

    transition:.2s;
}

tbody tr:hover{

    background:
        rgba(255,255,255,.03);
}
/* ===== BUTTON MAGIC ===== */

.page-btn,
.icon-btn,
.header-icon-btn{

    position:relative;

    overflow:hidden;
}

.page-btn::before,
.icon-btn::before,
.header-icon-btn::before{

    content:'';

    position:absolute;

    inset:0;

    background:
        linear-gradient(
            120deg,
            transparent,
            rgba(255,255,255,.08),
            transparent
        );

    transform:translateX(-120%);

    transition:.45s;
}

.page-btn:hover::before,
.icon-btn:hover::before,
.header-icon-btn:hover::before{

    transform:translateX(120%);
}
</style>
</head>

    <script>
// Globális állapotok és adatbázis alapértelmezés
let utkData = { "chapters": [] };
let allSections = [];
let currentSectionIndex = 0;

// UI ELEMEK KIGYŰJTÉSE
const sidebar = document.getElementById('sidebar');
const contentArea = document.getElementById('content-area');
const menuToggle = document.getElementById('menuToggle');
const overlay = document.getElementById('overlay');
const scrollToTopBtn = document.getElementById('scrollToTop');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const globalSearch = document.getElementById('globalSearch');
const searchResults = document.getElementById('searchResults');
const bookmarkMenuBtn = document.getElementById('bookmarkMenuBtn');
const bookmarkDropdown = document.getElementById('bookmarkDropdown');
const bookmarkList = document.getElementById('bookmarkList');

// HAMBURGER MENÜ TOGGLE
function toggleMenu() {
    if (!sidebar) return;
    const isOpen = sidebar.classList.contains('open');
    if (isOpen) {
        sidebar.classList.remove('open');
        sidebar.classList.add('closed');
        if (overlay) overlay.style.display = 'none';
    } else {
        sidebar.classList.remove('closed');
        sidebar.classList.add('open');
        if (overlay) overlay.style.display = 'block';
    }
}
if (menuToggle) {
    menuToggle.addEventListener('click', toggleMenu);
}
if (overlay) {
    overlay.addEventListener('click', () => {
        if (sidebar && sidebar.classList.contains('open')) toggleMenu();
    });
}

// MOBIL KERESÉS TOGGLE
const mobileSearchBtn = document.getElementById('mobileSearchBtn');
const searchContainer = document.getElementById('searchContainer');
if (mobileSearchBtn && searchContainer) {
    mobileSearchBtn.addEventListener('click', () => {
        const isOpen = searchContainer.classList.contains('mobile-open');
        if (isOpen) {
            searchContainer.classList.remove('mobile-open');
            mobileSearchBtn.innerText = '🔍';
        } else {
            searchContainer.classList.add('mobile-open');
            mobileSearchBtn.innerText = '✕';
            setTimeout(() => { if(globalSearch) globalSearch.focus(); }, 100);
        }
    });
}

// Automatikus belső hivatkozások generálása kulcsszavak alapján (Glosszary Híd)
function autoLinkify(text) {
    if (!text || typeof text !== 'string' || !allSections || allSections.length === 0) return text;
    let linkedText = text;
    allSections.forEach(sec => {
        const currentTitle = sec.section_title || sec.title;
        if (currentTitle && currentTitle.length > 4) {
            const escapedTitle = currentTitle.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
            const regex = new RegExp(`\\b(${escapedTitle})\\b`, 'gi');
            
            if (linkedText.includes(currentTitle) && !linkedText.includes(sec.id)) {
                linkedText = linkedText.replace(regex, (match) => {
                    return `<span class="hyperlink-anchor" style="color: #3b82f6; font-weight: 600; cursor: pointer; text-decoration: underline;" onclick="jumpToSection('${sec.id}')">${match}</span>`;
                });
            }
        }
    });
    return linkedText;
}

// ASZINKRON ADATBÁZIS BETÖLTÉS
async function loadFullDatabase() {
    try {
        const response = await fetch('utk_data.json');
        if (!response.ok) throw new Error('Nem sikerült betölteni az utk_data.json fájlt.');
        
        utkData = await response.json();
        
        flattenSections();
        initSidebar();
        
        if (allSections && allSections.length > 0) {
            currentSectionIndex = 0;
            renderSection(allSections[currentSectionIndex]);
        } else {
            contentArea.innerHTML = "<h3>⚠️Az adatbázis szerkezete üres. Futtasd le a compile_cache.py szkriptet!</h3>";
        }
    } catch (error) {
        printCriticalError(error);
    }
}

function printCriticalError(error) {
    console.error("Hiba az adatbázis betöltésekor:", error);
    if (contentArea) {
        contentArea.innerHTML = `
            <div style="padding: 2rem; border: 1px solid #ef4444; background: rgba(239, 68, 68, 0.1); border-radius: 0.5rem; margin-top: 2rem;">
                <h3 style="color: #ef4444; margin-bottom: 0.5rem;">⚠️Adatbázis Kapcsolati Hiba</h3>
                <p style="font-size: 0.95rem; line-height: 1.6;">A böngésző biztonsági okokból (CORS) letiltotta a helyi fájlrendszerről történő betöltést.</p>
                <p style="font-size: 0.85rem; margin-top: 1rem; color: var(--text-muted);">
                <strong>Megoldás:</strong> Indíts egy helyi szervert a projekt mappájában! <br>
                Terminálból: <code style="background: var(--bg-main); padding: 0.2rem 0.4rem; border-radius: 0.25rem;">python -m http.server 8000</code> vagy VS Code-ban használd a <strong>Live Server</strong> bővítményt.</p>
            </div>
        `;
    }
}

// SÖTÉT MÓD KÉNYSZERÍTÉSE
document.documentElement.classList.add('dark');

function flattenSections() {
    allSections = [];
    if (!utkData || !utkData.chapters) return;
    utkData.chapters.forEach(chapter => {
        if (chapter.sections) {
            chapter.sections.forEach(section => {
                allSections.push(section);
            });
        }
    });
}

// OLDALSÁV FASTREUKTÚRA GENERÁLÁSA
function initSidebar() {
    if (!sidebar) return;
    sidebar.innerHTML = '';
    if (!utkData || !utkData.chapters) return;
    
    utkData.chapters.forEach(chapter => {
        const group = document.createElement('div');
        group.className = 'nav-group';
        
        const titleBtn = document.createElement('button');
        titleBtn.className = 'nav-title';
        titleBtn.innerHTML = `${chapter.title} <span>▼</span>`;
        
        const linksContainer = document.createElement('div');
        linksContainer.className = 'nav-links';
        
        titleBtn.addEventListener('click', () => {
            linksContainer.style.display = linksContainer.style.display === 'none' ? 'block' : 'none';
            titleBtn.querySelector('span').innerText = linksContainer.style.display === 'none' ? '▶' : '▼';
        });

        if (chapter.sections) {
            chapter.sections.forEach(section => {
                const link = document.createElement('span');
                link.className = 'nav-link';
                link.innerText = section.section_title || section.title || "Általános Áttekintés";
                
                link.addEventListener('click', () => {
                    currentSectionIndex = allSections.findIndex(s => s.id === section.id);
                    renderSection(allSections[currentSectionIndex]);
                    if (window.innerWidth < 768 && typeof toggleMenu === 'function') toggleMenu();
                });
                linksContainer.appendChild(link);
            });
        }
        
        group.appendChild(titleBtn);
        group.appendChild(linksContainer);
        sidebar.appendChild(group);
    });
}

// TARTALOM DINAMIKUS MEGJELENÍTÉSE
function renderSection(section) {
    if (!section || !contentArea) return;
    contentArea.animate(
    [
        {
            opacity:.4,
            transform:'translateY(8px)'
        },
        {
            opacity:1,
            transform:'translateY(0)'
        }
    ],
    {
        duration:350,
        easing:'ease-out'
    }
);
    contentArea.innerHTML = '';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    
    let bookmarks = [];
    try { bookmarks = JSON.parse(localStorage.getItem('magus_bookmarks')) || []; } catch(e){}
    const isBookmarked = bookmarks.includes(section.id);
    
    const displayTitle = section.section_title || section.title || "Általános Áttekintés";
    
    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `
        <h2>${displayTitle}</h2>
        <div style="display:flex; gap:0.75rem; font-size:1rem; align-items:center;">
            <span style="cursor:pointer; color: ${isBookmarked ? '#10b981' : 'inherit'};" id="sectionBookmarkIcon">${isBookmarked ? '⭐' : '🔖'}</span>
            <span style="cursor:pointer;" id="copyLinkIcon">🔗</span>
        </div>
    `;
    contentArea.appendChild(header);
    
    document.getElementById('copyLinkIcon').addEventListener('click', () => {
        navigator.clipboard.writeText(window.location.href);
        alert('Link kimásolva!');
    });
    document.getElementById('sectionBookmarkIcon').addEventListener('click', () => {
        toggleBookmark(section.id);
    });
    
    const blocks = section.content_blocks || section.content;
    if (!blocks) return;
    
    blocks.forEach(block => {
        if (block.type === 'paragraph' && block.text) {
            const p = document.createElement('p');
            p.innerHTML = autoLinkify(block.text);
            contentArea.appendChild(p);
        }
        else if (block.type === 'rule' && block.text) {
            const div = document.createElement('div');
            div.className = 'callout callout-rule';
            div.innerHTML = `<div class="callout-title">🎲 ${block.title || 'Rendszerszabály'}</div>
                             <p style="font-style:italic; font-size:0.9rem; margin:0;">${autoLinkify(block.text)}</p>`;
            contentArea.appendChild(div);
        }
        else if (block.type === 'flavor_text' && block.text) {
            const div = document.createElement('div');
            div.style.padding = '0.5rem 1.5rem';
            div.style.borderLeft = '2px solid var(--text-muted)';
            div.style.margin = '1rem 0';
            div.innerHTML = `<p style="font-style:italic; font-size:0.95rem; color: var(--text-muted); line-height:1.6;">${autoLinkify(block.text)}</p>`;
            contentArea.appendChild(div);
        }
        else if (block.type === 'example' && block.text) {
            const div = document.createElement('div');
            div.className = 'callout callout-example';
            div.innerHTML = `<div class="callout-title">📖 ${block.title || 'Példa'}</div>
                             <p style="font-size:0.9rem; margin:0;">${autoLinkify(block.text)}</p>`;
            contentArea.appendChild(div);
        }
        else if (block.type === 'table') {
            const container = document.createElement('div');
            container.className = 'table-container';
            let tableHTML = '<table><thead><tr>';
            
            if (block.headers && Array.isArray(block.headers)) {
                block.headers.forEach(h => tableHTML += `<th>${h}</th>`);
            }
            tableHTML += '</tr></thead><tbody>';
            
            if (block.rows && Array.isArray(block.rows)) {
                block.rows.forEach(row => {
                    if (Array.isArray(row)) {
                        tableHTML += '<tr>';
                        row.forEach((cell, idx) => {
                            let linkedCell = autoLinkify(String(cell));
                            if (idx === 2) {
                                tableHTML += `<td><span class="formula">${linkedCell}</span></td>`;
                            } else {
                                tableHTML += `<td style="${idx === 0 ? 'font-weight:600;' : ''}">${linkedCell}</td>`;
                            }
                        });
                        tableHTML += '</tr>';
                    }
                });
            }
            tableHTML += '</tbody></table>';
            container.innerHTML = tableHTML;
            contentArea.appendChild(container);
        }
    });
    updatePaginationButtons();
}

function updatePaginationButtons() {
    if (!prevBtn || !nextBtn) return;
    prevBtn.style.visibility = (currentSectionIndex === 0) ? 'hidden' : 'visible';
    nextBtn.style.visibility = (currentSectionIndex === allSections.length - 1) ? 'hidden' : 'visible';
}

if (prevBtn) {
    prevBtn.addEventListener('click', () => {
        if (currentSectionIndex > 0) {
            currentSectionIndex--;
            renderSection(allSections[currentSectionIndex]);
        }
    });
}
if (nextBtn) {
    nextBtn.addEventListener('click', () => {
        if (currentSectionIndex < allSections.length - 1) {
            currentSectionIndex++;
            renderSection(allSections[currentSectionIndex]);
        }
    });
}

// =====================================================================
// 🎲 SÚLYOZOTT RPG KERESŐMOTOR V2.0 - PREMIUM PRODUCTION ENGINE
// =====================================================================
if (globalSearch && searchResults) {
    globalSearch.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        
        // Ha a keresőszó rövidebb mint 2 karakter, teljesen kiürítjük és elrejtjük a panelt
        if (query.length < 2) {
            searchResults.style.display = 'none';
            searchResults.innerHTML = '';
            return;
        }
        
        searchResults.innerHTML = '';
        let resultsArray = [];
        
        // Végigpásztázzuk a teljes adatbázist
        utkData.chapters.forEach(chapter => {
            if (!chapter.sections) return;
            
            chapter.sections.forEach(section => {
                let score = 0;
                let previewText = '';
                const currentTitle = section.section_title || section.title || "Általános Áttekintés";
                const sectionTitleLower = currentTitle.toLowerCase();
                const chapterTitleLower = (chapter.title || "").toLowerCase();
                
                // 1. SZINT: Főfejezet címegyezés (Pl. ha beírja, hogy "Bárdok")
                if (chapterTitleLower === query) score += 150;
                else if (chapterTitleLower.includes(query)) score += 30;
                
                // 2. SZINT: Alfejezet / Alkaszt címegyezés
                if (sectionTitleLower === query) {
                    score += 100;
                    previewText = `<span style="color: var(--accent); font-weight:700;">Pontos fejezetcím egyezés</span>`;
                } else if (sectionTitleLower.includes(query)) {
                    score += 50;
                    previewText = `Fejezetcímben szerepel`;
                }
                
                // 3. SZINT: Mélyszintű tartalomvizsgálat blokkonként
                const blocks = section.content_blocks || section.content;
                if (blocks && Array.isArray(blocks)) {
                    blocks.forEach(block => {
                        const blockText = (block.text || "").toLowerCase();
                        const blockTitle = (block.title || "").toLowerCase();
                        
                        // Ha a szabálydoboz címében van a kulcsszó
                        if (blockTitle && blockTitle.includes(query)) {
                            score += 40;
                        }
                        
                        // Ha a szövegtörzsben van a kulcsszó
                        if (blockText && blockText.includes(query)) {
                            // Súlyozás a blokk típusa szerint (A játékszabályok előnyt élveznek a hangulati elemekkel szemben)
                            if (block.type === 'rule') score += 25;
                            else if (block.type === 'table') score += 20;
                            else score += 5;
                            
                            // Ha még nincs szép előnézeti szövegünk, legeneráljuk a kulcsszó köré igazítva
                            if (!previewText || previewText.includes("szerepel") || previewText.includes("egyezés")) {
                                const idx = blockText.indexOf(query);
                                // Kiszámoljuk a vágási pontokat, hogy ne szavakat vágjunk félbe
                                const start = Math.max(0, idx - 40);
                                const end = Math.min(block.text.length, idx + 60);
                                
                                let rawSnippet = block.text.substring(start, end).replace(/<[^>]*>/g, '');
                                
                                // Regex-alapú vizuális kiemelés a kulcsszóra (Case Insensitive mark)
                                const highlightRegex = new RegExp(`(${query.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&')})`, 'gi');
                                previewText = "..." + rawSnippet.replace(highlightRegex, '<mark style="background-color: rgba(245, 158, 11, 0.3); color: #f59e0b; padding: 0.1rem 0.2rem; border-radius: 0.25rem; font-weight: 600;">$1</mark>') + "...";
                            }
                        }
                        
                        // Táblázatok belső celláinak átvizsgálása (Fegyverkódok, ME módosítók kereshetősége)
                        if (block.type === 'table' && block.rows) {
                            block.rows.forEach(row => {
                                if (Array.isArray(row)) {
                                    row.forEach(cell => {
                                        if (String(cell).toLowerCase().includes(query)) {
                                            score += 15;
                                            if (!previewText) {
                                                previewText = `Megtalálható az alfejezet egyik adattáblázatában.`;
                                            }
                                        }
                                    });
                                }
                            });
                        }
                    });
                }
                
                // Ha a pontszám nagyobb mint nulla, érvényes találatként elmentjük
                if (score > 0) {
                    resultsArray.push({
                        section: section,
                        chapterTitle: chapter.title || "ÁLTALÁNOS",
                        score: score,
                        previewText: previewText || "Nincs elérhető szöveges előnézet."
                    });
                }
            });
        });
        
        // Szigorú relevancia szerinti rendezés (a legtöbb pontot elérő találat megy legfelülre)
        resultsArray.sort((a, b) => b.score - a.score);
        
        // Renderelés a HTML felületre
        if (resultsArray.length > 0) {
            resultsArray.forEach(res => {
                const item = document.createElement('div');
                item.style.padding = '0.85rem 1rem';
                item.style.cursor = 'pointer';
                item.style.borderBottom = '1px solid var(--border-color)';
                item.style.transition = 'background-color 0.15s';
                
                // Hover effektus programozott hozzáadása
                item.addEventListener('mouseenter', () => item.style.backgroundColor = 'var(--border-color)');
                item.addEventListener('mouseleave', () => item.style.backgroundColor = 'transparent');
                
                const currentTitle = res.section.section_title || res.section.title || "Általános Áttekintés";
                
                // Jelvények (Badge) generálása a relevancia vizuális jelzésére
                let badge = '';
                if (res.score >= 100) {
                    badge = `<span style="font-size:0.65rem; background:rgba(16,185,129,0.15); color:#10b981; padding:0.15rem 0.4rem; border-radius:0.25rem; margin-left:0.5rem; font-weight:700; border: 1px solid rgba(16,185,129,0.3);">KASZT / TÉMA</span>`;
                } else if (res.score >= 40) {
                    badge = `<span style="font-size:0.65rem; background:rgba(59,130,246,0.15); color:#3b82f6; padding:0.15rem 0.4rem; border-radius:0.25rem; margin-left:0.5rem; font-weight:600;">ALFEJEZET</span>`;
                }
                
                item.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="font-weight: 700; font-size: 0.925rem; color: var(--accent); display: flex; align-items: center; gap: 0.25rem;">
                            ${currentTitle} ${badge}
                        </div>
                        <div style="font-size: 0.65rem; color: var(--text-muted); font-family: monospace; background: var(--bg-main); padding: 0.1rem 0.3rem; border-radius: 0.25rem; border: 1px solid var(--border-color);">
                            ${res.chapterTitle}
                        </div>
                    </div>
                    <div style="font-size: 0.78rem; color: var(--text-muted); margin-top: 0.35rem; line-height: 1.4; letter-spacing: 0.01em;">
                        ${res.previewText}
                    </div>
                `;
                
                // Kattintás esemény: Beállítja az indexet és rendereli a teljes szekciót
                item.addEventListener('click', () => {
                    currentSectionIndex = allSections.findIndex(s => s.id === res.section.id);
                    if (currentSectionIndex !== -1) {
                        renderSection(allSections[currentSectionIndex]);
                    }
                    globalSearch.value = '';
                    searchResults.style.display = 'none';
                });
                
                searchResults.appendChild(item);
            });
            searchResults.style.display = 'block';
        } else {
            searchResults.innerHTML = '<div style="padding: 1rem; font-size: 0.85rem; color: var(--text-muted); text-align: center; font-style: italic;">⚔️ Nincs találat az ÚTK krónikáiban...</div>';
            searchResults.style.display = 'block';
        }
    });
}

if (bookmarkMenuBtn && bookmarkDropdown) {
    bookmarkMenuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (bookmarkDropdown.style.display === 'none') {
            renderBookmarkList();
            bookmarkDropdown.style.display = 'block';
        } else {
            bookmarkDropdown.style.display = 'none';
        }
    });
}

function toggleBookmark(sectionId) {
    let bookmarks = [];
    try { bookmarks = JSON.parse(localStorage.getItem('magus_bookmarks')) || []; } catch(e){}
    const icon = document.getElementById('sectionBookmarkIcon');
    
    if (bookmarks.includes(sectionId)) {
        bookmarks = bookmarks.filter(id => id !== sectionId);
        if(icon) { icon.innerText = '🔖'; icon.style.color = 'inherit'; }
    } else {
        bookmarks.push(sectionId);
        if(icon) { icon.innerText = '⭐'; icon.style.color = '#10b981'; }
    }
    localStorage.setItem('magus_bookmarks', JSON.stringify(bookmarks));
    if (typeof renderBookmarkList === 'function') renderBookmarkList();
}

function renderBookmarkList() {
    if (!bookmarkList) return;
    bookmarkList.innerHTML = '';
    let bookmarks = [];
    try { bookmarks = JSON.parse(localStorage.getItem('magus_bookmarks')) || []; } catch(e){}
    
    if (bookmarks.length === 0) {
        bookmarkList.innerHTML = `<div style="padding: 0.75rem 1rem; font-size: 0.85rem; color: var(--text-muted); font-style: italic;">Nincs elmentett szabály...</div>`;
        return;
    }
    
    bookmarks.forEach(sectionId => {
        let foundSection = null;
        utkData.chapters.forEach(chapter => {
            if (chapter.sections) {
                const sec = chapter.sections.find(s => s.id === sectionId);
                if (sec) foundSection = sec;
            }
        });
        
        if (foundSection) {
            const item = document.createElement('div');
            item.style.display = 'flex'; item.style.justifyContent = 'space-between'; item.style.alignItems = 'center';
            item.style.padding = '0.5rem 1rem'; item.style.borderBottom = '1px solid var(--border-color)';
            item.style.fontSize = '0.85rem';
            
            const linkPart = document.createElement('span');
            const currentTitle = foundSection.section_title || foundSection.title || "Általános Áttekintés";
            linkPart.innerText = currentTitle; linkPart.style.cursor = 'pointer'; linkPart.style.flex = '1'; linkPart.style.color = 'var(--text-main)';
            linkPart.addEventListener('click', () => {
                currentSectionIndex = allSections.findIndex(s => s.id === foundSection.id);
                renderSection(allSections[currentSectionIndex]);
                if (bookmarkDropdown) bookmarkDropdown.style.display = 'none';
            });
            
            const deletePart = document.createElement('span');
            deletePart.innerText = '❌'; deletePart.style.cursor = 'pointer'; deletePart.style.paddingLeft = '0.5rem'; deletePart.style.fontSize = '0.75rem';
            deletePart.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleBookmark(sectionId);
            });
            
            item.appendChild(linkPart);
            item.appendChild(deletePart);
            bookmarkList.appendChild(item);
        }
    });
}

window.jumpToSection = function(sectionId) {
    if (!glossaryModal || !glossaryModalBody) return;
    const foundSection = allSections.find(s => s.id === sectionId);
    if (!foundSection) return;
    
    const currentTitle = foundSection.section_title || foundSection.title || "Általános Áttekintés";
    glossaryModalBody.innerHTML = `<h3 style="color: var(--accent); margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">${currentTitle}</h3>`;
    
    const blocks = foundSection.content_blocks || foundSection.content;
    if (blocks) {
        blocks.forEach(block => {
            if (block.type === 'paragraph' && block.text) {
                const p = document.createElement('p');
                p.style.fontSize = '0.9rem'; p.style.lineHeight = '1.5';
                p.innerHTML = block.text;
                glossaryModalBody.appendChild(p);
            }
            else if (block.type === 'rule' && block.text) {
                const div = document.createElement('div');
                div.className = 'callout callout-rule';
                div.innerHTML = `<div class="callout-title">🎲 ${block.title || 'Szabály'}</div><p style="font-style:italic; font-size:0.85rem; margin:0;">${block.text}</p>`;
                glossaryModalBody.appendChild(div);
            }
        });
    }
    glossaryModal.style.display = 'flex';
};

/* ===== FONT SIZE CONTROLS FIX ===== */

(() => {

    let currentScale = 1;

    const contentTarget =
        document.querySelector('main')
        || document.querySelector('article')
        || document.body;

    const buttons = [...document.querySelectorAll('.font-btn')];

    if(buttons.length < 2) return;

    const decreaseBtn = buttons[0];
    const increaseBtn = buttons[1];

    function applyScale(){

        contentTarget.style.fontSize = `${currentScale}rem`;

        localStorage.setItem(
            'magusFontScale',
            currentScale
        );

    }

    increaseBtn.addEventListener('click', () => {

        currentScale = Math.min(currentScale + 0.08, 1.6);

        applyScale();

    });

    decreaseBtn.addEventListener('click', () => {

        currentScale = Math.max(currentScale - 0.08, 0.8);

        applyScale();

    });

    const saved =
        parseFloat(localStorage.getItem('magusFontScale'));

    if(saved){

        currentScale = saved;

        applyScale();

    }

})();

/* ===== MOBIL BETŰMÉRET GOMBOK ===== */
(() => {
    const mDec = document.getElementById('mobileFontDecrease');
    const mInc = document.getElementById('mobileFontIncrease');
    if (!mDec || !mInc) return;
    const contentTarget = document.querySelector('main') || document.body;
    function getScale() { return parseFloat(localStorage.getItem('magusFontScale')) || 1; }
    function applyScale(s) {
        contentTarget.style.fontSize = `${s}rem`;
        localStorage.setItem('magusFontScale', s);
    }
    mInc.addEventListener('click', () => applyScale(Math.min(getScale() + 0.08, 1.6)));
    mDec.addEventListener('click', () => applyScale(Math.max(getScale() - 0.08, 0.8)));
})();

(() => {

    const container =

    if(!container) return;

    const runes =
        ['✦','ᚱ','ᛟ','✧','☽','☼'];

    function createRune(){

        const rune =
            document.createElement('div');

        rune.className = 'rune';

        rune.innerText =
            runes[
                Math.floor(Math.random()*runes.length)
            ];

        rune.style.left =
            Math.random()*100 + 'vw';

        rune.style.animationDuration =
            10 + Math.random()*15 + 's';

        rune.style.fontSize =
            12 + Math.random()*20 + 'px';

        container.appendChild(rune);

        setTimeout(() => {

            rune.remove();

        },25000);

    }

    setInterval(createRune,1200);

})();
