<script>
(async () => {
  const sb = supabase.createClient(
    'https://nmzdvsnoomusukkczuav.supabase.co',
    'sb_publishable_JCRzD-ElN1os72wkfX_DKw_PoOTgnYR'
  )
  window._sb = sb
  const { data: { session } } = await sb.auth.getSession()
  if (!session) { window.location.href = 'login.html'; return }
  const { data: profile } = await sb.from('user_profiles')
    .select('status, role, display_name').eq('id', session.user.id).single()
  if (!profile || profile.status !== 'active') {
    await sb.auth.signOut()
    window.location.href = 'login.html'
    return
  }
  if (profile.role !== 'admin') {
    window.location.href = 'index.html'
    return
  }
  window._userProfile = profile
})()

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M.A.G.U.S. – Műhely</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

:root {
  --bg-main:#020617; --bg-card:#0f172a; --bg-sheet:rgba(12,20,40,0.88);
  --border:rgba(212,175,55,0.18); --border-soft:rgba(255,255,255,0.06);
  --text:#e2e8f0; --muted:#94a3b8; --gold:#d4af37;
  --gold-glow:rgba(212,175,55,0.3); --accent:#10b981; --accent-h:#34d399; --red:#f87171;
  --purple:#a855f7; --blue:#3b82f6;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

body {
  font-family:'Inter',sans-serif;
  background:
    radial-gradient(ellipse at 10% 5%,rgba(168,85,247,.08) 0%,transparent 40%),
    radial-gradient(ellipse at 90% 90%,rgba(212,175,55,.07) 0%,transparent 40%),
    radial-gradient(ellipse at 50% 50%,rgba(30,10,60,.5) 0%,transparent 70%),
    linear-gradient(160deg,#020617 0%,#07051a 50%,#020a14 100%);
  color:var(--text); min-height:100vh; overflow-x:hidden;
}

/* ===== PARTICLES ===== */
#magic-particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.rune{position:absolute;color:rgba(168,85,247,0.08);animation:floatRune linear infinite;pointer-events:none;}
@keyframes floatRune{
  from{transform:translateY(100vh) rotate(0deg);opacity:0;}
  8%{opacity:1;} 90%{opacity:.8;}
  to{transform:translateY(-120px) rotate(360deg);opacity:0;}
}

/* ===== HEADER ===== */
header{
  position:sticky;top:0;z-index:50;
  background:rgba(2,6,23,0.96);backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(168,85,247,0.2);
  padding:.5rem 1.25rem;
  display:flex;align-items:center;justify-content:space-between;gap:.5rem;
}
.header-left{display:flex;align-items:center;gap:.6rem;flex-shrink:0;}
.header-center{display:flex;align-items:center;gap:.4rem;flex:1;justify-content:center;flex-wrap:wrap;}
.header-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0;}
.muhely-title{
  font-family:'Cinzel',serif;
  font-size:1.15rem;
  letter-spacing:.15em;
  color:var(--purple);
  text-shadow:0 0 20px rgba(168,85,247,0.4);
  white-space:nowrap;
}
.muhely-badge{
  font-size:.65rem;font-weight:700;letter-spacing:.1em;
  background:rgba(168,85,247,0.12);
  border:1px solid rgba(168,85,247,0.3);
  color:var(--purple);
  padding:.2rem .55rem;border-radius:.35rem;
  text-transform:uppercase;
}
.header-sep{width:1px;height:24px;background:rgba(255,255,255,0.08);flex-shrink:0;margin:0 .15rem;}

/* ===== TABS ===== */
.tab-bar{
  display:flex;gap:.35rem;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border-soft);
  border-radius:.75rem;padding:.25rem;
}
.tab-btn{
  background:none;border:none;
  color:var(--muted);font-family:'Cinzel',serif;
  font-size:.75rem;letter-spacing:.07em;
  padding:.4rem .9rem;border-radius:.55rem;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.tab-btn.active{
  background:rgba(168,85,247,0.12);
  color:var(--purple);
  border:1px solid rgba(168,85,247,0.25);
}

/* ===== BUTTONS ===== */
.btn{
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);
  color:var(--text);padding:.35rem .8rem;font-size:.78rem;font-weight:600;
  border-radius:.5rem;cursor:pointer;transition:all .18s;
  display:inline-flex;align-items:center;gap:.3rem;
  white-space:nowrap;min-height:32px;font-family:inherit;
}
.btn:hover{background:rgba(168,85,247,.08);border-color:rgba(168,85,247,.35);color:var(--purple);}
.btn-purple{border-color:rgba(168,85,247,.4)!important;color:var(--purple)!important;}
.btn-purple:hover{background:rgba(168,85,247,.1)!important;}
.btn-gold{border-color:rgba(212,175,55,.4)!important;color:var(--gold)!important;}
.btn-gold:hover{background:rgba(212,175,55,.08)!important;}
.btn-green{border-color:rgba(16,185,129,.4)!important;color:var(--accent-h)!important;}
.btn-green:hover{background:rgba(16,185,129,.08)!important;}
.btn-red{border-color:rgba(239,68,68,.35)!important;color:var(--red)!important;}
.btn-red:hover{background:rgba(239,68,68,.08)!important;}
.btn-sm{padding:.25rem .55rem;font-size:.72rem;min-height:26px;}

/* ===== MAIN LAYOUT ===== */
.workspace{
  max-width:1600px;margin:0 auto;
  padding:1.5rem 1.25rem 5rem;
  display:grid;
  grid-template-columns:320px 1fr;
  gap:1.5rem;
  position:relative;z-index:1;
}

/* ===== PANEL ===== */
.panel{
  background:rgba(15,23,42,0.7);
  border:1px solid var(--border);
  border-radius:1rem;
  overflow:hidden;
}
.panel-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:.75rem 1rem;
  border-bottom:1px solid var(--border-soft);
  background:rgba(168,85,247,0.04);
}
.panel-title{
  font-family:'Cinzel',serif;
  font-size:.8rem;letter-spacing:.1em;
  color:var(--purple);text-transform:uppercase;
}
.panel-body{padding:.5rem 0;max-height:calc(100vh - 180px);overflow-y:auto;}

/* ===== SABLON LISTA ===== */
.template-item{
  display:flex;align-items:center;gap:.5rem;
  padding:.6rem 1rem;
  cursor:pointer;
  transition:background .15s;
  border-bottom:1px solid var(--border-soft);
}
.template-item:last-child{border:none;}
.template-item:hover{background:rgba(168,85,247,0.06);}
.template-item.active{background:rgba(168,85,247,0.1);border-left:2px solid var(--purple);}
.template-name{font-size:.85rem;font-weight:600;flex:1;}
.template-sub{font-size:.72rem;color:var(--muted);display:block;margin-top:.1rem;}
.template-badge{
  font-size:.62rem;padding:.15rem .4rem;border-radius:.3rem;
  font-weight:700;letter-spacing:.05em;
}
.badge-pub{background:rgba(16,185,129,.12);color:var(--accent-h);border:1px solid rgba(16,185,129,.2);}
.badge-hidden{background:rgba(148,163,184,.1);color:var(--muted);border:1px solid rgba(148,163,184,.15);}
.template-actions{display:flex;gap:.3rem;flex-shrink:0;}

/* ===== EDITOR (jobb oldal) ===== */
.editor-area{display:flex;flex-direction:column;gap:1rem;}

.editor-toolbar{
  display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;
  background:rgba(15,23,42,0.7);
  border:1px solid var(--border);
  border-radius:1rem;
  padding:.65rem 1rem;
}
.editor-name-input{
  font-family:'Cinzel',serif;
  font-size:1rem;letter-spacing:.1em;
  background:transparent;border:none;outline:none;
  color:var(--text);flex:1;min-width:180px;
  border-bottom:1px solid rgba(168,85,247,0.2);
  padding-bottom:.2rem;
}
.editor-name-input::placeholder{color:rgba(148,163,184,0.4);}

/* ===== KARAKTERLAP STÍLUSOK (char.html-ből átvett) ===== */
.sheet-outer{
  max-width:100%;
  display:flex;flex-direction:column;gap:1.5rem;
}
.vtitle-wrap{text-align:center;padding:.25rem 0;}
.vtitle-input{
  font-family:'Cinzel',serif;
  font-size:clamp(1.6rem,4vw,2.8rem);
  font-weight:700;letter-spacing:.22em;text-transform:uppercase;
  color:var(--text);background:transparent;border:none;outline:none;
  text-align:center;width:100%;
  text-shadow:0 0 40px rgba(168,85,247,.2),0 2px 6px rgba(0,0,0,.6);
}
.ornament{height:2px;background:linear-gradient(90deg,transparent 0%,rgba(168,85,247,.5) 20%,rgba(168,85,247,.5) 80%,transparent 100%);border-radius:2px;margin:.4rem 0;}
.ornament-sm{height:1px;background:linear-gradient(90deg,transparent,rgba(168,85,247,.2),transparent);border-radius:1px;margin:.2rem 0;}
.ornament-deco{text-align:center;font-size:.75rem;color:rgba(168,85,247,.3);letter-spacing:.5em;user-select:none;}

.info-card{
  background:var(--bg-sheet);border:1px solid var(--border);
  border-radius:.9rem;padding:1.25rem 1.5rem;
}
.info-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem 1.5rem;
  align-items:start;
}
.info-field{display:flex;align-items:baseline;gap:.4rem;}
.info-label{font-size:.72rem;font-weight:600;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;}
.info-input{
  background:transparent;border:none;outline:none;
  border-bottom:1px dashed rgba(255,255,255,.12);
  color:var(--text);font-size:.85rem;width:100%;padding:.15rem 0;
}

.sheet-card{
  background:var(--bg-sheet);border:1px solid var(--border);
  border-radius:.9rem;padding:1.5rem;
}
.section-wrap{margin-bottom:1.5rem;}
.section-header{display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin-bottom:.6rem;}
.section-title-input{
  font-family:'Cinzel',serif;font-size:1.05rem;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--gold);background:transparent;border:none;outline:none;
  border-bottom:2px solid rgba(168,85,247,.2);padding-bottom:.15rem;flex:1;
}
.section-edit-ctrls{display:flex;gap:.35rem;}
.boxes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.85rem;}
.box-wrap{
  background:rgba(255,255,255,.025);border:1px solid var(--border-soft);
  border-radius:.7rem;padding:.85rem .9rem;
}
.box-header{display:flex;align-items:center;gap:.4rem;margin-bottom:.6rem;}
.box-title-input{
  font-size:.72rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
  color:var(--muted);background:transparent;border:none;outline:none;
  border-bottom:1px solid transparent;flex:1;
  transition:border-color .15s;
}
.box-title-input:focus{border-bottom-color:rgba(168,85,247,.3);}
.btn-del-box{
  background:none;border:none;color:rgba(239,68,68,.4);font-size:.75rem;
  cursor:pointer;padding:.1rem .3rem;border-radius:.3rem;transition:all .15s;
}
.btn-del-box:hover{color:var(--red);background:rgba(239,68,68,.08);}

.row-wrap{display:flex;align-items:center;gap:.5rem;padding:.2rem 0;border-bottom:1px solid rgba(255,255,255,.04);}
.row-wrap:last-of-type{border:none;}
.row-label-input{
  font-size:.8rem;color:var(--text);background:transparent;
  border:none;outline:none;flex:1;min-width:0;
  border-bottom:1px solid transparent;transition:border-color .15s;
}
.row-label-input:focus{border-bottom-color:rgba(168,85,247,.3);}
.dots-wrap{display:flex;gap:3px;user-select:none;flex-shrink:0;}
.dot{cursor:pointer;color:var(--muted);font-size:1.05rem;transition:color .1s,transform .12s;line-height:1;}
.dot:hover{transform:scale(1.28);color:var(--purple);}
.dot.filled{color:var(--purple);text-shadow:0 0 6px rgba(168,85,247,.5);}
.btn-del-row{
  background:none;border:none;color:rgba(239,68,68,.35);font-size:.72rem;
  cursor:pointer;padding:.1rem .25rem;border-radius:.25rem;transition:all .15s;flex-shrink:0;
}
.btn-del-row:hover{color:var(--red);}

.row-text-input{
  flex:1;background:transparent;border:none;outline:none;
  border-bottom:1px dashed rgba(255,255,255,.1);
  color:var(--text);font-size:.82rem;padding:.1rem 0;
}
.row-textarea{
  width:100%;min-height:70px;resize:vertical;
  background:rgba(255,255,255,.03);border:1px solid var(--border-soft);
  border-radius:.45rem;color:var(--text);font-size:.82rem;
  padding:.5rem .7rem;font-family:inherit;outline:none;
}
.row-textarea:focus{border-color:rgba(168,85,247,.3);}

.header-row-wrap{
  display:flex;align-items:center;gap:.5rem;
  background:rgba(168,85,247,.05);border:1px solid rgba(168,85,247,.1);
  border-radius:.5rem;padding:.4rem .6rem;margin:.25rem 0;
}
.header-row-input{
  font-family:'Cinzel',serif;font-size:.85rem;font-weight:600;letter-spacing:.08em;
  color:var(--purple);background:transparent;border:none;outline:none;flex:1;
}
.header-dots-wrap{display:flex;gap:2px;user-select:none;flex-shrink:0;}
.header-dot{cursor:pointer;color:var(--muted);font-size:1.1rem;transition:color .1s;line-height:1;}
.header-dot.filled{color:var(--purple);}

.add-row-area{margin-top:.5rem;}
.add-row-picker{display:flex;flex-wrap:wrap;gap:.3rem;}
.add-row-btn{
  background:rgba(255,255,255,.03);border:1px solid var(--border-soft);
  color:var(--muted);font-size:.7rem;padding:.25rem .5rem;
  border-radius:.4rem;cursor:pointer;transition:all .15s;
}
.add-row-btn:hover{border-color:rgba(168,85,247,.3);color:var(--purple);background:rgba(168,85,247,.06);}

.add-box-placeholder{
  display:flex;align-items:center;justify-content:center;gap:.4rem;
  border:1px dashed rgba(168,85,247,.2);border-radius:.7rem;
  color:rgba(168,85,247,.4);font-size:.8rem;
  padding:.85rem;cursor:pointer;transition:all .18s;min-height:80px;
}
.add-box-placeholder:hover{border-color:rgba(168,85,247,.4);color:var(--purple);background:rgba(168,85,247,.04);}

#add-section-btn{
  display:flex;align-items:center;justify-content:center;gap:.5rem;
  width:100%;background:transparent;
  border:2px dashed rgba(168,85,247,.2);border-radius:.9rem;
  color:rgba(168,85,247,.4);font-family:'Cinzel',serif;font-size:.82rem;
  letter-spacing:.1em;padding:1rem;cursor:pointer;transition:all .2s;
  margin-top:.5rem;
}
#add-section-btn:hover{border-color:rgba(168,85,247,.4);color:var(--purple);background:rgba(168,85,247,.04);}

/* ===== EMPTY STATE ===== */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1rem;padding:4rem 2rem;text-align:center;
  color:var(--muted);
}
.empty-state-icon{font-size:3.5rem;opacity:.4;}
.empty-state-title{font-family:'Cinzel',serif;font-size:1rem;letter-spacing:.1em;color:var(--muted);}
.empty-state-sub{font-size:.82rem;max-width:280px;line-height:1.6;}

/* ===== PUBLIKÁLÁS TOGGLE ===== */
.pub-toggle{
  display:flex;align-items:center;gap:.5rem;
  background:rgba(255,255,255,.03);border:1px solid var(--border-soft);
  border-radius:.5rem;padding:.35rem .7rem;font-size:.78rem;cursor:pointer;
  transition:all .18s;
}
.pub-toggle.published{border-color:rgba(16,185,129,.3);color:var(--accent-h);}
.pub-toggle:hover{background:rgba(16,185,129,.06);}

/* ===== OPCIÓ SZERKESZTŐ ===== */
.opt-edit-btn{
  background:rgba(255,255,255,.03);border:1px solid var(--border-soft);
  color:var(--muted);font-size:.78rem;padding:.2rem .4rem;
  border-radius:.4rem;cursor:pointer;transition:all .15s;flex-shrink:0;line-height:1;
}
.opt-edit-btn:hover{border-color:rgba(168,85,247,.35);color:var(--purple);background:rgba(168,85,247,.06);}
.opt-edit-btn.has-data{border-color:rgba(16,185,129,.4);color:var(--accent-h);background:rgba(16,185,129,.06);}
.opt-edit-btn.has-data:hover{border-color:rgba(16,185,129,.6);background:rgba(16,185,129,.1);}

.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem;
}
.modal-box{
  background:var(--bg-card);border:1px solid rgba(168,85,247,.25);
  border-radius:1rem;max-width:520px;width:100%;max-height:80vh;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 20px 80px rgba(0,0,0,.5);
}
.modal-header{
  padding:1rem 1.25rem;border-bottom:1px solid var(--border-soft);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-title{font-family:'Cinzel',serif;font-size:1rem;letter-spacing:.08em;color:var(--purple);}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;padding:.2rem .4rem;border-radius:.3rem;}
.modal-close:hover{color:var(--red);background:rgba(239,68,68,.08);}
.modal-body{padding:1rem 1.25rem;overflow-y:auto;flex:1;}
.modal-footer{padding:.85rem 1.25rem;border-top:1px solid var(--border-soft);display:flex;gap:.5rem;}

.opt-add-row{display:flex;gap:.5rem;margin-bottom:.85rem;}
.opt-add-input{
  flex:1;background:rgba(255,255,255,.03);border:1px solid var(--border-soft);
  border-radius:.5rem;color:var(--text);padding:.5rem .7rem;font-size:.85rem;outline:none;
}
.opt-add-input:focus{border-color:rgba(168,85,247,.35);}

.opt-list-item{
  border:1px solid var(--border-soft);border-radius:.6rem;
  padding:.6rem .8rem;margin-bottom:.5rem;
}
.opt-list-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem;}
.opt-list-name{font-weight:600;font-size:.85rem;flex:1;}
.opt-list-badge{
  font-size:.62rem;padding:.1rem .35rem;border-radius:.3rem;
  background:rgba(148,163,184,.1);color:var(--muted);border:1px solid rgba(148,163,184,.15);
}
.opt-list-badge.has-desc{background:rgba(16,185,129,.1);color:var(--accent-h);border-color:rgba(16,185,129,.2);}
.opt-desc-input{
  width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border-soft);
  border-radius:.4rem;color:var(--text);padding:.45rem .6rem;font-size:.8rem;
  outline:none;resize:vertical;min-height:50px;font-family:inherit;
}
.opt-desc-input:focus{border-color:rgba(168,85,247,.3);}
.opt-del-btn{
  background:none;border:none;color:rgba(239,68,68,.4);cursor:pointer;
  font-size:.8rem;padding:.1rem .35rem;border-radius:.3rem;transition:all .15s;
}
.opt-del-btn:hover{color:var(--red);background:rgba(239,68,68,.08);}

/* ===== INFO CARD SZERKESZTŐ ===== */
.info-card-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:.75rem;
}
.info-card-title{
  font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.1em;
  color:var(--muted);text-transform:uppercase;
}
.info-field-edit{
  position:relative;
  display:flex;align-items:baseline;gap:.3rem;
  padding:.15rem .2rem;border-radius:.4rem;
  transition:background .15s;
}
.info-field-edit:hover{background:rgba(168,85,247,.05);}
.info-field-label-input{
  font-size:.72rem;font-weight:600;color:var(--muted);letter-spacing:.05em;
  text-transform:uppercase;white-space:nowrap;
  background:transparent;border:none;outline:none;
  border-bottom:1px dashed rgba(168,85,247,.2);
  width:90px;flex-shrink:0;
  transition:border-color .15s;
}
.info-field-label-input:focus{border-bottom-color:rgba(168,85,247,.5);}
.info-del-btn{
  background:none;border:none;color:rgba(239,68,68,.3);font-size:.7rem;
  cursor:pointer;padding:.1rem .25rem;border-radius:.25rem;
  transition:all .15s;flex-shrink:0;opacity:0;
}
.info-field-edit:hover .info-del-btn{opacity:1;}
.info-del-btn:hover{color:var(--red);background:rgba(239,68,68,.08);}

.info-add-picker{
  display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.6rem;padding-top:.6rem;
  border-top:1px dashed rgba(168,85,247,.12);
}
.info-add-btn{
  background:rgba(255,255,255,.03);border:1px dashed rgba(168,85,247,.2);
  color:rgba(168,85,247,.5);font-size:.7rem;padding:.2rem .5rem;
  border-radius:.4rem;cursor:pointer;transition:all .15s;
}
.info-add-btn:hover{border-color:rgba(168,85,247,.4);color:var(--purple);background:rgba(168,85,247,.06);}

/* ===== SZIMBÓLUM SOR ===== */
.symbol-wrap{display:flex;flex-wrap:wrap;gap:3px;user-select:none;flex-shrink:0;max-width:100%;}
.sym{cursor:pointer;font-size:1.05rem;transition:transform .12s;line-height:1;flex-shrink:0;}
.sym:hover{transform:scale(1.28);}
.sym-controls{display:flex;flex-wrap:wrap;align-items:center;gap:.35rem;margin-top:.2rem;}
.sym-picker{
  position:relative;flex-shrink:0;
}
.sym-picker-btn{
  display:flex;align-items:center;gap:.35rem;
  background:rgba(255,255,255,.05);border:1px solid var(--border-soft);
  border-radius:.35rem;color:var(--text);font-size:.82rem;
  padding:.18rem .5rem;outline:none;cursor:pointer;white-space:nowrap;
  transition:border-color .15s,background .15s;
}
.sym-picker-btn:hover{border-color:rgba(168,85,247,.35);background:rgba(168,85,247,.07);}
.sym-picker-btn .arrow{font-size:.6rem;opacity:.5;margin-left:.1rem;}
.sym-dropdown{
  position:fixed;z-index:9999;
  background:var(--bg-card,#1a1a2e);border:1px solid rgba(168,85,247,.25);
  border-radius:.55rem;padding:.3rem;min-width:130px;
  box-shadow:0 8px 32px rgba(0,0,0,.55);
  display:none;flex-direction:column;gap:2px;
}
.sym-dropdown.open{display:flex;}
.sym-opt{
  display:flex;align-items:center;gap:.5rem;
  padding:.3rem .55rem;border-radius:.35rem;cursor:pointer;
  font-size:.85rem;color:var(--text);white-space:nowrap;
  transition:background .12s;
}
.sym-opt:hover{background:rgba(168,85,247,.12);}
.sym-opt.selected{background:rgba(168,85,247,.18);color:var(--purple);}
.sym-opt-icon{font-size:1rem;line-height:1;width:1.2rem;text-align:center;}
.sym-color-input{
  width:2rem;height:1.5rem;border:1px solid var(--border-soft);border-radius:.35rem;
  background:transparent;cursor:pointer;padding:0;outline:none;flex-shrink:0;
}
.sym-max-input{
  width:2.8rem;background:rgba(255,255,255,.05);border:1px solid var(--border-soft);
  border-radius:.35rem;color:var(--text);font-size:.78rem;text-align:center;
  padding:.1rem .2rem;outline:none;flex-shrink:0;
}
.sym-max-input:focus{border-color:rgba(168,85,247,.4);}
.sym-row-outer{display:flex;flex-direction:column;gap:.15rem;flex:1;min-width:0;}
.row-wrap.symbol-row{align-items:flex-start;}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .workspace{grid-template-columns:1fr;grid-template-rows:auto 1fr;}
  .panel-body{max-height:250px;}
}
@media(max-width:600px){
  .info-grid{grid-template-columns:1fr 1fr;}
  .boxes-grid{grid-template-columns:1fr;}
  header{padding:.4rem .75rem;}
}
</style>

<body>
<div id="magic-particles"></div>

<header>
  <div class="header-left">
    <a href="index.html" class="btn" style="padding:.3rem .6rem;">◀</a>

    <button onclick="doLogout()" style="background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);color:#f87171;font-size:.75rem;padding:.3rem .7rem;border-radius:.4rem;cursor:pointer;">Kilépés</button>

<!-- SABLONOK TAB -->

<!-- TÉRKÉP TERVEK TAB -->

  <!-- Kampány térkép vezérlő sáv -->

    <span style="font-family:'Cinzel',serif;color:var(--purple);font-size:.82rem;letter-spacing:.08em;white-space:nowrap;">🗺️ Kampány Térkép</span>
    <input type="text" id="campaignMapName" placeholder="Kampány térkép neve..."
      style="flex:1;min-width:160px;background:rgba(255,255,255,.04);border:1px solid rgba(168,85,247,.2);border-radius:.5rem;color:var(--text);padding:.35rem .7rem;font-size:.82rem;outline:none;">
    <button onclick="saveCampaignMap()" style="background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.3);color:#c084fc;border-radius:.5rem;padding:.35rem .8rem;cursor:pointer;font-size:.82rem;white-space:nowrap;">💾 Mentés</button>
    <button onclick="publishCampaignMap()" id="publishCampaignBtn" style="background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#34d399;border-radius:.5rem;padding:.35rem .8rem;cursor:pointer;font-size:.82rem;white-space:nowrap;">📢 Publikálás</button>
    <button onclick="unpublishCampaignMap()" id="unpublishCampaignBtn" style="display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#f87171;border-radius:.5rem;padding:.35rem .8rem;cursor:pointer;font-size:.82rem;white-space:nowrap;">🔕 Visszavon</button>
    <div id="campaignMapStatus" style="font-size:.75rem;color:var(--muted);"></div>
  </div>

  <!-- Mentett kampány térképek listája -->
  <div style="display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;">
    <span style="font-size:.75rem;color:var(--muted);">Mentett térképek:</span>
    <div id="campaignMapList" style="display:flex;gap:.4rem;flex-wrap:wrap;"></div>
  </div>

  <!-- Térkép iframe -->
  <div style="position:relative;flex:1;min-height:0;border-radius:.75rem;overflow:hidden;border:1px solid rgba(168,85,247,.2);">
    <iframe id="mapIframe"
      src="ynev_terkep.html?mode=admin"
      style="width:100%;height:calc(100vh - 220px);border:none;display:block;"
      title="Ynev Kaland Térkép">
    </iframe>
  </div>

</div>

<script>
/* ==============================
   DEFAULT SECTIONS (char.html-ből)
   ============================== */
const DEFAULT_SECTIONS = [
  { id:'sec_attr', title:'Tulajdonságok', boxes:[
    { id:'box_fiz', title:'Fizikai', rows:[
      {id:'r_ero',type:'dot',label:'Erő',value:0,max:5},
      {id:'r_ugy',type:'dot',label:'Ügyesség',value:0,max:5},
      {id:'r_all',type:'dot',label:'Állóképesség',value:0,max:5},
    ]},
    { id:'box_tars', title:'Társadalmi', rows:[
      {id:'r_kar',type:'dot',label:'Karizma',value:0,max:5},
      {id:'r_man',type:'dot',label:'Manipuláció',value:0,max:5},
      {id:'r_meg',type:'dot',label:'Megjelenés',value:0,max:5},
    ]},
    { id:'box_ment', title:'Mentális', rows:[
      {id:'r_erz',type:'dot',label:'Érzékelés',value:0,max:5},

      {id:'r_esz',type:'dot',label:'Észjárás',value:0,max:5},
    ]},
  ]},
  { id:'sec_abil', title:'Képességek', boxes:[
    { id:'box_teh', title:'Tehetségek', rows:[
      {id:'r_atl',type:'dot',label:'Atlétika',value:0,max:5},
      {id:'r_emp',type:'dot',label:'Empátia',value:0,max:5},
      {id:'r_ebe',type:'dot',label:'Éberség',value:0,max:5},
      {id:'r_hel',type:'dot',label:'Helyismeret',value:0,max:5},
      {id:'r_ira',type:'dot',label:'Irányítás',value:0,max:5},
      {id:'r_kez',type:'dot',label:'Kézitusa',value:0,max:5},
      {id:'r_kif',type:'dot',label:'Kifejezőkészség',value:0,max:5},
      {id:'r_kit',type:'dot',label:'Kitérés',value:0,max:5},
      {id:'r_fmeg',type:'dot',label:'Megfélemlítés',value:0,max:5},
      {id:'r_ras',type:'dot',label:'Rászedés',value:0,max:5},
    ]},
    { id:'box_jar', title:'Jártasságok', rows:[
      {id:'r_ill',type:'dot',label:'Illemtan',value:0,max:5},
      {id:'r_koz',type:'dot',label:'Közelharc',value:0,max:5},
      {id:'r_mes',type:'dot',label:'Mesterség',value:0,max:5},
      {id:'r_tul',type:'dot',label:'Túlélés',value:0,max:5},
      {id:'r_vez',type:'dot',label:'Vezetés',value:0,max:5},
    ]},
    { id:'box_ism', title:'Ismeretek', rows:[
      {id:'r_jog',type:'dot',label:'Jog',value:0,max:5},
      {id:'r_nye',type:'dot',label:'Nyelvismeret',value:0,max:5},
      {id:'r_nyo',type:'dot',label:'Nyomozás',value:0,max:5},
      {id:'r_pol',type:'dot',label:'Politika',value:0,max:5},
      {id:'r_ter',type:'dot',label:'Természettudomány',value:0,max:5},
    ]},
  ]},
  { id:'sec_adv', title:'Hátterek és Erények', boxes:[
    { id:'box_hat', title:'Hátterek / Előnyök', rows:[
      {id:'r_h1',type:'dot',label:'Háttér 1',value:0,max:5},
      {id:'r_h2',type:'dot',label:'Háttér 2',value:0,max:5},
      {id:'r_h3',type:'dot',label:'Háttér 3',value:0,max:5},
    ]},
    { id:'box_ereny', title:'Erények', rows:[
      {id:'r_lel',type:'dot',label:'Lelkiismeret',value:0,max:5},
      {id:'r_onur',type:'dot',label:'Önuralom',value:0,max:5},
      {id:'r_bat',type:'dot',label:'Bátorság',value:0,max:5},
    ]},
  ]},
  { id:'sec_notes', title:'Felszerelés és Megjegyzések', boxes:[
    { id:'box_fsz', title:'Fegyverek / Felszerelés', rows:[
      {id:'r_fsz',type:'textarea',label:'',value:''}
    ]},
    { id:'box_mj', title:'Egyéb Megjegyzések', rows:[
      {id:'r_mj',type:'textarea',label:'',value:''}
    ]},
  ]},
];

/* ==============================
   DEFAULT INFO FIELDS
   ============================== */
const DEFAULT_INFO_FIELDS = [
  {id:'inf_nev',    type:'text',   label:'Név',              value:''},
  {id:'inf_faj',    type:'select', label:'Faj / Származás',  value:'', options:[]},
  {id:'inf_kaszt',  type:'select', label:'Kaszt / Iskola',   value:'', options:[]},
  {id:'inf_isten',  type:'select', label:'Isten / Hit',      value:'', options:[]},
  {id:'inf_kronika',type:'text',   label:'Krónika',          value:''},
  {id:'inf_xp',     type:'number', label:'Tapasztalat',      value:''},
];

/* ==============================
   STATE
   ============================== */
let sheetData = {
  vampireTitle:'SABLON NEVE',
  infoFields: JSON.parse(JSON.stringify(DEFAULT_INFO_FIELDS)),
  sections: JSON.parse(JSON.stringify(DEFAULT_SECTIONS)),
  viewMode:0
};
let _currentTemplateId = null;
let _fieldKeysWithData = new Set();

let _uid = 3000;
const uid = () => 'u' + (++_uid) + '_' + (Math.random()*999|0);

/* ==============================
   TAB VÁLTÁS
   ============================== */
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
  document.getElementById('tab-' + tab).classList.add('active')
  document.getElementById('tab-content-sablonok').style.display = tab === 'sablonok' ? 'grid' : 'none'
  document.getElementById('tab-content-terkep').style.display = tab === 'terkep' ? 'flex' : 'none'
}

/* ==============================
   RENDER EDITOR
   ============================== */
function renderEditor() {
  const area = document.getElementById('editorArea')
  area.innerHTML = `
    <div class="editor-toolbar">
      <input class="editor-name-input" id="templateNameInput" 
        placeholder="Sablon neve..." 
        value="${sheetData.vampireTitle || 'SABLON NEVE'}"
        oninput="sheetData.vampireTitle=this.value; document.getElementById('vampireTitle').value=this.value">
      <div class="header-sep"></div>
      <button class="btn btn-gold" onclick="saveTemplate()">💾 Mentés</button>
      <button class="btn ${sheetData._published ? 'pub-toggle published' : 'pub-toggle'}" 
        id="pubToggleBtn" onclick="togglePublish()">
        ${sheetData._published ? '✓ Publikálva' : '○ Rejtett'}
      </button>
      <button class="btn btn-red btn-sm" onclick="deleteTemplate()">🗑️ Törlés</button>
      <button class="btn btn-sm" onclick="openAllOptionsBrowser()">📚 Összes opció</button>
    </div>
    <div class="sheet-outer" id="sheet-wrapper">
      <div class="vtitle-wrap">
        <div class="ornament-deco">✦ &nbsp; ✦ &nbsp; ✦</div>
        <div class="ornament" style="margin:.3rem 0;"></div>
        <input type="text" class="vtitle-input" id="vampireTitle" 
          placeholder="SABLON NEVE"
          value="${sheetData.vampireTitle || 'SABLON NEVE'}"
          oninput="sheetData.vampireTitle=this.value">
        <div class="ornament" style="margin:.3rem 0;"></div>
        <div class="ornament-deco">✦ &nbsp; ✦ &nbsp; ✦</div>
      </div>
      <div class="info-card" id="info-card-container">
      </div>
      <div class="sheet-card">
        <div id="sections-container"></div>
        <button id="add-section-btn" onclick="addSection()">✦ &nbsp; Új szekció hozzáadása &nbsp; ✦</button>
      </div>
    </div>
  `
  renderAll()
}

function renderAll() {
  const cont = document.getElementById('sections-container')
  if (!cont) return
  cont.innerHTML = ''
  sheetData.sections.forEach(sec => renderSection(sec, cont))
  renderInfoCard()
}

function renderInfoCard() {
  const card = document.getElementById('info-card-container')
  if (!card) return
  card.innerHTML = ''

  // Fejléc + + gomb
  const hdr = document.createElement('div'); hdr.className = 'info-card-header'
  const title = document.createElement('span'); title.className = 'info-card-title'; title.textContent = 'Alap adatok'
  hdr.appendChild(title)
  card.appendChild(hdr)

  const grid = document.createElement('div'); grid.className = 'info-grid'
  const fields = sheetData.infoFields || DEFAULT_INFO_FIELDS

  fields.forEach(field => {
    const div = document.createElement('div'); div.className = 'info-field-edit'

    // Label szerkeszthető input
    const labelInp = document.createElement('input')
    labelInp.type = 'text'; labelInp.className = 'info-field-label-input'
    labelInp.value = field.label; labelInp.title = 'Label átnevezése'
    labelInp.oninput = e => { field.label = e.target.value }
    div.appendChild(labelInp)

    // Érték mező típus szerint
    if (field.type === 'select') {
      const inp = document.createElement('input')
      inp.type = 'text'; inp.className = 'info-input'
      inp.value = field.value || ''; inp.placeholder = '...'
      inp.oninput = e => { field.value = e.target.value }
      div.appendChild(inp)
      const btn = document.createElement('button')
      btn.className = 'opt-edit-btn' + (_fieldKeysWithData.has(field.id) ? ' has-data' : '')
      btn.innerHTML = '⚙️'; btn.title = 'Opciók és leírások szerkesztése'
      btn.onclick = () => openOptionEditor(field.id, field.label)
      div.appendChild(btn)
    } else if (field.type === 'number') {
      const inp = document.createElement('input')
      inp.type = 'text'; inp.className = 'info-input'
      inp.value = field.value || ''; inp.placeholder = '0'
      inp.oninput = e => { field.value = e.target.value }
      div.appendChild(inp)
    } else if (field.type === 'dot') {
      const dw = document.createElement('div'); dw.className = 'dots-wrap'
      renderDots(dw, field, false)
      div.appendChild(dw)
    } else if (field.type === 'symbol') {
      const outer = document.createElement('div'); outer.className = 'sym-row-outer'
      const sw = document.createElement('div'); sw.className = 'symbol-wrap'
      renderSymbols(sw, field)
      const ctrls = document.createElement('div'); ctrls.className = 'sym-controls'
      // Picker
      const picker = makeSymPicker(field, val => { field.symbol = val; renderSymbols(sw, field) })
      // Szín
      const colorInp = document.createElement('input'); colorInp.type = 'color'
      colorInp.className = 'sym-color-input'; colorInp.title = 'Szín'
      colorInp.value = field.color || '#d4af37'
      colorInp.oninput = e => { field.color = e.target.value; renderSymbols(sw, field) }
      // Max
      const maxInp = document.createElement('input'); maxInp.className = 'sym-max-input'
      maxInp.type = 'number'; maxInp.value = Math.min(field.max||5, 20)
      maxInp.min = 1; maxInp.max = 20; maxInp.title = 'Maximum (max 20)'
      maxInp.oninput = e => { field.max = Math.min(parseInt(e.target.value)||5, 20); renderSymbols(sw, field) }
      ctrls.append(picker, colorInp, maxInp)
      outer.append(sw, ctrls)
      div.appendChild(outer)
    } else {
      const inp = document.createElement('input')
      inp.type = 'text'; inp.className = 'info-input'
      inp.value = field.value || ''; inp.placeholder = '...'
      inp.oninput = e => { field.value = e.target.value }
      div.appendChild(inp)
    }

    // Törlés gomb
    const del = document.createElement('button'); del.className = 'info-del-btn'; del.innerHTML = '✕'
    del.title = 'Mező törlése'
    del.onclick = () => {
      if (confirm(`"${field.label}" mező törlése?`)) {
        sheetData.infoFields = sheetData.infoFields.filter(f => f.id !== field.id)
        renderInfoCard()
      }
    }
    div.appendChild(del)
    grid.appendChild(div)
  })

  card.appendChild(grid)

  // Mező hozzáadó picker
  const picker = document.createElement('div'); picker.className = 'info-add-picker'
  const addTypes = [
    {t:'text',    l:'+ Szöveges'},
    {t:'number',  l:'+ Szám'},
    {t:'select',  l:'+ Legördülő'},
    {t:'dot',     l:'+ Pont-sor'},
    {t:'symbol',  l:'+ Szimbólum'},
  ]
  addTypes.forEach(({t, l}) => {
    const b = document.createElement('button'); b.className = 'info-add-btn'; b.textContent = l
    b.onclick = () => {
      const newField = {
        id: 'inf_' + uid(),
        type: t,
        label: t === 'select' ? 'Legördülő' : t === 'dot' ? 'Pont-sor' : t === 'symbol' ? 'Szimbólum' : t === 'number' ? 'Szám' : 'Szöveges',
        value: (t === 'dot' || t === 'symbol') ? 0 : '',
        ...(t === 'dot' || t === 'symbol' ? {max:5} : {}),
        ...(t === 'symbol' ? {symbol:'★', color:'#d4af37'} : {}),
        ...(t === 'select' ? {options:[]} : {}),
      }
      if (!sheetData.infoFields) sheetData.infoFields = JSON.parse(JSON.stringify(DEFAULT_INFO_FIELDS))
      sheetData.infoFields.push(newField)
      renderInfoCard()
    }
    picker.appendChild(b)
  })
  card.appendChild(picker)
}

function renderSection(sec, cont) {
  const wrap = document.createElement('div'); wrap.className='section-wrap'
  const ornSm = document.createElement('div'); ornSm.className='ornament-sm'
  const hdr = document.createElement('div'); hdr.className='section-header'
  const ti = document.createElement('input')
  ti.type='text'; ti.className='section-title-input'; ti.value=sec.title
  ti.oninput = e => { sec.title=e.target.value }
  const ctrls = document.createElement('div'); ctrls.className='section-edit-ctrls'
  const addBoxBtn = document.createElement('button')
  addBoxBtn.className='btn btn-sm'; addBoxBtn.innerHTML='+ Blokk'
  addBoxBtn.onclick = () => { sec.boxes.push({id:uid(),title:'Új blokk',rows:[]}); renderAll() }
  const delSecBtn = document.createElement('button')
  delSecBtn.className='btn btn-sm btn-red'; delSecBtn.innerHTML='✕ Szekció'
  delSecBtn.onclick = () => {
    if(confirm(`"${sec.title}" törlése?`)) {
      sheetData.sections = sheetData.sections.filter(s=>s.id!==sec.id); renderAll()
    }
  }
  ctrls.append(addBoxBtn, delSecBtn)
  hdr.append(ti, ctrls)
  const grid = document.createElement('div'); grid.className='boxes-grid'
  sec.boxes.forEach(box => renderBox(box, grid, sec))
  const addBoxPh = document.createElement('div'); addBoxPh.className='add-box-placeholder'
  addBoxPh.innerHTML='<span style="font-size:1.1rem">+</span> Új blokk'
  addBoxPh.onclick = () => { sec.boxes.push({id:uid(),title:'Új blokk',rows:[]}); renderAll() }
  grid.appendChild(addBoxPh)
  wrap.append(ornSm, hdr, grid)
  cont.appendChild(wrap)
}

function renderBox(box, grid, sec) {
  const div = document.createElement('div'); div.className='box-wrap'
  const bHdr = document.createElement('div'); bHdr.className='box-header'
  const bTi = document.createElement('input')
  bTi.type='text'; bTi.className='box-title-input'; bTi.value=box.title
  bTi.oninput = e => { box.title=e.target.value }
  const delBoxBtn = document.createElement('button')
  delBoxBtn.className='btn-del-box'; delBoxBtn.innerHTML='✕'; delBoxBtn.title='Blokk törlése'
  delBoxBtn.onclick = () => {
    if(confirm(`"${box.title}" blokk törlése?`)) {
      sec.boxes=sec.boxes.filter(b=>b.id!==box.id); renderAll()
    }
  }
  bHdr.append(bTi, delBoxBtn); div.appendChild(bHdr)
  box.rows.forEach(row => div.appendChild(buildRow(row, box)))
  const addArea = document.createElement('div'); addArea.className='add-row-area'
  const picker = document.createElement('div'); picker.className='add-row-picker';
  [{t:'dot',l:'● Pont-sor'},{t:'symbol',l:'★ Szimbólum'},{t:'text',l:'_ Szöveges'},{t:'select',l:'▾ Legördülő'},{t:'textarea',l:'≡ Szövegmező'},{t:'header',l:'◉ Fejléc'}]
    .forEach(({t,l}) => {
      const b = document.createElement('button'); b.className='add-row-btn'; b.innerText=l
      b.onclick = () => {
        box.rows.push({id:uid(),type:t,label:t==='dot'?'Új képesség':t==='symbol'?'Szimbólum sor':t==='header'?'Fejléc':t==='select'?'Új legördülő':'',
          value:(t==='dot'||t==='header'||t==='symbol')?0:'',max:t==='header'?10:5,
          ...(t==='symbol'?{symbol:'★',color:'#d4af37'}:{})})
        renderAll()
      }
      picker.appendChild(b)
    })
  addArea.appendChild(picker); div.appendChild(addArea); grid.appendChild(div)
}

function buildRow(row, box) {
  const wrap = document.createElement('div')
  if (row.type==='dot') {
    wrap.className='row-wrap'
    const li=makeRowLabelInput(row); const dw=document.createElement('div'); dw.className='dots-wrap'
    renderDots(dw, row, false)
    wrap.append(li, dw, makeDescEditBtn(row), makeDelRowBtn(row,box))
  } else if (row.type==='text') {
    wrap.className='row-wrap'
    const li=makeRowLabelInput(row); li.style.maxWidth='100px'
    const ti=document.createElement('input'); ti.type='text'; ti.className='row-text-input'
    ti.value=row.value; ti.placeholder='...'
    ti.oninput=e=>{row.value=e.target.value}
    wrap.append(li, ti, makeDelRowBtn(row,box))
  } else if (row.type==='select') {
    wrap.className='row-wrap'
    const li=makeRowLabelInput(row); li.style.maxWidth='100px'
    const sel=document.createElement('select'); sel.className='row-text-input'
    const opts = row.options || []
    if (opts.length === 0) {
      const o = document.createElement('option'); o.textContent='(nincs opció — ⚙️)'; o.value=''
      sel.appendChild(o)
    } else {
      opts.forEach(opt => {
        const o = document.createElement('option'); o.value=opt; o.textContent=opt
        if (row.value === opt) o.selected = true
        sel.appendChild(o)
      })
    }
    sel.onchange = e => { row.value = e.target.value }
    wrap.append(li, sel, makeOptEditBtn(row), makeDelRowBtn(row,box))
  } else if (row.type==='textarea') {
    wrap.style.cssText='flex-direction:column;align-items:stretch;display:flex;gap:.3rem;'
    const ta=document.createElement('textarea'); ta.className='row-textarea'
    ta.value=row.value; ta.placeholder='Ide írj...'
    ta.oninput=e=>{row.value=e.target.value}
    const del=makeDelRowBtn(row,box); del.style.alignSelf='flex-end'
    wrap.append(ta, del)
  } else if (row.type==='header') {
    const hw=document.createElement('div'); hw.className='header-row-wrap'
    const hi=document.createElement('input'); hi.type='text'; hi.className='header-row-input'
    hi.value=row.label; hi.placeholder='Fejléc neve...'
    hi.oninput=e=>{row.label=e.target.value}
    const hdw=document.createElement('div'); hdw.className='header-dots-wrap'
    renderDots(hdw, row, true)
    const del=makeDelRowBtn(row,box)
    hw.append(hi, hdw, del); wrap.appendChild(hw)
  } else if (row.type==='symbol') {
    wrap.className='row-wrap symbol-row'
    const li=makeRowLabelInput(row); li.style.flexShrink='0'
    const outer=document.createElement('div'); outer.className='sym-row-outer'
    const sw=document.createElement('div'); sw.className='symbol-wrap'
    renderSymbols(sw, row)
    // Kontrollok: picker + szín + max
    const ctrls=document.createElement('div'); ctrls.className='sym-controls'
    // Szimbólum picker
    const picker=makeSymPicker(row, val=>{ row.symbol=val; renderSymbols(sw,row) })
    // Szín
    const colorInp=document.createElement('input'); colorInp.type='color'
    colorInp.className='sym-color-input'; colorInp.title='Szín'
    colorInp.value=row.color||'#d4af37'
    colorInp.oninput=e=>{row.color=e.target.value; renderSymbols(sw,row)}
    // Max
    const maxInp=document.createElement('input'); maxInp.className='sym-max-input'
    maxInp.type='number'; maxInp.value=Math.min(row.max||5,20)
    maxInp.min=1; maxInp.max=20; maxInp.title='Maximum (max 20)'
    maxInp.oninput=e=>{row.max=Math.min(parseInt(e.target.value)||5,20); renderSymbols(sw,row)}
    ctrls.append(picker, colorInp, maxInp, makeDescEditBtn(row), makeDelRowBtn(row,box))
    outer.append(sw, ctrls)
    wrap.append(li, outer)
  }
  return wrap
}

function makeOptEditBtn(row) {
  const b = document.createElement('button')
  b.className='opt-edit-btn'; b.innerHTML='⚙️'; b.title='Opciók és leírások szerkesztése'
  if (_fieldKeysWithData.has(row.id)) b.classList.add('has-data')
  b.onclick = () => openOptionEditor(row.id, row.label || 'Mező')
  return b
}

function makeDescEditBtn(row) {
  const b = document.createElement('button')
  b.className='opt-edit-btn'; b.innerHTML='ⓘ'; b.title='Leírás szerkesztése'
  if (_fieldKeysWithData.has(row.id)) b.classList.add('has-data')
  b.onclick = () => openSingleDescEditor(row.id, row.label || 'Mező')
  return b
}

function makeRowLabelInput(row) {
  const li=document.createElement('input'); li.type='text'; li.className='row-label-input'
  li.value=row.label; li.oninput=e=>{row.label=e.target.value}; return li
}
function makeDelRowBtn(row, box) {
  const b=document.createElement('button'); b.className='btn-del-row'; b.innerHTML='✕'
  b.onclick=()=>{box.rows=box.rows.filter(r=>r.id!==row.id); renderAll()}; return b
}
function renderDots(container, row, isHeader) {
  container.innerHTML=''
  const max=row.max||5
  for(let i=1;i<=max;i++) {
    const d=document.createElement('span')
    const cls=isHeader?'header-dot':'dot'
    d.className=cls+(i<=row.value?' filled':'')
    d.innerText=i<=row.value?'●':'○'
    d.onclick=()=>{ row.value=(row.value===i)?i-1:i; renderDots(container,row,isHeader) }
    container.appendChild(d)
  }
}

const SYM_PAIRS = [
  {filled:'★', empty:'☆', label:'Csillag'},
  {filled:'♥', empty:'♡', label:'Szív'},
  {filled:'♦', empty:'♢', label:'Rombusz'},
  {filled:'♣', empty:'♧', label:'Lóhere'},
  {filled:'●', empty:'○', label:'Kör'},
  {filled:'■', empty:'□', label:'Négyzet'},
  {filled:'▲', empty:'△', label:'Háromszög'},
  {filled:'⬟', empty:'⬠', label:'Hatszög'},
  {filled:'✦', empty:'✧', label:'Díszcsillag'},
]
const SYM_EMPTY_MAP = Object.fromEntries(SYM_PAIRS.map(p => [p.filled, p.empty]))

function getEmptySym(sym) {
  return SYM_EMPTY_MAP[sym] || sym
}

function makeSymPicker(row, onchange) {
  const wrap = document.createElement('div'); wrap.className = 'sym-picker'
  const current = () => SYM_PAIRS.find(p => p.filled === (row.symbol||'★')) || SYM_PAIRS[0]

  const btn = document.createElement('button'); btn.type='button'; btn.className = 'sym-picker-btn'
  const updateBtn = () => {
    const p = current()
    btn.innerHTML = `<span>${p.filled}${p.empty}</span><span>${p.label}</span><span class="arrow">▼</span>`
  }
  updateBtn()

  const drop = document.createElement('div'); drop.className = 'sym-dropdown'
  document.body.appendChild(drop)

  SYM_PAIRS.forEach(p => {
    const opt = document.createElement('div')
    opt.className = 'sym-opt' + (p.filled === (row.symbol||'★') ? ' selected' : '')
    opt.innerHTML = `<span class="sym-opt-icon">${p.filled}${p.empty}</span><span>${p.label}</span>`
    opt.onclick = e => {
      e.stopPropagation()
      row.symbol = p.filled
      drop.querySelectorAll('.sym-opt').forEach(o => o.classList.remove('selected'))
      opt.classList.add('selected')
      updateBtn()
      drop.classList.remove('open')
      onchange(p.filled)
    }
    drop.appendChild(opt)
  })

  const openDrop = () => {
    document.querySelectorAll('.sym-dropdown.open').forEach(d => d.classList.remove('open'))
    const r = btn.getBoundingClientRect()
    drop.style.top = (r.bottom + 4) + 'px'
    drop.style.left = r.left + 'px'
    drop.classList.add('open')
  }

  btn.onclick = e => {
    e.stopPropagation()
    drop.classList.contains('open') ? drop.classList.remove('open') : openDrop()
  }

  document.addEventListener('click', () => drop.classList.remove('open'), {capture:false})

  wrap._drop = drop
  wrap._updateBtn = updateBtn
  wrap.appendChild(btn)
  return wrap
}

function renderSymbols(container, row) {
  container.innerHTML=''
  const max = Math.min(row.max||5, 20)
  const sym = row.symbol||'★'
  const empty = getEmptySym(sym)
  const color = row.color || 'var(--gold)'
  for(let i=1;i<=max;i++) {
    const d=document.createElement('span'); d.className='sym'
    const filled = i<=row.value
    d.innerText = filled ? sym : empty
    d.style.color = color
    d.style.opacity = filled ? '1' : '0.28'
    d.onclick=()=>{ row.value=(row.value===i)?i-1:i; renderSymbols(container,row) }
    container.appendChild(d)
  }
}

function addSection() {
  sheetData.sections.push({id:uid(),title:'Új szekció',boxes:[{id:uid(),title:'Új blokk',rows:[]}]})
  renderAll()
  const btn = document.getElementById('add-section-btn')
  if (btn) btn.scrollIntoView({behavior:'smooth', block:'center'})
}

/* ==============================
   SABLON MŰVELETEK
   ============================== */
function newTemplate() {
  _currentTemplateId = null
  sheetData = {
    vampireTitle:'SABLON NEVE',
    infoFields: JSON.parse(JSON.stringify(DEFAULT_INFO_FIELDS)),
    sections: JSON.parse(JSON.stringify(DEFAULT_SECTIONS)),
    viewMode:0, _published:false
  }
  renderEditor()
  document.querySelectorAll('.template-item').forEach(el => el.classList.remove('active'))
}

async function saveTemplate() {
  if (!window._sb) return
  const { data: { user } } = await window._sb.auth.getUser()
  if (!user) return
  const name = document.getElementById('templateNameInput')?.value?.trim() || sheetData.vampireTitle?.trim() || ''
  if (!name) {
    showToast('⚠️ Adj nevet a sablonnak mentés előtt!')
    document.getElementById('templateNameInput')?.focus()
    return
  }
  sheetData.vampireTitle = name
  if (_currentTemplateId) {
    const { error } = await window._sb.from('character_sheets').update({
      name, faj:(sheetData.infoFields?.find(f=>f.id==='inf_faj')?.value || ''), kaszt:(sheetData.infoFields?.find(f=>f.id==='inf_kaszt')?.value || ''),
      data: sheetData,
      template_visible: sheetData._published || false,
      updated_at: new Date().toISOString()
    }).eq('id', _currentTemplateId)
    if (!error) showToast('✓ Mentve')
    else console.error(error)
  } else {
    const { data, error } = await window._sb.from('character_sheets').insert({
      user_id: user.id, name,
      faj:(sheetData.infoFields?.find(f=>f.id==='inf_faj')?.value || ''), kaszt:(sheetData.infoFields?.find(f=>f.id==='inf_kaszt')?.value || ''),
      data: sheetData,
      is_template: true,
      template_visible: sheetData._published || false
    }).select().single()
    if (!error && data) {
      _currentTemplateId = data.id
      showToast('✓ Sablon létrehozva')
    }
  }
  await loadTemplateList()
}

async function togglePublish() {
  sheetData._published = !sheetData._published
  const btn = document.getElementById('pubToggleBtn')
  if (btn) {
    btn.className = `btn ${sheetData._published ? 'pub-toggle published' : 'pub-toggle'}`
    btn.innerHTML = sheetData._published ? '✓ Publikálva' : '○ Rejtett'
  }
  if (_currentTemplateId) {
    await window._sb.from('character_sheets').update({
      template_visible: sheetData._published
    }).eq('id', _currentTemplateId)
    showToast(sheetData._published ? '✓ Publikálva — userek látják' : '○ Elrejtve')
    await loadTemplateList()
  }
}

async function deleteTemplate() {
  if (!_currentTemplateId) return
  if (!confirm('Biztosan törlöd ezt a sablont? Ez visszavonhatatlan.')) return
  await window._sb.from('character_sheets').delete().eq('id', _currentTemplateId)
  _currentTemplateId = null
  sheetData = {
    vampireTitle:'SABLON NEVE',
    infoFields: JSON.parse(JSON.stringify(DEFAULT_INFO_FIELDS)),
    sections: JSON.parse(JSON.stringify(DEFAULT_SECTIONS)),
    viewMode:0, _published:false
  }
  document.getElementById('editorArea').innerHTML = `
    <div class="empty-state" style="margin-top:4rem;">
      <div class="empty-state-icon">🔨</div>
      <div class="empty-state-title">Műhely</div>
      <div class="empty-state-sub">Válassz egy sablont a listából, vagy hozz létre újat.</div>
    </div>`
  await loadTemplateList()
  showToast('🗑️ Törölve')
}

async function loadTemplate(id) {
  const { data } = await window._sb.from('character_sheets').select('*').eq('id', id).single()
  if (!data) return
  _currentTemplateId = data.id
  sheetData = data.data || {}
  sheetData._published = data.template_visible || false
  // Migráció: régi info objektum → infoFields
  if (!sheetData.infoFields || sheetData.infoFields.length === 0) {
    const legacyMap = {name:'inf_nev',faj:'inf_faj',kaszt:'inf_kaszt',isten:'inf_isten',kronika:'inf_kronika',xp:'inf_xp'}
    sheetData.infoFields = JSON.parse(JSON.stringify(DEFAULT_INFO_FIELDS))
    if (sheetData.info) {
      Object.entries(legacyMap).forEach(([oldKey, newId]) => {
        const f = sheetData.infoFields.find(f => f.id === newId)
        if (f && sheetData.info[oldKey]) f.value = sheetData.info[oldKey]
      })
    }
  }
  document.querySelectorAll('.template-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id)
  })
  renderEditor()
}

async function loadTemplateList() {
  if (!window._sb) return
  const { data: { user } } = await window._sb.auth.getUser()
  const { data } = await window._sb.from('character_sheets')
    .select('id, name, faj, kaszt, template_visible, updated_at')
    .eq('is_template', true)
    .order('updated_at', { ascending: false })
  const el = document.getElementById('templateListPanel')
  if (!data || data.length === 0) {
    el.innerHTML = `<div class="empty-state" style="padding:2rem;">
      <div class="empty-state-icon">📋</div>
      <div class="empty-state-sub">Még nincs sablon. Kattints a + Új gombra.</div>
    </div>`
    return
  }
  el.innerHTML = data.map(t => `
    <div class="template-item ${_currentTemplateId===t.id?'active':''}" data-id="${t.id}" onclick="loadTemplate('${t.id}')">
      <div style="flex:1;min-width:0;">
        <div class="template-name">${t.name||'Névtelen'}</div>
        <span class="template-sub">${[t.faj,t.kaszt].filter(Boolean).join(' · ')||'—'}</span>
      </div>
      <span class="template-badge ${t.template_visible?'badge-pub':'badge-hidden'}">
        ${t.template_visible?'Pub':'Rejtett'}
      </span>
    </div>
  `).join('')
}

/* ==============================
   OPCIÓ SZERKESZTŐ (field_descriptions)
   ============================== */
let _optEditorFieldKey = null

async function loadFieldKeysWithData() {
  if (!window._sb) return
  const { data } = await window._sb.from('field_descriptions').select('field_key')
  _fieldKeysWithData = new Set((data || []).map(d => d.field_key))
}

async function refreshFieldKeyIndicator(fieldKey) {
  if (!window._sb) return
  const { data } = await window._sb.from('field_descriptions')
    .select('id', { count: 'exact', head: false }).eq('field_key', fieldKey)
  if (data && data.length > 0) _fieldKeysWithData.add(fieldKey)
  else _fieldKeysWithData.delete(fieldKey)
}

async function openOptionEditor(fieldKey, fieldLabel) {
  _optEditorFieldKey = fieldKey
  let overlay = document.getElementById('optModalOverlay')
  if (!overlay) {
    overlay = document.createElement('div')
    overlay.id = 'optModalOverlay'
    overlay.className = 'modal-overlay'
    overlay.onclick = e => { if (e.target === overlay) closeOptionEditor() }
    document.body.appendChild(overlay)
  }
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">⚙️ ${fieldLabel} — opciók és leírások</span>
        <button class="modal-close" onclick="closeOptionEditor()">✕</button>
      </div>
      <div class="modal-body" id="optModalBody">
        <div style="color:var(--muted);font-size:.82rem;">Betöltés...</div>
      </div>
      <div class="modal-footer">
        <div class="opt-add-row" style="flex:1;margin-bottom:0;">
          <input type="text" class="opt-add-input" id="optNewValue" placeholder="Új opció neve (pl. Ork)..."
            onkeydown="if(event.key==='Enter') addOptionValue()">
          <button class="btn btn-purple" onclick="addOptionValue()">+ Hozzáad</button>
        </div>
      </div>
    </div>
  `
  overlay.style.display = 'flex'
  await loadOptionList(fieldKey)
}

function closeOptionEditor() {
  const overlay = document.getElementById('optModalOverlay')
  if (overlay) overlay.style.display = 'none'
  const fieldKey = _optEditorFieldKey
  _optEditorFieldKey = null
  // Ha select sorhoz tartozott, frissítjük a row.options listát a friss adatokkal
  if (fieldKey && window._sb) {
    Promise.all([
      window._sb.from('field_descriptions').select('option_value').eq('field_key', fieldKey)
        .order('option_value', { ascending: true }),
      refreshFieldKeyIndicator(fieldKey)
    ]).then(([{ data }]) => {
      if (data) {
        const row = findRowById(fieldKey)
        if (row) row.options = data.map(d => d.option_value)
      }
      renderAll()
    })
  } else {
    renderAll()
  }
}

function findRowById(rowId) {
  const infoField = (sheetData.infoFields || []).find(f => f.id === rowId)
  if (infoField) return infoField
  for (const sec of sheetData.sections) {
    for (const box of sec.boxes) {
      const row = box.rows.find(r => r.id === rowId)
      if (row) return row
    }
  }
  return null
}

async function loadOptionList(fieldKey) {
  const body = document.getElementById('optModalBody')
  if (!window._sb) { body.innerHTML = '<div style="color:var(--muted);">Nincs adatbázis kapcsolat.</div>'; return }
  const { data, error } = await window._sb.from('field_descriptions')
    .select('*').eq('field_key', fieldKey).order('option_value', { ascending: true })
  if (error) { body.innerHTML = `<div style="color:var(--red);">Hiba: ${error.message}</div>`; return }
  if (!data || data.length === 0) {
    body.innerHTML = '<div style="color:var(--muted);font-size:.82rem;">Még nincs opció ehhez a mezőhöz. Adj hozzá egyet lent.</div>'
    return
  }
  body.innerHTML = data.map(opt => `
    <div class="opt-list-item" data-id="${opt.id}">
      <div class="opt-list-header">
        <span class="opt-list-name">${opt.option_value}</span>
        <span class="opt-list-badge ${opt.description ? 'has-desc' : ''}">${opt.description ? 'Van leírás' : 'Nincs leírás'}</span>
        <button class="opt-del-btn" onclick="deleteOptionValue('${opt.id}','${fieldKey}')" title="Opció törlése">✕</button>
      </div>
      <textarea class="opt-desc-input" placeholder="Leírás (pl. ráviszik majd a kurzort a karakterlapon)..."
        onblur="saveOptionDescription('${opt.id}', this.value)">${opt.description || ''}</textarea>
    </div>
  `).join('')
}

async function addOptionValue() {
  const input = document.getElementById('optNewValue')
  const val = input.value.trim()
  if (!val || !_optEditorFieldKey) return
  const { error } = await window._sb.from('field_descriptions').insert({
    field_key: _optEditorFieldKey,
    option_value: val,
    description: ''
  })
  if (error) {
    if (error.code === '23505') showToast('⚠️ Ez az opció már létezik')
    else { console.error(error); showToast('⚠️ Hiba mentéskor') }
    return
  }
  input.value = ''
  await loadOptionList(_optEditorFieldKey)
  showToast('✓ Opció hozzáadva')
}

async function saveOptionDescription(id, description) {
  const { error } = await window._sb.from('field_descriptions')
    .update({ description, updated_at: new Date().toISOString() })
    .eq('id', id)
  if (!error) {
    showToast('✓ Leírás mentve')
    const item = document.querySelector(`.opt-list-item[data-id="${id}"] .opt-list-badge`)
    if (item) {
      if (description) { item.textContent='Van leírás'; item.classList.add('has-desc') }
      else { item.textContent='Nincs leírás'; item.classList.remove('has-desc') }
    }
  } else {
    console.error(error); showToast('⚠️ Hiba mentéskor')
  }
}

async function deleteOptionValue(id, fieldKey) {
  if (!confirm('Biztosan törlöd ezt az opciót? Ha karakterlapokon használják, ott megmarad a szöveg, de a legördülőből eltűnik.')) return
  const { error } = await window._sb.from('field_descriptions').delete().eq('id', id)
  if (!error) {
    await loadOptionList(fieldKey)
    showToast('🗑️ Opció törölve')
  }
}

/* ==============================
   EGYSZERŰ LEÍRÁS SZERKESZTŐ (dot-soroknak, pl. "Erő")

const SINGLE_DESC_KEY = '_self'

async function openSingleDescEditor(rowId, rowLabel) {
  _optEditorFieldKey = rowId
  let overlay = document.getElementById('optModalOverlay')
  if (!overlay) {
    overlay = document.createElement('div')
    overlay.id = 'optModalOverlay'
    overlay.className = 'modal-overlay'
    overlay.onclick = e => { if (e.target === overlay) closeSingleDescEditor() }
    document.body.appendChild(overlay)
  }
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">ⓘ ${rowLabel} — leírás</span>
        <button class="modal-close" onclick="closeSingleDescEditor()">✕</button>
      </div>
      <div class="modal-body" id="optModalBody">
        <div style="color:var(--muted);font-size:.82rem;">Betöltés...</div>
      </div>
    </div>
  `
  overlay.style.display = 'flex'
  await loadSingleDescription(rowId, rowLabel)

async function loadSingleDescription(rowId, rowLabel) {
  const body = document.getElementById('optModalBody')
  if (!window._sb) { body.innerHTML = '<div style="color:var(--muted);">Nincs adatbázis kapcsolat.</div>'; return }
  const { data, error } = await window._sb.from('field_descriptions')
    .select('*').eq('field_key', rowId).eq('option_value', SINGLE_DESC_KEY).maybeSingle()
  if (error) { body.innerHTML = `<div style="color:var(--red);">Hiba: ${error.message}</div>`; return }
  const desc = data?.description || ''
  body.innerHTML = `
    <div style="color:var(--muted);font-size:.78rem;margin-bottom:.5rem;">
      Ez a leírás jelenik majd meg buborékban, ha a felhasználó a "${rowLabel}" mező fölé viszi az egeret a karakterlapon.
    </div>
    <textarea class="opt-desc-input" style="min-height:100px;" placeholder="Leírás szövege..."
      onblur="saveSingleDescription('${rowId}', this.value)">${desc}</textarea>
  `
}

async function saveSingleDescription(rowId, description) {
  description = (description || '').trim()
  if (!description) {
    // Üres leírás esetén töröljük a sort, ne maradjon "_self" rekord leírás nélkül
    const { error } = await window._sb.from('field_descriptions')
      .delete().eq('field_key', rowId).eq('option_value', SINGLE_DESC_KEY)
    if (!error) { _fieldKeysWithData.delete(rowId); showToast('🗑️ Leírás törölve'); renderAll() }
    else { console.error(error); showToast('⚠️ Hiba törléskor') }
    return
  }
  const { error } = await window._sb.from('field_descriptions').upsert({
    field_key: rowId,
    option_value: SINGLE_DESC_KEY,
    description,
    updated_at: new Date().toISOString()
  }, { onConflict: 'field_key,option_value' })
  if (!error) { _fieldKeysWithData.add(rowId); showToast('✓ Leírás mentve'); renderAll() }
  else { console.error(error); showToast('⚠️ Hiba mentéskor') }
}

function closeSingleDescEditor() {
  const overlay = document.getElementById('optModalOverlay')
  if (overlay) overlay.style.display = 'none'
  const fieldKey = _optEditorFieldKey
  _optEditorFieldKey = null
  if (fieldKey && window._sb) {
    refreshFieldKeyIndicator(fieldKey).then(() => renderAll())
  } else {
    renderAll()
  }
}

/* ==============================
   ÖSSZES OPCIÓ BÖNGÉSZŐ
   ============================== */
async function openAllOptionsBrowser() {
  let overlay = document.getElementById('optModalOverlay')
  if (!overlay) {
    overlay = document.createElement('div')
    overlay.id = 'optModalOverlay'
    overlay.className = 'modal-overlay'
    overlay.onclick = e => { if (e.target === overlay) overlay.style.display = 'none' }
    document.body.appendChild(overlay)
  }
  overlay.innerHTML = `
    <div class="modal-box" style="max-width:680px;">
      <div class="modal-header">
        <span class="modal-title">📚 Összes opció és leírás</span>
        <button class="modal-close" onclick="document.getElementById('optModalOverlay').style.display='none'">✕</button>
      </div>
      <div class="modal-body" id="allOptBody">
        <div style="color:var(--muted);font-size:.82rem;">Betöltés...</div>
      </div>
    </div>
  `
  overlay.style.display = 'flex'
  await loadAllOptionsBrowser()
}

async function loadAllOptionsBrowser() {
  const body = document.getElementById('allOptBody')
  if (!window._sb) { body.innerHTML = '<div style="color:var(--muted);">Nincs adatbázis kapcsolat.</div>'; return }
  const { data, error } = await window._sb.from('field_descriptions')
    .select('*').order('field_key', { ascending: true }).order('option_value', { ascending: true })
  if (error) { body.innerHTML = `<div style="color:var(--red);">Hiba: ${error.message}</div>`; return }
  if (!data || data.length === 0) {
    body.innerHTML = '<div style="color:var(--muted);font-size:.82rem;">Még nincs egyetlen opció vagy leírás sem.</div>'
    return
  }
  // Csoportosítás field_key szerint
  const groups = {}
  data.forEach(d => {
    if (!groups[d.field_key]) groups[d.field_key] = []
    groups[d.field_key].push(d)
  })
  // Mezőnevek feloldása (info_faj -> "Faj", egyébként a sor label-je)
  const fieldNames = { info_faj:'Faj', info_kaszt:'Kaszt', info_isten:'Isten' }
  body.innerHTML = Object.entries(groups).map(([fieldKey, items]) => {
    const row = findRowById(fieldKey)
    const label = fieldNames[fieldKey] || row?.label || fieldKey
    const isSingleDesc = items.length === 1 && items[0].option_value === SINGLE_DESC_KEY
    return `
      <div style="margin-bottom:1.1rem;" data-group="${fieldKey}">
        <div style="font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:.08em;color:var(--gold);text-transform:uppercase;margin-bottom:.4rem;border-bottom:1px solid var(--border-soft);padding-bottom:.25rem;">
          ${label}
        </div>
        ${isSingleDesc
          ? `<div class="opt-list-item" data-id="${items[0].id}">
               <div class="opt-list-header">
                 <span class="opt-list-name">Leírás</span>
                 <span class="opt-list-badge ${items[0].description?'has-desc':''}">${items[0].description?'Van leírás':'Nincs leírás'}</span>
               </div>
               <textarea class="opt-desc-input" placeholder="Leírás szövege..."
                 onblur="browserSaveSingleDesc('${fieldKey}', this.value)">${items[0].description || ''}</textarea>
             </div>`
          : items.map(opt => `
              <div class="opt-list-item" data-id="${opt.id}">
                <div class="opt-list-header">
                  <input type="text" class="opt-add-input" style="font-weight:600;font-size:.85rem;padding:.3rem .5rem;" 
                    value="${opt.option_value}" 
                    onblur="browserRenameOption('${opt.id}','${fieldKey}',this.value)">
                  <span class="opt-list-badge ${opt.description?'has-desc':''}">${opt.description?'Van leírás':'Nincs leírás'}</span>
                  <button class="opt-del-btn" onclick="browserDeleteOption('${opt.id}','${fieldKey}')" title="Opció törlése">✕</button>
                </div>
                <textarea class="opt-desc-input" placeholder="Leírás (opcionális)..."
                  onblur="browserSaveOptionDesc('${opt.id}','${fieldKey}',this.value)">${opt.description || ''}</textarea>
              </div>
            `).join('')
        }
      </div>
    `
  }).join('')
}

async function browserSaveSingleDesc(fieldKey, description) {
  await saveSingleDescription(fieldKey, description)
  await loadAllOptionsBrowser()
}

async function browserSaveOptionDesc(id, fieldKey, description) {
  const { error } = await window._sb.from('field_descriptions')
    .update({ description, updated_at: new Date().toISOString() })
    .eq('id', id)
  if (!error) {
    showToast('✓ Mentve')
    await refreshFieldKeyIndicator(fieldKey)
    renderAll()
    await loadAllOptionsBrowser()
  } else { console.error(error); showToast('⚠️ Hiba mentéskor') }
}

async function browserRenameOption(id, fieldKey, newValue) {
  newValue = (newValue || '').trim()
  if (!newValue) { showToast('⚠️ Az opció neve nem lehet üres'); await loadAllOptionsBrowser(); return }
  const { error } = await window._sb.from('field_descriptions')
    .update({ option_value: newValue, updated_at: new Date().toISOString() })
    .eq('id', id)
  if (!error) {
    showToast('✓ Átnevezve')
    const row = findRowById(fieldKey)
    if (row && row.options) {
      const { data } = await window._sb.from('field_descriptions').select('option_value').eq('field_key', fieldKey).order('option_value', { ascending: true })
      if (data) row.options = data.map(d => d.option_value)
    }
    renderAll()
    await loadAllOptionsBrowser()
  } else {
    if (error.code === '23505') showToast('⚠️ Ez a név már létezik ennél a mezőnél')
    else { console.error(error); showToast('⚠️ Hiba mentéskor') }
    await loadAllOptionsBrowser()
  }
}

async function browserDeleteOption(id, fieldKey) {
  if (!confirm('Biztosan törlöd ezt az opciót?')) return
  const { error } = await window._sb.from('field_descriptions').delete().eq('id', id)
  if (!error) {
    showToast('🗑️ Törölve')
    await refreshFieldKeyIndicator(fieldKey)
    const row = findRowById(fieldKey)
    if (row && row.options) {
      const { data } = await window._sb.from('field_descriptions').select('option_value').eq('field_key', fieldKey).order('option_value', { ascending: true })
      row.options = (data || []).map(d => d.option_value)
    }
    renderAll()
    await loadAllOptionsBrowser()
  } else { console.error(error); showToast('⚠️ Hiba törléskor') }
}

/* ==============================
   TOAST
   ============================== */
function showToast(msg) {
  let el = document.getElementById('toast')
  if (!el) {
    el = document.createElement('div')
    el.id = 'toast'
    el.style.cssText = 'position:fixed;bottom:1.5rem;right:1.5rem;background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.3);color:#a855f7;font-size:.78rem;padding:.5rem 1rem;border-radius:.6rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;'
    document.body.appendChild(el)
  }
  el.textContent = msg
  el.style.opacity = '1'
  setTimeout(() => el.style.opacity = '0', 2000)
}

/* ==============================
   AUTH / LOGOUT
   ============================== */
function trySetUsername() {
  const el = document.getElementById('auth-username')
  if (!el) { setTimeout(trySetUsername, 50); return }
  if (window._userProfile) {
    el.textContent = window._userProfile.display_name
  } else {
    setTimeout(trySetUsername, 50)
  }
}
setTimeout(trySetUsername, 100)

async function doLogout() {
  try {
    await window._sb.auth.signOut()
    Object.keys(localStorage).filter(k=>k.startsWith('sb-')).forEach(k=>localStorage.removeItem(k))
  } catch(e) {}
  window.location.href = 'login.html'
}

   INIT
   ============================== */
window.addEventListener('load', () => {
  setTimeout(async () => {
    await loadFieldKeysWithData()
    await loadTemplateList()
    // Ha még nincs kiválasztott sablon, induljon egy üres szerkesztővel
    if (!_currentTemplateId) newTemplate()

/* ==============================
   KAMPÁNY TÉRKÉP (campaign_maps)
   ============================== */

let _currentCampaignMapId = null;

async function loadCampaignMapList() {
  if (!window._sb) return;
  const { data } = await window._sb.from('campaign_maps')
    .select('id, name, published, updated_at')
    .order('updated_at', { ascending: false });
  const listEl = document.getElementById('campaignMapList');
  if (!listEl) return;
  if (!data || data.length === 0) {
    listEl.innerHTML = '<span style="color:#64748b;font-size:.75rem;">Nincs mentett kampány térkép</span>';
    return;
  }
  listEl.innerHTML = data.map(m => `
    <button onclick="loadCampaignMap('${m.id}')"
      style="background:${_currentCampaignMapId===m.id?'rgba(168,85,247,.2)':'rgba(255,255,255,.04)'};
        border:1px solid ${m.published?'rgba(16,185,129,.3)':'rgba(168,85,247,.2)'};
        color:${m.published?'#34d399':'#c084fc'};
        border-radius:.45rem;padding:.28rem .65rem;cursor:pointer;font-size:.75rem;white-space:nowrap;">
      ${m.published?'📢 ':''}${m.name}
    </button>`).join('');
}

async function loadCampaignMap(id) {
  if (!window._sb) return;
  const { data } = await window._sb.from('campaign_maps').select('*').eq('id', id).single();
  if (!data) return;
  _currentCampaignMapId = id;
  document.getElementById('campaignMapName').value = data.name;
  updatePublishButtons(data.published);
  document.getElementById('campaignMapStatus').textContent =
    `Betöltve: ${new Date(data.updated_at).toLocaleString('hu-HU')}`;
  loadCampaignMapList();
  // Térkép adatok átadása az iframe-nek (postMessage)
  const iframe = document.getElementById('mapIframe');
  if (iframe?.contentWindow) {
    iframe.contentWindow.postMessage({ type: 'LOAD_CAMPAIGN_MAP', payload: data }, '*');
  }
}

window.saveCampaignMap = async function() {
  if (!window._sb) return;
  const name = document.getElementById('campaignMapName')?.value?.trim() || 'Névtelen kampány';
  // Az iframe-ből lekérjük az aktuális térkép állapotot
  const iframe = document.getElementById('mapIframe');
  if (!iframe?.contentWindow) return;

  // postMessage kérés az iframe-nek
  window._pendingSaveResolve = async (mapData) => {
    const row = {
      name,
      drawings: mapData.drawings,
      active_layer: mapData.activeLayer,
      updated_at: new Date().toISOString()
    };
    let error;
    if (_currentCampaignMapId) {
      ({ error } = await window._sb.from('campaign_maps')
        .update(row).eq('id', _currentCampaignMapId));
    } else {
      const { data, error: e } = await window._sb.from('campaign_maps').insert(row).select().single();
      error = e;
      if (data) _currentCampaignMapId = data.id;
    }
    if (!error) {
      document.getElementById('campaignMapStatus').textContent = '✓ Elmentve';
      loadCampaignMapList();
    } else console.error('Kampány mentési hiba:', error);
  };
  iframe.contentWindow.postMessage({ type: 'REQUEST_MAP_STATE' }, '*');
}

window.publishCampaignMap = async function() {
  if (!_currentCampaignMapId || !window._sb) return;
  // Először az összes többi unpublish
  await window._sb.from('campaign_maps').update({ published: false }).neq('id', _currentCampaignMapId);
  const { error } = await window._sb.from('campaign_maps')
    .update({ published: true }).eq('id', _currentCampaignMapId);
  if (!error) { updatePublishButtons(true); loadCampaignMapList(); }
}

window.unpublishCampaignMap = async function() {
  if (!_currentCampaignMapId || !window._sb) return;
  const { error } = await window._sb.from('campaign_maps')
    .update({ published: false }).eq('id', _currentCampaignMapId);
  if (!error) { updatePublishButtons(false); loadCampaignMapList(); }
}

function updatePublishButtons(isPublished) {
  const pub = document.getElementById('publishCampaignBtn');
  const unpub = document.getElementById('unpublishCampaignBtn');
  if (!pub || !unpub) return;
  pub.style.display = isPublished ? 'none' : '';
  unpub.style.display = isPublished ? '' : 'none';
}

// postMessage fogadás az iframe-től
window.addEventListener('message', function(e) {
  if (e.data?.type === 'MAP_STATE_RESPONSE' && window._pendingSaveResolve) {
    const fn = window._pendingSaveResolve;
    window._pendingSaveResolve = null;
    fn(e.data.payload);
  }
});

// Tab váltáskor lista betöltés
document.addEventListener('DOMContentLoaded', () => {
  loadCampaignMapList();
});

</script>
